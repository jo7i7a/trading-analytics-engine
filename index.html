// ━━━ pipeline.js ━━━
/**
 * pipeline.js — Trading Analytics Engine
 * ─────────────────────────────────────────
 * Defines and executes the complete trade processing pipeline.
 *
 * The pipeline is the single place that knows the correct ORDER
 * of operations. No other module coordinates the sequence.
 *
 * Pipeline stages:
 *   1. BUILD        — Normalize raw input into a complete Trade object
 *   2. VALIDATE     — Run setup and context validation
 *   3. EVALUATE     — Score analysis, execution, process; classify
 *   4. PERSIST      — Write the evaluated trade to Store
 *   5. MEMORY       — Update incremental memory snapshot
 *   6. ERRORS       — Register behavioral errors in error registry
 *   7. INSIGHTS     — Generate new insights from updated state
 *
 * Each stage:
 *   - Receives the current pipeline context
 *   - Returns a result with { ok, data, error }
 *   - If ok=false and stage is CRITICAL → pipeline halts + rollback
 *   - If ok=false and stage is NON_CRITICAL → logged, pipeline continues
 *
 * Rollback strategy:
 *   - Only stage 4 (PERSIST) is truly reversible
 *   - If stages 5–7 fail, the trade is already saved — no rollback
 *   - Failed post-persist stages are queued for retry (stored in meta)
 *
 * @module pipeline
 * @version 1.0.0
 */



// ─────────────────────────────────────────────────────────────
// PIPELINE STAGE DEFINITIONS
// Ordered list — executed sequentially.
// CRITICAL stages halt the pipeline on failure.
// NON_CRITICAL stages log and continue.
// ─────────────────────────────────────────────────────────────

const STAGES = Object.freeze({
  BUILD:    { name: 'BUILD',    critical: true  },
  VALIDATE: { name: 'VALIDATE', critical: false },  // Failure = C setup, not a halt
  EVALUATE: { name: 'EVALUATE', critical: true  },
  PERSIST:  { name: 'PERSIST',  critical: true  },
  MEMORY:   { name: 'MEMORY',   critical: false },
  ERRORS:   { name: 'ERRORS',   critical: false },
  INSIGHTS: { name: 'INSIGHTS', critical: false },
});


// ─────────────────────────────────────────────────────────────
// SECTION 1 — ADD TRADE PIPELINE
// Full pipeline for a new trade submission.
// ─────────────────────────────────────────────────────────────

/**
 * Executes the full pipeline for adding a new trade.
 *
 * @param {Object} rawInput - Raw form data from the UI
 * @returns {PipelineResult}
 */
function runAddTradePipeline(rawInput) {
  const trace = _createTrace('ADD_TRADE');

  // ── Stage 1: BUILD ────────────────────────────────────────
  _startStage(trace, STAGES.BUILD);
  let trade;
  let buildWarnings = [];

  try {
    const buildResult = buildTrade(rawInput);
    trade             = buildResult.trade;
    buildWarnings     = buildResult.warnings;
    _passStage(trace, STAGES.BUILD, { tradeId: trade.id, warnings: buildWarnings });
  } catch (err) {
    return _failPipeline(trace, STAGES.BUILD, err.message, null);
  }

  // ── Stage 2: VALIDATE ─────────────────────────────────────
  _startStage(trace, STAGES.VALIDATE);
  let validationResult;

  try {
    validationResult = validateTrade(trade);
    trade            = applyValidationResult(trade, validationResult);
    _passStage(trace, STAGES.VALIDATE, {
      isValid:        validationResult.isValid,
      classification: validationResult.classification,
      qualityScore:   validationResult.qualityScore,
    });
  } catch (err) {
    // Validation failure is non-critical — we record it and continue
    _warnStage(trace, STAGES.VALIDATE, err.message);
    validationResult = _emptyValidationResult();
  }

  // ── Stage 3: EVALUATE ─────────────────────────────────────
  _startStage(trace, STAGES.EVALUATE);
  let evaluationResult;

  try {
    evaluationResult = evaluateTrade(trade);
    trade            = applyEvaluationToTrade(trade, evaluationResult);
    _passStage(trace, STAGES.EVALUATE, {
      tradeGrade:          evaluationResult.classification.tradeGrade,
      isValidProcess:      evaluationResult.classification.isValidProcess,
      processOutcomeLabel: evaluationResult.classification.processOutcomeLabel,
      overallScore:        evaluationResult.scores.overall,
      behavioralErrors:    evaluationResult.behavioralErrors.length,
    });
  } catch (err) {
    return _failPipeline(trace, STAGES.EVALUATE, err.message, null);
  }

  // ── Stage 4: PERSIST ──────────────────────────────────────
  _startStage(trace, STAGES.PERSIST);
  const persistResult = Store.trades.add(trade);

  if (!persistResult.ok) {
    return _failPipeline(trace, STAGES.PERSIST, persistResult.error, null);
  }
  _passStage(trace, STAGES.PERSIST, { tradeId: trade.id });

  // From here on, the trade is saved. Failures are non-critical.
  const savedTrade = persistResult.trade;

  // ── Stage 5: MEMORY ───────────────────────────────────────
  _startStage(trace, STAGES.MEMORY);
  try {
    const memResult = updateMemory(savedTrade);
    if (!memResult.ok) {
      _warnStage(trace, STAGES.MEMORY, memResult.error);
    } else {
      _passStage(trace, STAGES.MEMORY, { snapshotUpdated: true });
    }
  } catch (err) {
    _warnStage(trace, STAGES.MEMORY, err.message);
  }

  // ── Stage 6: ERRORS ───────────────────────────────────────
  _startStage(trace, STAGES.ERRORS);
  try {
    const errResult = registerBehaviorErrors(savedTrade);
    if (!errResult.ok) {
      _warnStage(trace, STAGES.ERRORS, errResult.error);
    } else {
      _passStage(trace, STAGES.ERRORS, { registered: errResult.registeredCount });
    }
  } catch (err) {
    _warnStage(trace, STAGES.ERRORS, err.message);
  }

  // ── Stage 7: INSIGHTS ─────────────────────────────────────
  _startStage(trace, STAGES.INSIGHTS);
  let newInsights = [];
  try {
    const insightResult = generateInsights();
    if (!insightResult.ok) {
      _warnStage(trace, STAGES.INSIGHTS, insightResult.error);
    } else {
      newInsights = insightResult.newInsights;
      _passStage(trace, STAGES.INSIGHTS, {
        generated:  insightResult.newInsights.length,
        archived:   insightResult.archivedCount,
      });
    }
  } catch (err) {
    _warnStage(trace, STAGES.INSIGHTS, err.message);
  }

  // ── Complete ───────────────────────────────────────────────
  _completePipeline(trace);

  return {
    ok:              true,
    trade:           savedTrade,
    validationResult,
    evaluationResult,
    newInsights,
    buildWarnings,
    trace,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — UPDATE TRADE PIPELINE
// For closing a trade, adding post-trade notes, or patching fields.
// Stages 1–2 (build/validate) are skipped for updates —
// the trade already exists and was previously validated.
// Evaluation and downstream stages re-run fully.
// ─────────────────────────────────────────────────────────────

/**
 * Executes the update pipeline for an existing trade.
 *
 * @param {string} tradeId
 * @param {Object} patch    - Partial update from UI
 * @returns {PipelineResult}
 */
function runUpdateTradePipeline(tradeId, patch) {
  const trace = _createTrace('UPDATE_TRADE');

  // Load existing trade
  const existingTrade = Store.trades.getById(tradeId);
  if (!existingTrade) {
    return _failPipeline(trace, STAGES.BUILD, `Trade not found: ${tradeId}`, null);
  }

  // ── BUILD (patch mode) ────────────────────────────────────
  _startStage(trace, STAGES.BUILD);
  let trade;
  let buildWarnings = [];

  try {
    const patchResult = patchTrade(existingTrade, patch);
    trade             = patchResult.trade;
    buildWarnings     = patchResult.warnings;
    _passStage(trace, STAGES.BUILD, { tradeId: trade.id, version: trade.version, warnings: buildWarnings });
  } catch (err) {
    return _failPipeline(trace, STAGES.BUILD, err.message, null);
  }

  // ── VALIDATE (re-validate if setup data changed) ──────────
  _startStage(trace, STAGES.VALIDATE);
  let validationResult;

  try {
    validationResult = validateTrade(trade);
    trade            = applyValidationResult(trade, validationResult);
    _passStage(trace, STAGES.VALIDATE, {
      isValid:        validationResult.isValid,
      classification: validationResult.classification,
    });
  } catch (err) {
    _warnStage(trace, STAGES.VALIDATE, err.message);
    validationResult = _emptyValidationResult();
  }

  // ── EVALUATE ──────────────────────────────────────────────
  _startStage(trace, STAGES.EVALUATE);
  let evaluationResult;

  try {
    evaluationResult = evaluateTrade(trade);
    trade            = applyEvaluationToTrade(trade, evaluationResult);
    _passStage(trace, STAGES.EVALUATE, {
      tradeGrade:     evaluationResult.classification.tradeGrade,
      isValidProcess: evaluationResult.classification.isValidProcess,
      overallScore:   evaluationResult.scores.overall,
    });
  } catch (err) {
    return _failPipeline(trace, STAGES.EVALUATE, err.message, null);
  }

  // ── PERSIST (update) ──────────────────────────────────────
  _startStage(trace, STAGES.PERSIST);

  const updateResult = Store.trades.update(tradeId, trade);
  if (!updateResult.ok) {
    return _failPipeline(trace, STAGES.PERSIST, updateResult.error, null);
  }
  _passStage(trace, STAGES.PERSIST, { tradeId, version: trade.version });
  const savedTrade = updateResult.trade;

  // ── MEMORY ────────────────────────────────────────────────
  // For updates, we do a targeted memory refresh rather than full rebuild.
  // The memory engine's incremental update handles this correctly for
  // the common case of closing a trade.
  _startStage(trace, STAGES.MEMORY);
  try {
    const memResult = updateMemory(savedTrade);
    memResult.ok
      ? _passStage(trace, STAGES.MEMORY, { updated: true })
      : _warnStage(trace, STAGES.MEMORY, memResult.error);
  } catch (err) {
    _warnStage(trace, STAGES.MEMORY, err.message);
  }

  // ── ERRORS ────────────────────────────────────────────────
  _startStage(trace, STAGES.ERRORS);
  try {
    const errResult = registerBehaviorErrors(savedTrade);
    errResult.ok
      ? _passStage(trace, STAGES.ERRORS, { registered: errResult.registeredCount })
      : _warnStage(trace, STAGES.ERRORS, errResult.error);
  } catch (err) {
    _warnStage(trace, STAGES.ERRORS, err.message);
  }

  // ── INSIGHTS ──────────────────────────────────────────────
  _startStage(trace, STAGES.INSIGHTS);
  let newInsights = [];
  try {
    const insightResult = generateInsights();
    newInsights = insightResult.newInsights ?? [];
    insightResult.ok
      ? _passStage(trace, STAGES.INSIGHTS, { generated: newInsights.length })
      : _warnStage(trace, STAGES.INSIGHTS, insightResult.error);
  } catch (err) {
    _warnStage(trace, STAGES.INSIGHTS, err.message);
  }

  _completePipeline(trace);

  return {
    ok:              true,
    trade:           savedTrade,
    validationResult,
    evaluationResult,
    newInsights,
    buildWarnings,
    trace,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — IMPORT PIPELINE
// For bulk trade import (from JSON export or external source).
// Runs the full pipeline per trade but batches memory and insights.
// ─────────────────────────────────────────────────────────────

/**
 * Processes a batch of raw trade objects through the pipeline.
 * Memory and insights are updated once at the end, not per trade,
 * for performance.
 *
 * @param {Object[]} rawTrades - Array of raw trade data
 * @returns {BatchPipelineResult}
 */
function runImportPipeline(rawTrades) {
  const results   = [];
  const failures  = [];
  let successCount = 0;

  for (const rawTrade of rawTrades) {
    try {
      // Build and evaluate each trade
      const buildResult = buildTrade(rawTrade);
      const trade       = buildResult.trade;

      const validationResult = validateTrade(trade);
      const tradeWithValid   = applyValidationResult(trade, validationResult);

      const evaluationResult = evaluateTrade(tradeWithValid);
      const finalTrade       = applyEvaluationToTrade(tradeWithValid, evaluationResult);

      const persistResult = Store.trades.add(finalTrade);
      if (!persistResult.ok) {
        failures.push({ raw: rawTrade, error: persistResult.error });
        continue;
      }

      successCount++;
      results.push({ tradeId: finalTrade.id, ok: true });

    } catch (err) {
      failures.push({ raw: rawTrade, error: err.message });
    }
  }

  // Batch memory rebuild after all imports
  if (successCount > 0) {
    try {
      rebuildMemory();
    } catch (err) {
      console.log('[pipeline] Import memory rebuild failed:', err.message);
    }

    // Register errors and generate insights once
    const allTrades = Store.trades.getAll();
    for (const trade of allTrades.slice(-successCount)) {
      try { registerBehaviorErrors(trade); } catch { /* non-critical */ }
    }

    try { generateInsights(); } catch { /* non-critical */ }
  }

  return {
    ok:           failures.length === 0,
    successCount,
    failureCount: failures.length,
    results,
    failures,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 4 — PIPELINE TRACE SYSTEM
// Every pipeline execution produces a Trace object that records
// each stage's timing, result, and any warnings.
// Consumed by the UI for debugging and by errorEngine for anomaly detection.
// ─────────────────────────────────────────────────────────────

function _createTrace(pipelineType) {
  return {
    pipelineType,
    startedAt:   new Date().toISOString(),
    completedAt: null,
    stages:      [],
    ok:          true,
    failedStage: null,
  };
}

function _startStage(trace, stage) {
  trace.stages.push({
    name:      stage.name,
    critical:  stage.critical,
    startedAt: new Date().toISOString(),
    status:    'RUNNING',
    data:      null,
    warning:   null,
  });
}

function _passStage(trace, stage, data = {}) {
  const entry = _getLastStage(trace);
  if (entry) {
    entry.status      = 'PASSED';
    entry.completedAt = new Date().toISOString();
    entry.data        = data;
  }
}

function _warnStage(trace, stage, warning) {
  const entry = _getLastStage(trace);
  if (entry) {
    entry.status      = 'WARNED';
    entry.completedAt = new Date().toISOString();
    entry.warning     = warning;
  }
  console.log(`[pipeline:${stage.name}] Non-critical failure: ${warning}`);
}

function _failPipeline(trace, stage, error, rollbackData) {
  const entry = _getLastStage(trace);
  if (entry) {
    entry.status      = 'FAILED';
    entry.completedAt = new Date().toISOString();
    entry.error       = error;
  }
  trace.ok          = false;
  trace.failedStage = stage.name;
  trace.completedAt = new Date().toISOString();

  console.error(`[pipeline:${stage.name}] Critical failure: ${error}`);

  return { ok: false, error, failedStage: stage.name, trace };
}

function _completePipeline(trace) {
  trace.completedAt = new Date().toISOString();
  const duration    = new Date(trace.completedAt) - new Date(trace.startedAt);
  trace.durationMs  = duration;
}

function _getLastStage(trace) {
  return trace.stages[trace.stages.length - 1] ?? null;
}

function _emptyValidationResult() {
  return {
    isValid:             false,
    isInvalidating:      false,
    conditionsMet:       [],
    conditionsViolated:  [],
    validationScore:     0,
    qualityScore:        0,
    classification:      'C_DISCARD',
    shouldHaveTaken:     false,
    invalidatingReasons: ['Validation stage failed — result unavailable'],
    scoringBreakdown:    {},
    notes:               [],
  };
}

// SECTION 1 — BADGE COMPONENTS
// All data classification displayed as badges.

function badgeOutcome(outcome) {
  const map = {
    WIN:       ['badge-win',     'WIN'],
    LOSS:      ['badge-loss',    'LOSS'],
    BREAKEVEN: ['badge-neutral', 'B/E'],
    OPEN:      ['badge-open',    'OPEN'],
    CANCELLED: ['badge-discard', 'CNCL'],
  };
  const [cls, label] = map[outcome] ?? ['badge-discard', outcome ?? '—'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function badgeGrade(grade) {
  const map = {
    EXCELLENT:  ['badge-excellent',  'EXCELLENT'],
    GOOD:       ['badge-good',       'GOOD'],
    ACCEPTABLE: ['badge-acceptable', 'ACCEPTABLE'],
    POOR:       ['badge-poor',       'POOR'],
    INVALID:    ['badge-invalid',    'INVALID'],
  };
  const [cls, label] = map[grade] ?? ['badge-discard', grade ?? '—'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function badgeClassification(cls) {
  const map = {
    A_PLUS:    ['badge-aplus',   'A+'],
    B_PLUS:    ['badge-bplus',   'B+'],
    C_DISCARD: ['badge-discard', 'C'],
  };
  const [clsName, label] = map[cls] ?? ['badge-discard', cls ?? '—'];
  return `<span class="badge ${clsName}">${label}</span>`;
}

function badgeProcessLabel(label) {
  const map = {
    GOOD_PROCESS_WIN:       ['badge-valid-proc',  'GOOD+WIN'],
    GOOD_PROCESS_LOSS:      ['badge-valid-proc',  'GOOD+LOSS'],
    GOOD_PROCESS_BREAKEVEN: ['badge-valid-proc',  'GOOD+BE'],
    BAD_PROCESS_WIN:        ['badge-bad-win',     'BAD+WIN'],
    BAD_PROCESS_LOSS:       ['badge-invalid-proc','BAD+LOSS'],
    BAD_PROCESS_BREAKEVEN:  ['badge-invalid-proc','BAD+BE'],
    PROCESS_OPEN:           ['badge-open',        'OPEN'],
    PROCESS_CANCELLED:      ['badge-discard',     'CNCL'],
  };
  const [clsName, text] = map[label] ?? ['badge-discard', label ?? '—'];
  return `<span class="badge ${clsName}">${text}</span>`;
}

function badgePriority(priority) {
  const map = {
    CRITICAL: 'badge-critical',
    HIGH:     'badge-high',
    MEDIUM:   'badge-medium',
    LOW:      'badge-low',
  };
  return `<span class="badge ${map[priority] ?? 'badge-low'}">${priority ?? '—'}</span>`;
}

function badgeSetup(setupType) {
  const map = {
    S1_OB_H4:  'S1 · OB H4',
    S2_FVG_H1: 'S2 · FVG H1',
  };
  return `<span class="badge badge-neutral">${map[setupType] ?? setupType ?? '—'}</span>`;
}

function badgeSession(session) {
  const labels = {
    LONDON:       'LON',
    NEW_YORK:     'NY',
    OVERLAP_LDN_NY: 'OVLP',
    ASIAN:        'ASIA',

  };
  return `<span class="badge badge-neutral">${labels[session] ?? session ?? '—'}</span>`;
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — SCORE BAR
// ─────────────────────────────────────────────────────────────

/**
 * Renders a labeled score bar (0–100).
 * @param {number} score
 * @param {string} label
 * @returns {string}
 */
function scoreBar(score, label) {
  const s    = Math.max(0, Math.min(100, score ?? 0));
  const color = s >= 75 ? 'var(--color-win)'
              : s >= 55 ? 'var(--color-open)'
              : 'var(--color-loss)';
  return `
    <div>
      <div class="mono-xs text-muted mb-1">${label}</div>
      <div class="score-bar-wrap">
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:${s}%;background:${color}"></div>
        </div>
        <span class="score-bar-label">${s}</span>
      </div>
    </div>`;
}

/**
 * Renders three score bars (analysis / execution / overall).
 * @param {Object} evaluation
 * @returns {string}
 */
function evaluationScoreBars(evaluation) {
  return `
    <div class="flex-col gap-3">
      ${scoreBar(evaluation.analysisQuality,  'Analysis')}
      ${scoreBar(evaluation.executionQuality, 'Execution')}
      ${scoreBar(evaluation.overallScore,     'Overall')}
    </div>`;
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — STAT CELLS
// ─────────────────────────────────────────────────────────────

/**
 * Renders a single stat cell.
 * @param {string} label
 * @param {string|number} value
 * @param {string} [sub]
 * @param {string} [valueClass] - 'positive' | 'negative' | 'warning'
 * @returns {string}
 */
function statCell(label, value, sub = '', valueClass = '') {
  return `
    <div class="stat-cell">
      <div class="stat-label">${label}</div>
      <div class="stat-value ${valueClass}">${value ?? '—'}</div>
      ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
    </div>`;
}

/**
 * Renders a pnlR value with correct color class.
 * @param {number|null} pnlR
 * @returns {string}
 */
function pnlRValue(pnlR) {
  if (pnlR === null || pnlR === undefined) return '<span class="text-muted">—</span>';
  const sign = pnlR > 0 ? '+' : '';
  const cls  = pnlR > 0 ? 'text-win' : pnlR < 0 ? 'text-loss' : 'text-muted';
  return `<span class="mono-sm ${cls}">${sign}${pnlR.toFixed(2)}R</span>`;
}

/**
 * Renders a win rate with color coding.
 * @param {number} rate - 0.0 to 1.0
 * @returns {string}
 */
function winRateValue(rate) {
  if (rate === null || rate === undefined) return '<span class="text-muted">—</span>';
  const pct  = (rate * 100).toFixed(1);
  const cls  = rate >= 0.55 ? 'text-win' : rate >= 0.45 ? 'text-warning' : 'text-loss';
  return `<span class="mono-sm ${cls}">${pct}%</span>`;
}


// ─────────────────────────────────────────────────────────────
// SECTION 4 — CHECKLIST COMPONENT
// Renders validation condition checks as a live visual checklist.
// ─────────────────────────────────────────────────────────────

/**
 * Renders condition checks as a checklist.
 * @param {ConditionCheck[]} conditionsMet
 * @param {ConditionCheck[]} conditionsViolated
 * @param {Object} [opts]
 * @param {boolean} [opts.showOptional] - Include non-required checks
 * @returns {string}
 */
function conditionChecklist(conditionsMet, conditionsViolated, opts = {}) {
  const allPassed  = conditionsMet    ?? [];
  const allFailed  = conditionsViolated ?? [];
  const all        = [...allPassed, ...allFailed];
  const filtered   = opts.showOptional ? all : all.filter(c => c.required !== false);
  if (filtered.length === 0) return '<div class="text-muted mono-xs">No conditions evaluated.</div>';

  const rows = filtered.map(c => {
    const icon  = c.passed ? '✓' : '✗';
    const state = c.passed ? 'pass' : 'fail';
    const weight = c.required ? '' : `<span class="text-muted mono-xs">(opt)</span>`;
    return `
      <div class="checklist-row">
        <span class="check-icon ${state}">${icon}</span>
        <span class="check-label ${state}">${c.label ?? c.code}</span>
        ${weight}
      </div>`;
  }).join('');

  const passCount = allPassed.filter(c => c.required !== false).length;
  const totalReq  = filtered.filter(c => c.required !== false).length;

  return `
    <div class="checklist-live">
      <div class="flex items-center justify-between mb-4">
        <span class="mono-xs text-muted">CONDITIONS</span>
        <span class="mono-xs">${passCount}/${totalReq} required</span>
      </div>
      ${rows}
    </div>`;
}


// ─────────────────────────────────────────────────────────────
// SECTION 5 — INSIGHT CARD
// ─────────────────────────────────────────────────────────────

/**
 * Renders a single insight card.
 * @param {Insight} insight
 * @param {Object} [opts]
 * @param {boolean} [opts.showDismiss]
 * @returns {string}
 */
function insightCard(insight, opts = {}) {
  const priority = insight.priority?.toLowerCase() ?? 'low';
  const typeLabel = insight.type?.replace(/_/g, ' ') ?? '';

  const confidenceBar = insight.confidence != null
    ? `<div class="mono-xs text-muted mt-2">Confidence: ${Math.round(insight.confidence * 100)}% · n=${insight.currentSampleSize}</div>`
    : '';

  const dismissBtn = opts.showDismiss
    ? `<button class="btn btn-ghost btn-sm" data-action="dismiss-insight" data-id="${insight.id}">Dismiss</button>`
    : '';

  const actionBtn = insight.actionRequired
    ? `<span class="mono-xs text-warning">⚡ Action required</span>`
    : '';

  return `
    <div class="insight-card priority-${priority}" data-insight-id="${insight.id}">
      <div class="insight-meta">
        ${badgePriority(insight.priority)}
        <span class="badge badge-neutral">${typeLabel}</span>
        ${insight.relatedSetup ? badgeSetup(insight.relatedSetup) : ''}
        ${insight.relatedSession ? badgeSession(insight.relatedSession) : ''}
      </div>
      <div class="insight-title">${insight.title}</div>
      <div class="insight-body">${insight.body}</div>
      ${confidenceBar}
      ${actionBtn || dismissBtn ? `
        <div class="insight-actions">
          ${actionBtn}
          ${dismissBtn}
        </div>` : ''}
    </div>`;
}

// ─────────────────────────────────────────────────────────────
// SECTION 7 — TOAST NOTIFICATIONS
// ─────────────────────────────────────────────────────────────

/**
 * Shows a toast notification.
 * @param {string} message
 * @param {'success'|'error'|'warn'|'info'} type
 * @param {number} duration - ms before auto-dismiss
 */
function showToast(message, type = 'info', duration = 3500) {
  const container = document.getElementById('toast-container');
  if (!container) return;

  const icons = { success: '✓', error: '✗', warn: '⚠', info: '○' };
  const el    = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `
    <span class="text-muted">${icons[type] ?? '○'}</span>
    <span class="toast-msg">${message}</span>`;

  container.appendChild(el);

  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity 200ms';
    setTimeout(() => el.remove(), 220);
  }, duration);
}

let _activeModal = null;

/**
 * Opens a modal with given title and content HTML.
 * @param {string} title
 * @param {string} bodyHTML
 * @param {Object} [opts]
 * @param {string} [opts.footerHTML]
 * @param {Function} [opts.onClose]
 * @returns {HTMLElement} modalEl — reference to the rendered modal
 */
function openModal(title, bodyHTML, opts = {}) {
  closeModal(); // ensure only one modal at a time

  const mount = document.getElementById('modal-mount');
  if (!mount) return null;

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" id="active-modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <span class="modal-title">${title}</span>
        <button class="modal-close" data-action="close-modal">✕</button>
      </div>
      <div class="modal-body" id="modal-body">
        ${bodyHTML}
      </div>
      ${opts.footerHTML ? `<div class="modal-footer">${opts.footerHTML}</div>` : ''}
    </div>`;

  // Close on backdrop click
  backdrop.addEventListener('click', (e) => {
    if (e.target === backdrop) {
      closeModal();
      opts.onClose?.();
    }
  });

  // Close on button click
  backdrop.querySelector('[data-action="close-modal"]').addEventListener('click', () => {
    closeModal();
    opts.onClose?.();
  });

  // Close on Escape
  const keyHandler = (e) => {
    if (e.key === 'Escape') {
      closeModal();
      opts.onClose?.();
    }
  };
  document.addEventListener('keydown', keyHandler);
  backdrop._keyHandler = keyHandler;

  mount.appendChild(backdrop);
  _activeModal = backdrop;

  return backdrop.querySelector('#active-modal');
}

/**
 * Closes the active modal.
 */
function closeModal() {
  if (!_activeModal) return;
  if (_activeModal._keyHandler) {
    document.removeEventListener('keydown', _activeModal._keyHandler);
  }
  _activeModal.remove();
  _activeModal = null;
}

/**
 * Returns the modal body element for dynamic updates.
 * @returns {HTMLElement | null}
 */
function getModalBody() {

/**
 * Mounts HTML into a DOM element by selector.
 * @param {string} selector
 * @param {string} html
 */
function mount(selector, html) {
  const el = document.querySelector(selector);
  if (el) el.innerHTML = html;
}

/**
 * Gets a form field value by name from a form element.
 * @param {HTMLFormElement|HTMLElement} form
 * @param {string} name
 * @returns {string}
 */
function getField(form, name) {
  return form.querySelector(`[name="${name}"]`)?.value?.trim() ?? '';
}

/**
 * Gets a checkbox state by name.
 * @param {HTMLElement} container
 * @param {string} name
 * @returns {boolean}
 */
function getCheckbox(container, name) {
  return container.querySelector(`[name="${name}"]`)?.checked ?? false;
}

/**
 * Collects all form fields into a plain object.
 * Handles inputs, selects, textareas, checkboxes.
 * @param {HTMLElement} formEl
 * @returns {Object}
 */
function collectFormData(formEl) {
  const data = {};
  const fields = formEl.querySelectorAll('input, select, textarea');
  for (const field of fields) {
    if (!field.name) continue;
    if (field.type === 'checkbox') {
      data[field.name] = field.checked;
    } else if (field.type === 'number') {
      data[field.name] = field.value !== '' ? parseFloat(field.value) : null;
    } else {
      data[field.name] = field.value;
    }
  }
  return data;
}

/**
 * Sets field values on a form from a data object.
 * @param {HTMLElement} formEl
 * @param {Object} data
 */
function populateForm(formEl, data) {
  for (const [key, value] of Object.entries(data)) {
    const field = formEl.querySelector(`[name="${key}"]`);
    if (!field) continue;
    if (field.type === 'checkbox') {
      field.checked = Boolean(value);
    } else {
      field.value = value ?? '';
    }
  }
}

/**
 * Formats an ISO date string to a readable format.
 * @param {string} iso
 * @returns {string}
 */
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

/**
 * Formats a float as a rounded string with N decimals.
 * @param {number|null} val
 * @param {number} decimals
 * @returns {string}
 */
function fmt(val, decimals = 2) {
  if (val === null || val === undefined) return '—';
  return Number(val).toFixed(decimals);
}

/**
 * Formats a rate (0–1) as percentage string.
 * @param {number|null} val
 * @returns {string}
 */
function fmtPct(val) {
  if (val === null || val === undefined) return '—';
  return (val * 100).toFixed(1) + '%';
}

/**
 * Returns a color hex for a 0–100 score.
 * @param {number} score
 * @returns {string}
 */
function scoreColor(score) {
  if (score >= 75) return 'var(--color-win)';
  if (score >= 55) return 'var(--color-open)';
  return 'var(--color-loss)';
}

/**
 * Empty state component.
 * @param {string} title
 * @param {string} sub
 * @param {string} [actionHTML]
 * @returns {string}
 */
function emptyState(title, sub, actionHTML = '') {

}

  const entry = parseFloat(f.querySelector('[name="execution.entryPrice"]')?.value);
  const sl    = parseFloat(f.querySelector('[name="execution.stopLoss"]')?.value);
  const tp    = parseFloat(f.querySelector('[name="execution.takeProfit"]')?.value);
  if (isNaN(entry) || isNaN(sl) || isNaN(tp) || Math.abs(entry - sl) === 0) {
    el.textContent = '—';
    return;
  }
  const rr = Math.abs(tp - entry) / Math.abs(entry - sl);
  const color = rr >= 2 ? 'var(--color-win)' : rr >= 1.5 ? 'var(--color-open)' : 'var(--color-loss)';

/**
 * Collects all flat form field values.
 * @returns {Object} flat key→value map

function _collectRawFormData() {
  const form = document.getElementById('trade-form');
  if (!form) return {};
  return collectFormData(form);
}

/**
 * Converts flat dot-notation keys into nested object.
 * e.g. { 'context.market': 'NAS100' } → { context: { market: 'NAS100' } }
 * @param {Object} flat
 * @returns {Object}
 */
function _denestFormData(flat) {
  const result = {};
  for (const [key, value] of Object.entries(flat)) {
    const parts = key.split('.');
    let cursor  = result;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!cursor[parts[i]] || typeof cursor[parts[i]] !== 'object') {
        cursor[parts[i]] = {};
      }
      cursor = cursor[parts[i]];
    }
    cursor[parts[parts.length - 1]] = value;
  }
  return result;
}

function _select(name, values, defaultVal, labels = null) {
  const opts = values.map((v, i) =>
    `<option value="${v}" ${v === defaultVal ? 'selected' : ''}>${labels ? labels[i] : v}</option>`
  ).join('');
  return `<select name="${name}" class="form-input form-select">${opts}</select>`;
}

function _check(name, label, required, weight, type = 'checkbox', defaultVal = '') {
  const reqMark = required ? `<span style="color:var(--color-loss);font-size:10px">REQ</span>` : `<span style="color:var(--text-muted);font-size:10px">OPT</span>`;

    return `

        <span class="form-label" style="flex:1">${label}</span>
        <input name="${name}" type="number" min="0" max="20" class="form-input" style="width:64px;text-align:center" value="${defaultVal}">
        ${reqMark}
      </div>`;
  }
  return `
    <label class="checkbox-item${required ? ' critical-check' : ''}">
      <input type="checkbox" name="${name}">
      <span style="flex:1">${label}</span>
      <span class="checkbox-weight">${weight}pt</span>
      ${reqMark}
    </label>`;
}

  const trade = App.trades.getById(tradeId);
  if (!trade) return;

  const bodyHTML = `
    <div class="flex-col gap-4">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4)">
        <div class="form-group">
          <label class="form-label required">Outcome</label>
          <select id="close-outcome" class="form-input form-select">
            <option value="WIN">WIN</option>
            <option value="LOSS">LOSS</option>
            <option value="BREAKEVEN">BREAKEVEN</option>
            <option value="CANCELLED">CANCELLED</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Exit Price</label>
          <input id="close-exit-price" type="number" step="any" class="form-input" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">P&L (R)</label>
          <input id="close-pnlR" type="number" step="any" class="form-input" placeholder="e.g. 2.0 or -1.0">
        </div>
        <div class="form-group">
          <label class="form-label">P&L ($)</label>
          <input id="close-pnlAmount" type="number" step="any" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">MAE (R)</label>
          <input id="close-mae" type="number" step="any" class="form-input" placeholder="Max adverse excursion">
        </div>
        <div class="form-group">
          <label class="form-label">MFE (R)</label>
          <input id="close-mfe" type="number" step="any" class="form-input" placeholder="Max favorable excursion">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Exit Reason</label>
        <select id="close-exit-reason" class="form-input form-select">
          <option value="TP_HIT">TP Hit</option>
          <option value="SL_HIT">SL Hit</option>
          <option value="MANUAL_EXIT">Manual Exit</option>
          <option value="PARTIAL">Partial</option>
          <option value="EXPIRED">Expired</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Lessons Learned</label>
        <textarea id="close-lessons" class="form-input form-textarea" rows="3" placeholder="What did this trade teach you?"></textarea>
      </div>
    </div>`;

  openModal('Close Trade', bodyHTML, {
    footerHTML: `
      <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
      <button class="btn btn-primary" id="confirm-close-btn">Confirm Close</button>`,
  });

  document.getElementById('confirm-close-btn')?.addEventListener('click', () => {
    const outcome     = document.getElementById('close-outcome').value;
    const exitPrice   = parseFloat(document.getElementById('close-exit-price').value) || null;
    const pnlR        = parseFloat(document.getElementById('close-pnlR').value) || null;
    const pnlAmount   = parseFloat(document.getElementById('close-pnlAmount').value) || null;
    const mae         = parseFloat(document.getElementById('close-mae').value) || null;
    const mfe         = parseFloat(document.getElementById('close-mfe').value) || null;
    const exitReason  = document.getElementById('close-exit-reason').value;
    const lessons     = document.getElementById('close-lessons').value.trim();

    const result = App.trades.update(tradeId, {
      result: { outcome, exitPrice, pnlR, pnlAmount, exitReason,
        maxAdverseExcursion: mae, maxFavorableExcursion: mfe },
      notes:  { lessonsLearned: lessons },
    });

    if (!result.ok) {
      showToast(`Update failed: ${result.error}`, 'error');
      return;
    }

    closeModal();
    showToast('Trade closed and re-evaluated', 'success');
    // Re-render the detail view
    document.getElementById('page-content').innerHTML = render({ tradeId });
    mount({ tradeId });
  });
}

function _openReviewModal(tradeId) {
  openModal('Post-Trade Review', `
    <div class="form-group">
      <label class="form-label">Review notes</label>
      <textarea id="review-text" class="form-input form-textarea" rows="6"
        placeholder="What went well? What should change? Was the execution aligned with the plan?"></textarea>

    footerHTML: `
      <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
      <button class="btn btn-primary" id="save-review-btn">Save Review</button>`,
  });

  document.getElementById('save-review-btn')?.addEventListener('click', () => {
    const text = document.getElementById('review-text').value.trim();
    if (!text) { showToast('Review cannot be empty', 'warn'); return; }
    const result = App.trades.update(tradeId, { notes: { postTradeReview: text } });
    if (!result.ok) { showToast(`Failed: ${result.error}`, 'error'); return; }
    closeModal();
    showToast('Post-trade review saved', 'success');
    document.getElementById('page-content').innerHTML = render({ tradeId });
    mount({ tradeId });
  });
}

          ${_statusRow('Version',    status.version)}
          ${_statusRow('Trades',     status.storeStatus?.tradeCount ?? 0)}
          ${_statusRow('Insights',   status.storeStatus?.insightCount ?? 0)}
          ${_statusRow('Error Codes', status.storeStatus?.errorCodeCount ?? 0)}
          ${_statusRow('Storage Used', storage ? `${storage.usedPercent.toFixed(1)}% (${_bytes(storage.usedBytes)} / ${_bytes(storage.estimatedLimitBytes)})` : '—')}
          ${_statusRow('Schema',     status.storeStatus?.schemaVersion)}
        </div>
      </div>

      <!-- Risk config -->
      <div class="card mb-6">
        <div class="card-title mb-4">Risk Configuration</div>
        <form id="risk-config-form" class="flex-col gap-4">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4)">
            <div class="form-group">
              <label class="form-label">Default Risk %</label>
              <input name="defaultRiskPercent" type="number" step="0.1" min="0.1" max="10"
                class="form-input" value="${config.risk?.defaultRiskPercent ?? 1.0}">
            </div>
            <div class="form-group">
              <label class="form-label">Minimum R:R</label>
              <input name="minRRRatio" type="number" step="0.1" min="1" max="10"
                class="form-input" value="${config.risk?.minRRRatio ?? 2.0}">
            </div>
          </div>
          <div>
            <button type="submit" class="btn btn-ghost btn-sm">Save Risk Config</button>
          </div>
        </form>
      </div>

      <!-- Evaluation thresholds -->
      <div class="card mb-6">
        <div class="card-title mb-4">Evaluation Thresholds</div>
        <form id="eval-config-form" class="flex-col gap-4">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4)">
            <div class="form-group">
              <label class="form-label">Min Analysis Score (valid process)</label>
              <input name="minAnalysisScoreForValid" type="number" min="40" max="90"
                class="form-input" value="${config.evaluation?.minAnalysisScoreForValid ?? 65}">
            </div>
            <div class="form-group">
              <label class="form-label">Min Execution Score (valid process)</label>
              <input name="minExecutionScoreForValid" type="number" min="40" max="90"
                class="form-input" value="${config.evaluation?.minExecutionScoreForValid ?? 65}">
            </div>
            <div class="form-group">
              <label class="form-label">Min Sample Size (edge detection)</label>
              <input name="minSampleSizeForEdge" type="number" min="5" max="50"
                class="form-input" value="${config.memory?.minSampleSizeForEdge ?? 15}">
            </div>
            <div class="form-group">
              <label class="form-label">Recurring Error Threshold (last 10)</label>
              <input name="recurringThreshold" type="number" min="2" max="8"
                class="form-input" value="${config.errors?.recurringThreshold ?? 3}">
            </div>
          </div>
          <div>
            <button type="submit" class="btn btn-ghost btn-sm">Save Thresholds</button>
          </div>
        </form>
      </div>

      <!-- Data operations -->
      <div class="card mb-6">
        <div class="card-title mb-4">Data Management</div>
        <div class="flex-col gap-3">
          <div class="flex items-center justify-between" style="padding:8px 0;border-bottom:1px solid var(--border-dim)">
            <div>
              <div class="mono-xs">Rebuild Memory</div>
              <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px">Recomputes all statistics from trade history. Use if stats appear inconsistent.</div>
            </div>
            <button class="btn btn-ghost btn-sm" id="rebuild-memory-btn">Rebuild</button>
          </div>
          <div class="flex items-center justify-between" style="padding:8px 0;border-bottom:1px solid var(--border-dim)">
            <div>
              <div class="mono-xs">Refresh Insights</div>
              <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px">Regenerate all insights from current data.</div>
            </div>
            <button class="btn btn-ghost btn-sm" id="refresh-insights-btn">Refresh</button>
          </div>
          <div class="flex items-center justify-between" style="padding:8px 0;border-bottom:1px solid var(--border-dim)">
            <div>
              <div class="mono-xs">Export Data</div>
              <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px">Download complete system state as JSON backup.</div>
            </div>
            <button class="btn btn-ghost btn-sm" id="export-btn">Export</button>
          </div>
          <div class="flex items-center justify-between" style="padding:8px 0;border-bottom:1px solid var(--border-dim)">
            <div>
              <div class="mono-xs">Import Data</div>
              <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px">Restore from a previously exported JSON file. Creates backup before overwriting.</div>
            </div>
            <button class="btn btn-ghost btn-sm" id="import-btn">Import</button>
          </div>
          <div class="flex items-center justify-between" style="padding:8px 0">
            <div>
              <div class="mono-xs text-loss">Reset System</div>
              <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px">Clears all data. A backup is created before deletion. Irreversible.</div>
            </div>
            <button class="btn btn-danger btn-sm" id="reset-btn">Reset</button>
          </div>
        </div>
      </div>

      <!-- Hidden file input for import -->
      <input type="file" id="import-file-input" accept=".json" style="display:none">

    </div>`;
}

function mount() {
  // Risk config
  document.getElementById('risk-config-form')?.addEventListener('submit', (e) => {
    e.preventDefault();
    const f = e.target;
    App.config.update({ risk: {
      defaultRiskPercent: parseFloat(f.defaultRiskPercent.value),
      minRRRatio:         parseFloat(f.minRRRatio.value),
    }});
    showToast('Risk configuration saved', 'success');
  });

  // Eval config
  document.getElementById('eval-config-form')?.addEventListener('submit', (e) => {
    e.preventDefault();
    const f = e.target;
    App.config.update({
      evaluation: { minAnalysisScoreForValid: parseInt(f.minAnalysisScoreForValid.value), minExecutionScoreForValid: parseInt(f.minExecutionScoreForValid.value) },
      memory:     { minSampleSizeForEdge: parseInt(f.minSampleSizeForEdge.value) },
      errors:     { recurringThreshold: parseInt(f.recurringThreshold.value) },
    });
    showToast('Thresholds saved', 'success');
  });

  // Rebuild memory
  document.getElementById('rebuild-memory-btn')?.addEventListener('click', () => {
    const r = App.memory.rebuild();
    showToast(r.ok ? 'Memory rebuilt successfully' : `Rebuild failed: ${r.error}`, r.ok ? 'success' : 'error');
  });

  // Refresh insights
  document.getElementById('refresh-insights-btn')?.addEventListener('click', () => {
    const r = App.insights.refresh();
    showToast(r.ok ? `${r.newInsights?.length ?? 0} insight(s) generated` : `Failed: ${r.error}`, r.ok ? 'info' : 'error');
  });

  // Export
  document.getElementById('export-btn')?.addEventListener('click', () => {
    const r = App.system.exportData();
    if (!r.ok) { showToast(`Export failed: ${r.error}`, 'error'); return; }
    const blob = new Blob([r.payload], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `tae-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Export downloaded', 'success');
  });

  // Import
  document.getElementById('import-btn')?.addEventListener('click', () => {
    document.getElementById('import-file-input').click();
  });

  document.getElementById('import-file-input')?.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const r = App.system.importData(ev.target.result);
      showToast(r.ok ? 'Import successful — data restored' : `Import failed: ${r.error}`, r.ok ? 'success' : 'error');
      if (r.warnings?.length) showToast(`Warnings: ${r.warnings.slice(0,2).join('; ')}`, 'warn', 6000);
    };
    reader.readAsText(file);
  });

  // Reset
  document.getElementById('reset-btn')?.addEventListener('click', () => {
    openModal('Confirm System Reset', `
      <div class="alert-bar error mb-4"><span>⚠</span><span>This will delete all trades, memory, and insights. A backup will be created.</span></div>
      <div style="font-size:13px;color:var(--text-secondary)">Type <strong style="color:var(--text-primary);font-family:var(--font-mono)">RESET</strong> to confirm.</div>
      <input id="reset-confirm-input" type="text" class="form-input mt-3" placeholder="Type RESET">`, {
      footerHTML: `
        <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
        <button class="btn btn-danger" id="confirm-reset-btn">Confirm Reset</button>`,
    });

    document.getElementById('confirm-reset-btn')?.addEventListener('click', () => {
      if (document.getElementById('reset-confirm-input')?.value !== 'RESET') {
        showToast('Type RESET to confirm', 'warn'); return;
      }
      const r = App.system.reset();
      closeModal();
      showToast(r.ok ? `System reset. Backup: ${r.backupKey}` : `Reset failed: ${r.error}`, r.ok ? 'success' : 'error');
    });
  });
}

function unmount() {}

function _statusRow(label, value) {
  return `
    <div class="flex items-center justify-between" style="padding:5px 0;border-bottom:1px solid var(--border-dim)">
      <span class="mono-xs text-muted">${label}</span>
      <span class="mono-xs">${value}</span>
    </div>`;
}

function _bytes(b) {
  if (b < 1024) return `${b}B`;
  if (b < 1024*1024) return `${(b/1024).toFixed(1)}KB`;
  return `${(b/(1024*1024)).toFixed(2)}MB`;
}

_V['settings']={render:typeof render==='function'?render:function(){return '';},mount:typeof mount==='function'?mount:function(){},unmount:typeof unmount==='function'?unmount:function(){},getPageActions:typeof getPageActions==='function'?getPageActions:function(){return '';}};
})();

const ROUTE_TITLES={dashboard:'Dashboard',trade_new:'Register Trade',trade_detail:'Trade Detail',trade_history:'Trade History',insights:'Insights',errors:'Error Analysis',setup_stats:'Setup Statistics',process_quality:'Process Quality',settings:'Settings'};
const VIEW_MAP={dashboard:'dashboard',trade_new:'tradeForm',trade_detail:'tradeDetail',trade_history:'tradeHistory',insights:'insights',errors:'errorAnalysis',setup_stats:'setupStats',process_quality:'processQuality',settings:'settings'};
let _curRoute=null,_curParams={},_curView=null;
const _navL=new Set();
async function navigate(routeId,params){
  params=params||{};
  if(_curView&&_curView.unmount){try{_curView.unmount();}catch(e){}}
  const vm=_V[VIEW_MAP[routeId]];
  if(!vm){document.getElementById('page-content').innerHTML='<div class="empty-state"><div class="empty-state-title">View not found: '+routeId+'</div></div>';return;}
  _curRoute=routeId;_curParams=params;_curView=vm;
  document.getElementById('page-title').textContent=ROUTE_TITLES[routeId]||routeId;
  document.getElementById('page-actions').innerHTML=vm.getPageActions?vm.getPageActions(params):'';
  try{document.getElementById('page-content').innerHTML=vm.render(params);document.getElementById('page-content').scrollTop=0;}
  catch(e){console.error('[nav] render:',e);document.getElementById('page-content').innerHTML='<div class="empty-state"><div class="empty-state-title">Render error</div><div class="empty-state-sub">'+e.message+'</div></div>';return;}
  if(vm.mount){try{vm.mount(params);}catch(e){console.error('[nav] mount:',e);}}
  _navL.forEach(h=>{try{h({routeId,params});}catch(e){}});
}
function isActive(id){return _curRoute===id;}
function onNavigate(fn){_navL.add(fn);return()=>_navL.delete(fn);}
function _ib(){try{return App.insights.getUrgent().length;}catch(e){return 0;}}
function _eb(){try{const r=App.errors.getReport();return(r.recurringErrors||[]).length+(r.clusters||[]).length;}catch(e){return 0;}}
const NAV=[
  {s:'Core',items:[{r:ROUTES.DASHBOARD,i:'◈',l:'Dashboard'},{r:ROUTES.TRADE_NEW,i:'+',l:'New Trade'},{r:ROUTES.TRADE_HISTORY,i:'≡',l:'History'}]},
  {s:'Intelligence',items:[{r:ROUTES.INSIGHTS,i:'◎',l:'Insights',b:'insights'},{r:ROUTES.ERRORS,i:'⊘',l:'Error Analysis',b:'errors'},{r:ROUTES.SETUP_STATS,i:'◇',l:'Setup Stats'},{r:ROUTES.PROCESS_QUALITY,i:'◑',l:'Process Quality'}]},
  {s:'System',items:[{r:ROUTES.SETTINGS,i:'⊕',l:'Settings'}]},
];
function renderSidebar(){
  const ib=_ib(),eb=_eb();let h='';
  NAV.forEach(sec=>{
    h+='<span class="nav-section-label">'+sec.s+'</span>';
    sec.items.forEach(item=>{
      let badge='';
      if(item.b==='insights'&&ib>0)badge='<span class="nav-badge urgent">'+ib+'</span>';
      if(item.b==='errors'&&eb>0)badge='<span class="nav-badge">'+eb+'</span>';
      h+='<div class="nav-item" data-route="'+item.r+'"><span class="nav-icon">'+item.i+'</span><span>'+item.l+'</span>'+badge+'</div>';
    });
  });
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML=h;
  nav.querySelectorAll('[data-route]').forEach(el=>el.addEventListener('click',()=>navigate(el.dataset.route)));
  _ua();
}
function _ua(){document.querySelectorAll('.nav-item[data-route]').forEach(el=>el.classList.toggle('active',isActive(el.dataset.route)));}
function _us(){
  const el=document.getElementById('system-status');if(!el)return;
  const s=App.system.getStatus(),n=s.storeStatus?.tradeCount||0,stor=s.storeStatus?.storage,pct=stor?Math.round(stor.usedPercent):0;
  el.innerHTML='<div><span class="status-dot"></span>v'+s.version+'</div><div>'+n+' trade'+(n!==1?'s':'')+'</div><div style="margin-top:4px;color:var(--text-muted)">'+pct+'% storage</div>';
}
function _ub(){
  const ib=_ib(),eb=_eb();
  document.querySelectorAll('[data-route]').forEach(el=>{
    const r=el.dataset.route,ex=el.querySelector('.nav-badge');
    if(r===ROUTES.INSIGHTS){if(ib>0){if(ex){ex.textContent=ib;ex.classList.add('urgent');}else el.insertAdjacentHTML('beforeend','<span class="nav-badge urgent">'+ib+'</span>');}else ex?.remove();}
    if(r===ROUTES.ERRORS){if(eb>0){if(ex)ex.textContent=eb;else el.insertAdjacentHTML('beforeend','<span class="nav-badge">'+eb+'</span>');}else ex?.remove();}
  });
}
document.addEventListener('click',e=>{
  const el=e.target.closest('[data-action]');if(!el)return;
  const a=el.dataset.action;
  if(a==='new-trade')navigate(ROUTES.TRADE_NEW);
  if(a==='view-trade'){const t=e.target.closest('[data-trade-id]');if(t)navigate(ROUTES.TRADE_DETAIL,{tradeId:t.dataset.tradeId});}
  if(a==='dismiss-insight'){const d=e.target.closest('[data-id]');if(d){App.insights.dismiss(d.dataset.id);e.target.closest('.insight-card')?.remove();showToast('Dismissed','info',2000);_ub();}}
  if(a==='close-modal')closeModal();
});
(async()=>{
  const result=App.init();
  if(!result.ok){
    document.getElementById('loading-screen').innerHTML='<div style="text-align:center;font-family:monospace;color:#f87171;padding:40px"><div>INIT FAILED</div><div style="font-size:12px;color:#888;margin-top:8px">'+(result.errors?.[0]||'Unknown')+'</div></div>';
    return;
  }
  renderSidebar();
  onNavigate(()=>{_ua();_us();});
  App.subscribe(App.events.TRADE_ADDED,()=>_ub());
  App.subscribe(App.events.INSIGHT_ADDED,()=>_ub());
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').classList.remove('hidden');
  await navigate(ROUTES.DASHBOARD);
  _us();
  (result.warnings||[]).slice(0,2).forEach(w=>showToast(w,'warn',6000));
})().catch(e=>{
  console.error('[bootstrap] Fatal:',e);
  document.getElementById('loading-screen').innerHTML='<div style="text-align:center;font-family:monospace;color:#f87171;padding:40px"><div>FATAL ERROR</div><div style="font-size:12px;color:#888;margin-top:8px">'+e.message+'</div></div>';
});

})();
</script>
</body></html>
