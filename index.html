 * @returns {{ pts: number, detail: string }}
 */
function _scoreEntryPrecision(exec, s1, s2, maxPoints) {
  const actualEntry = exec.entryPrice;

  // Get planned entry level from the relevant setup
  const plannedEntry = s1?.entryLevel ?? s2?.fvgMidpoint ?? null;
  const zoneHigh     = s1?.obHigh     ?? s2?.fvgHigh     ?? null;
  const zoneLow      = s1?.obLow      ?? s2?.fvgLow      ?? null;

  if (actualEntry == null || plannedEntry == null || zoneHigh == null || zoneLow == null) {
    return { pts: Math.round(maxPoints * 0.5), detail: 'Entry or zone levels not fully set — partial credit' };
  }

  const zoneSize  = Math.abs(zoneHigh - zoneLow);
  if (zoneSize === 0) {
    return { pts: maxPoints, detail: 'Zone size is zero — precision check skipped' };
  }

  const deviation       = Math.abs(actualEntry - plannedEntry);
  const deviationRatio  = deviation / zoneSize;

  if (deviationRatio <= 0.10) {
    return { pts: maxPoints, detail: `Entry within 10% of planned level — excellent precision` };
  } else if (deviationRatio <= 0.20) {
    return { pts: Math.round(maxPoints * 0.75), detail: `Entry within 20% of planned level — acceptable` };
  } else if (deviationRatio <= 0.35) {
    return { pts: Math.round(maxPoints * 0.40), detail: `Entry deviated ${Math.round(deviationRatio * 100)}% from plan — poor precision` };
  } else {
    return { pts: 0, detail: `Entry deviated ${Math.round(deviationRatio * 100)}% from plan — entry not at zone` };
  }
}

/**
 * Scores SL placement correctness.
 * SL must be on the correct side of entry AND beyond the zone boundary.
 *
 * @param {Trade['execution']} exec
 * @param {S1SetupData|null} s1
 * @param {S2SetupData|null} s2
 * @param {string} direction - 'LONG' | 'SHORT'
 * @param {number} maxPoints
 * @returns {{ pts: number, detail: string }}
 */
function _scoreSLPlacement(exec, s1, s2, direction, maxPoints) {
  const sl    = exec.stopLoss;
  const entry = exec.entryPrice;

  if (sl == null || entry == null) {
    return { pts: Math.round(maxPoints * 0.5), detail: 'SL or entry price not set — partial credit' };
  }

  const isLong = direction === 'LONG';

  // Basic directionality: SL must be below entry for LONG, above for SHORT
  const slDirectionCorrect = isLong ? sl < entry : sl > entry;
  if (!slDirectionCorrect) {
    return { pts: 0, detail: `SL is on the wrong side of entry for a ${direction} trade` };
  }

  // SL should be beyond the zone boundary (below OB low for LONG, above OB high for SHORT)
  const zoneBoundary = isLong
    ? (s1?.obLow  ?? s2?.fvgLow  ?? null)
    : (s1?.obHigh ?? s2?.fvgHigh ?? null);

  if (zoneBoundary == null) {
    // Can't check beyond-zone placement without levels
    return { pts: Math.round(maxPoints * 0.75), detail: 'SL direction correct — zone boundary not set for full validation' };
  }

  const slBeyondZone = isLong ? sl < zoneBoundary : sl > zoneBoundary;

  if (slBeyondZone) {
    return { pts: maxPoints, detail: 'SL correctly placed beyond zone boundary' };
  } else {
    return {
      pts:    Math.round(maxPoints * 0.40),
      detail: `SL is inside the zone boundary — SL is too tight and may be stopped by zone noise`,
    };
  }
}

/**
 * Checks whether the TP was respected (not moved early).
 * Heuristic: if outcome is WIN but pnlR < planned rRatio * 0.9,
 * or if exitReason is MANUAL_EXIT with a WIN before full TP.
 *
 * @param {Trade} trade
 * @returns {{ respected: boolean, detail: string }}
 */
function _tpWasRespected(trade) {
  const { outcome, exitReason, pnlR } = trade.result;
  const plannedRR = trade.execution.rRatio ?? MIN_RR_RATIO;

  // If trade is still open or cancelled — not applicable
  if (outcome === Outcome.OPEN || outcome === Outcome.CANCELLED) {
    return { respected: true, detail: 'Trade not closed — not applicable' };
  }

  // If SL hit — TP was not reached, but not because of early exit
  if (exitReason === 'SL_HIT' || outcome === Outcome.LOSS) {
    return { respected: true, detail: 'SL hit — TP adherence not at issue' };
  }

  // If manual exit with a win, but significantly below the planned TP
  if (exitReason === 'MANUAL_EXIT' && outcome === Outcome.WIN && pnlR !== null) {
    const pctOfPlan = pnlR / plannedRR;
    if (pctOfPlan < 0.80) {
      return {
        respected: false,
        detail:    `Manual exit at ${pnlR}R vs planned ${plannedRR}R — TP moved early (${Math.round(pctOfPlan * 100)}% of target)`,
      };
    }
  }

  // Breakeven manual exit — TP definitely moved
  if (exitReason === 'MANUAL_EXIT' && outcome === Outcome.BREAKEVEN) {
    return {
      respected: false,
      detail:    'Manual exit at breakeven — TP was not respected',
    };
  }

  return { respected: true, detail: 'TP respected' };
}

/**
 * Maps a raw deviation string to a DEVIATION_PENALTIES key.
 * Handles both coded (e.g. 'MARKET_INSTEAD_OF_LIMIT') and
 * free-text deviation descriptions with keyword matching.
 *
 * @param {string} deviation
 * @returns {string}
 */
function _normalizeDeviationKey(deviation) {
  const upper = deviation?.toUpperCase() ?? '';
  // Direct match first
  if (DEVIATION_PENALTIES[upper] !== undefined) return upper;
  // Keyword matching for free-text entries
  if (upper.includes('MARKET')) return 'MARKET_INSTEAD_OF_LIMIT';
  if (upper.includes('TP') && (upper.includes('MOVE') || upper.includes('EARLY'))) return 'TP_MOVED_EARLY';
  if (upper.includes('SL') && upper.includes('TIGHT')) return 'SL_TIGHTENED_POST_ENTRY';
  if (upper.includes('REENT')) return 'REENTRY_ON_SAME_ZONE';
  if (upper.includes('CHAS')) return 'CHASED_PRICE';
  if (upper.includes('EARLY') && upper.includes('EXIT')) return 'EARLY_MANUAL_EXIT';
  if (upper.includes('SIZE') || upper.includes('OVER')) return 'OVERSIZED_POSITION';
  return upper; // No match — will result in no deduction (unknown deviation)
}

/**
 * Returns the numeric tier difference between two classifications.
 * A+ = 2, B+ = 1, C = 0
 *
 * @param {string} a
 * @param {string} b
 * @returns {number} absolute tier distance
 */
function _classificationTierDiff(a, b) {
  const tier = {
    [SetupClassification.A_PLUS]:   2,
    [SetupClassification.B_PLUS]:   1,
    [SetupClassification.C_DISCARD]: 0,
  };
  return Math.abs((tier[a] ?? 0) - (tier[b] ?? 0));
}

// ━━━ evaluationClassifier.js ━━━
/**
 * evaluationClassifier.js — Trading Analytics Engine
 * ─────────────────────────────────────────────────────
 * Converts numeric scores and boolean conditions into meaningful
 * operational labels. This is where numbers become language.
 *
 * Responsibilities:
 *   - Assign a TradeGrade based on dimension scores
 *   - Assign a ProcessOutcomeLabel (the critical distinction)
 *   - Assign an ExecutionProfile
 *   - Determine isValidProcess
 *   - Produce a human-readable evaluation summary
 *
 * The ProcessOutcomeLabel is the most important output of this module.
 * It answers the question every serious trader must confront:
 * "Was this outcome deserved or was it luck?"
 *
 * @module evaluationClassifier
 * @version 1.0.0
 */



// ─────────────────────────────────────────────────────────────
// PROCESS-OUTCOME LABELS
// The 2×2 matrix of process quality × result.
// These are the labels that build long-term self-awareness.
// ─────────────────────────────────────────────────────────────

const ProcessOutcomeLabel = Object.freeze({
  // Valid process, result aligns with expectation
  GOOD_PROCESS_WIN:               'GOOD_PROCESS_WIN',
  GOOD_PROCESS_LOSS:              'GOOD_PROCESS_LOSS',       // The most important label to accept
  GOOD_PROCESS_BREAKEVEN:         'GOOD_PROCESS_BREAKEVEN',

  // Invalid process, result doesn't reflect skill
  BAD_PROCESS_WIN:                'BAD_PROCESS_WIN',         // Dangerous — reinforces bad habits
  BAD_PROCESS_LOSS:               'BAD_PROCESS_LOSS',        // Expected — system working correctly
  BAD_PROCESS_BREAKEVEN:          'BAD_PROCESS_BREAKEVEN',

  // Trade not yet closed
  PROCESS_OPEN:                   'PROCESS_OPEN',
  PROCESS_CANCELLED:              'PROCESS_CANCELLED',
});

// ─────────────────────────────────────────────────────────────
// EXECUTION PROFILES
// Characterizes HOW the trade was executed, independent of
// whether the setup itself was valid.
// ─────────────────────────────────────────────────────────────

const ExecutionProfile = Object.freeze({
  DISCIPLINED:      'DISCIPLINED',       // Followed the plan precisely
  ACCEPTABLE:       'ACCEPTABLE',        // Minor deviations, plan mostly followed
  IMPULSIVE:        'IMPULSIVE',         // Significant deviation from plan
  EMOTIONAL:        'EMOTIONAL',         // Pattern of reactive, unplanned decisions
  MECHANICAL:       'MECHANICAL',        // Fully systematic — no deviations at all
});

// ─────────────────────────────────────────────────────────────
// THRESHOLDS FOR CLASSIFICATION
// ─────────────────────────────────────────────────────────────

const GRADE_THRESHOLDS = Object.freeze({
  EXCELLENT:  { analysis: 80, execution: 80 },
  GOOD:       { analysis: 70, execution: 70 },
  ACCEPTABLE: { analysis: 55, execution: 55 },   // At least one dim below 70
  POOR:       { analysis: 40, execution: 40 },   // One dim below 50
  // INVALID: both below POOR threshold or critical violation
});

const VALID_PROCESS_THRESHOLDS = Object.freeze({
  MIN_ANALYSIS_SCORE:   65,
  MIN_EXECUTION_SCORE:  65,
  MIN_PROCESS_SCORE:    60,
  MAX_CRITICAL_ERRORS:  0,    // Zero CRITICAL behavioral errors
  MIN_VALIDATION_SCORE: 0.60, // At least 60% of required conditions met
});


// ─────────────────────────────────────────────────────────────
// SECTION 1 — TRADE GRADE
// Maps dimension scores to a TradeGrade enum value.
// Grade represents overall QUALITY — not outcome.
// ─────────────────────────────────────────────────────────────

/**
 * Assigns a TradeGrade based on analysis and execution scores.
 *
 * Grade matrix:
 *   EXCELLENT  → both ≥ 80
 *   GOOD       → both ≥ 70
 *   ACCEPTABLE → both ≥ 55 (or one above, one below)
 *   POOR       → one dim below 50, other above 40
 *   INVALID    → both below 50, or any CRITICAL behavioral error
 *
 * @param {number} analysisScore    - 0–100
 * @param {number} executionScore   - 0–100
 * @param {boolean} hasCriticalError
 * @returns {TradeGrade}
 */
function classifyTradeGrade(analysisScore, executionScore, hasCriticalError) {
  if (hasCriticalError) {
    return TradeGrade.INVALID;
  }

  const minScore = Math.min(analysisScore, executionScore);
  const avgScore = (analysisScore + executionScore) / 2;

  if (analysisScore >= GRADE_THRESHOLDS.EXCELLENT.analysis &&
      executionScore >= GRADE_THRESHOLDS.EXCELLENT.execution) {
    return TradeGrade.EXCELLENT;
  }

  if (analysisScore >= GRADE_THRESHOLDS.GOOD.analysis &&
      executionScore >= GRADE_THRESHOLDS.GOOD.execution) {
    return TradeGrade.GOOD;
  }

  if (minScore >= GRADE_THRESHOLDS.ACCEPTABLE.analysis || avgScore >= 65) {
    return TradeGrade.ACCEPTABLE;
  }

  if (minScore >= GRADE_THRESHOLDS.POOR.analysis) {
    return TradeGrade.POOR;
  }

  return TradeGrade.INVALID;
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — VALID PROCESS DETERMINATION
// isValidProcess is the most consequential flag in the system.
// It determines whether a trade contributes to edge statistics.
//
// A trade with isValidProcess = true that results in a LOSS
// is a correctly executed trade in a losing statistical outcome.
// It should NOT trigger behavioral review.
//
// A trade with isValidProcess = false that results in a WIN
// should NEVER be reinforced — the win is noise, not edge.
// ─────────────────────────────────────────────────────────────

/**
 * Determines whether the trade was executed with a valid process.
 *
 * ALL of the following must be true:
 *   1. Analysis score ≥ MIN_ANALYSIS_SCORE
 *   2. Execution score ≥ MIN_EXECUTION_SCORE
 *   3. Process score ≥ MIN_PROCESS_SCORE
 *   4. Zero CRITICAL behavioral errors
 *   5. ValidationScore ≥ MIN_VALIDATION_SCORE
 *   6. Setup is not C_DISCARD (except for logging purposes)
 *
 * @param {Object} params
 * @param {number}   params.analysisScore
 * @param {number}   params.executionScore
 * @param {number}   params.processScore
 * @param {number}   params.validationScore
 * @param {string}   params.classification
 * @param {BehaviorError[]} params.behavioralErrors
 * @returns {{ isValid: boolean, reasons: string[] }}
 */
function determineValidProcess({
  analysisScore,
  executionScore,
  processScore,
  validationScore,
  classification,
  behavioralErrors = [],
}) {
  const reasons = [];
  const T = VALID_PROCESS_THRESHOLDS;

  if (analysisScore < T.MIN_ANALYSIS_SCORE) {
    reasons.push(`Analysis quality too low (${analysisScore} < ${T.MIN_ANALYSIS_SCORE})`);
  }

  if (executionScore < T.MIN_EXECUTION_SCORE) {
    reasons.push(`Execution quality too low (${executionScore} < ${T.MIN_EXECUTION_SCORE})`);
  }

  if (processScore < T.MIN_PROCESS_SCORE) {
    reasons.push(`Process quality too low (${processScore} < ${T.MIN_PROCESS_SCORE})`);
  }

  if (validationScore < T.MIN_VALIDATION_SCORE) {
    reasons.push(`Validation score too low (${validationScore} < ${T.MIN_VALIDATION_SCORE})`);
  }

  const criticalErrors = behavioralErrors.filter(e => e.severity === 'CRITICAL');
  if (criticalErrors.length > T.MAX_CRITICAL_ERRORS) {
    reasons.push(
      `Critical behavioral error(s): ${criticalErrors.map(e => e.code).join(', ')}`
    );
  }

  if (classification === SetupClassification.C_DISCARD) {
    reasons.push('Setup classified as C (Discard) — setup should not have been taken');
  }

  return {
    isValid: reasons.length === 0,
    reasons,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — PROCESS-OUTCOME LABEL
// The 2×2 classification that distinguishes luck from edge.
// ─────────────────────────────────────────────────────────────

/**
 * Assigns a ProcessOutcomeLabel based on process validity and result.
 *
 * @param {boolean} isValidProcess
 * @param {string}  outcome - Outcome enum value
 * @returns {string} ProcessOutcomeLabel
 */
function classifyProcessOutcome(isValidProcess, outcome) {
  if (outcome === Outcome.OPEN)      return ProcessOutcomeLabel.PROCESS_OPEN;
  if (outcome === Outcome.CANCELLED) return ProcessOutcomeLabel.PROCESS_CANCELLED;

  if (isValidProcess) {
    if (outcome === Outcome.WIN)       return ProcessOutcomeLabel.GOOD_PROCESS_WIN;
    if (outcome === Outcome.LOSS)      return ProcessOutcomeLabel.GOOD_PROCESS_LOSS;
    if (outcome === Outcome.BREAKEVEN) return ProcessOutcomeLabel.GOOD_PROCESS_BREAKEVEN;
  } else {
    if (outcome === Outcome.WIN)       return ProcessOutcomeLabel.BAD_PROCESS_WIN;
    if (outcome === Outcome.LOSS)      return ProcessOutcomeLabel.BAD_PROCESS_LOSS;
    if (outcome === Outcome.BREAKEVEN) return ProcessOutcomeLabel.BAD_PROCESS_BREAKEVEN;
  }

  return ProcessOutcomeLabel.PROCESS_OPEN; // Fallback
}


// ─────────────────────────────────────────────────────────────
// SECTION 4 — EXECUTION PROFILE
// ─────────────────────────────────────────────────────────────

/**
 * Assigns an ExecutionProfile based on execution score,
 * deviation count, and behavioral error types.
 *
 * @param {number}          executionScore    - 0–100
 * @param {string[]}        deviations        - trade.execution.executionDeviations
 * @param {BehaviorError[]} behavioralErrors
 * @returns {string} ExecutionProfile
 */
function classifyExecutionProfile(executionScore, deviations = [], behavioralErrors = []) {
  const deviationCount = deviations.length;

  const psychErrors = behavioralErrors.filter(e => e.category === 'PSYCHOLOGY');
  const execErrors  = behavioralErrors.filter(e => e.category === 'EXECUTION');

  // EMOTIONAL: psychology errors present, or very high deviation count with poor score
  if (psychErrors.length >= 2 || (deviationCount >= 3 && executionScore < 40)) {
    return ExecutionProfile.EMOTIONAL;
  }

  // IMPULSIVE: execution errors or significant deviations
  if (execErrors.length >= 1 || deviationCount >= 2 || executionScore < 55) {
    return ExecutionProfile.IMPULSIVE;
  }

  // MECHANICAL: perfect score, no deviations, no errors
  if (executionScore >= 95 && deviationCount === 0 && behavioralErrors.length === 0) {
    return ExecutionProfile.MECHANICAL;
  }

  // DISCIPLINED: high score, zero or one minor deviation
  if (executionScore >= 75 && deviationCount <= 1) {
    return ExecutionProfile.DISCIPLINED;
  }

  return ExecutionProfile.ACCEPTABLE;
}


// ─────────────────────────────────────────────────────────────
// SECTION 5 — EVALUATION SUMMARY GENERATOR
// Produces human-readable narrative from classification outputs.
// Consumed by the UI detail view and the insights engine.
// ─────────────────────────────────────────────────────────────

/**
 * Generates a structured evaluation summary for a classified trade.
 *
 * @param {Object} params
 * @param {string}   params.tradeGrade
 * @param {string}   params.processOutcomeLabel
 * @param {string}   params.executionProfile
 * @param {boolean}  params.isValidProcess
 * @param {string[]} params.invalidProcessReasons
 * @param {Object}   params.outcomeCoherence
 * @param {BehaviorError[]} params.behavioralErrors
 * @returns {EvaluationSummary}
 */
function buildEvaluationSummary({
  tradeGrade,
  processOutcomeLabel,
  executionProfile,
  isValidProcess,
  invalidProcessReasons,
  outcomeCoherence,
  behavioralErrors = [],
}) {
  const lines = [];

  // Process validity statement
  if (isValidProcess) {
    lines.push('✓ Valid process — this trade counts toward your real edge statistics.');
  } else {
    lines.push('✗ Invalid process — this trade is excluded from edge statistics.');
    for (const reason of invalidProcessReasons.slice(0, 3)) {
      lines.push(`  — ${reason}`);
    }
  }

  // Process/outcome interpretation
  lines.push(_interpretProcessOutcomeLabel(processOutcomeLabel));

  // Execution profile
  lines.push(_interpretExecutionProfile(executionProfile));

  // Outcome coherence
  if (outcomeCoherence?.interpretation) {
    lines.push(outcomeCoherence.interpretation);
  }

  // Behavioral errors
  const criticalErrors = behavioralErrors.filter(e => e.severity === 'CRITICAL');
  const highErrors     = behavioralErrors.filter(e => e.severity === 'HIGH');

  if (criticalErrors.length > 0) {
    lines.push(
      `⚠ CRITICAL error(s): ${criticalErrors.map(e => e.code).join(', ')}. ` +
      `These directly impact your expected value.`
    );
  }
  if (highErrors.length > 0) {
    lines.push(`High-severity error(s): ${highErrors.map(e => e.code).join(', ')}.`);
  }

  return {
    tradeGrade,
    processOutcomeLabel,
    executionProfile,
    isValidProcess,
    narrativeSummary: lines.join('\n'),
    lines,
    criticalErrorCount: criticalErrors.length,
    totalErrorCount:    behavioralErrors.length,
  };
}

/**
 * Returns a single interpretive sentence for a ProcessOutcomeLabel.
 * @param {string} label
 * @returns {string}
 */
function _interpretProcessOutcomeLabel(label) {
  const interpretations = {
    [ProcessOutcomeLabel.GOOD_PROCESS_WIN]:
      'Good process + win: edge confirmed, execution consistent with strategy.',
    [ProcessOutcomeLabel.GOOD_PROCESS_LOSS]:
      'Good process + loss: statistically normal. Do not change the process — this is how edge works.',
    [ProcessOutcomeLabel.GOOD_PROCESS_BREAKEVEN]:
      'Good process + breakeven: acceptable result, review exit timing only.',
    [ProcessOutcomeLabel.BAD_PROCESS_WIN]:
      '⚠ Bad process + win: result is NOT attributable to skill. Do not internalize this as a template.',
    [ProcessOutcomeLabel.BAD_PROCESS_LOSS]:
      'Bad process + loss: expected outcome. Focus the review on what conditions were violated.',
    [ProcessOutcomeLabel.BAD_PROCESS_BREAKEVEN]:
      'Bad process + breakeven: outcome is within noise — do not conclude the process was acceptable.',
    [ProcessOutcomeLabel.PROCESS_OPEN]:
      'Trade is still open — process/outcome classification pending.',
    [ProcessOutcomeLabel.PROCESS_CANCELLED]:
      'Trade was cancelled before entry — valid process assessment: setup was discarded correctly.',
  };
  return interpretations[label] ?? `Classification: ${label}`;
}

/**
 * Returns a single interpretive sentence for an ExecutionProfile.
 * @param {string} profile
 * @returns {string}
 */
function _interpretExecutionProfile(profile) {
  const interpretations = {
    [ExecutionProfile.MECHANICAL]:
      'Execution: fully systematic — no deviations from the plan.',
    [ExecutionProfile.DISCIPLINED]:
      'Execution: disciplined — plan followed with minor acceptable variance.',
    [ExecutionProfile.ACCEPTABLE]:
      'Execution: acceptable — plan mostly followed with some deviation.',
    [ExecutionProfile.IMPULSIVE]:
      'Execution: impulsive — significant deviations from the plan detected.',
    [ExecutionProfile.EMOTIONAL]:
      '⚠ Execution: emotional — reactive decision pattern detected. Review psychological state.',
  };
  return interpretations[profile] ?? `Execution profile: ${profile}`;
}

// ━━━ evaluationEngine.js ━━━
/**
 * evaluationEngine.js — Trading Analytics Engine
 * ─────────────────────────────────────────────────
 * Central orchestrator for the complete trade evaluation pipeline.
 *
 * This module answers the core questions of the system:
 *   1. Was this trade correctly executed?
 *   2. Was the process valid — independent of result?
 *   3. Did the execution respect the plan?
 *   4. Is the outcome coherent with setup quality?
 *   5. Was this a loss caused by bad process, or a loss within edge?
 *   6. Was this a win caused by edge, or a win despite bad process?
 *
 * Pipeline:
 *   validateTrade()     → ValidationResult     (setupValidator)
 *   scoreAnalysis()     → DimensionScore        (evaluationScorer)
 *   scoreExecution()    → DimensionScore        (evaluationScorer)
 *   scoreProcess()      → DimensionScore        (evaluationScorer)
 *   scoreCoherence()    → OutcomeCoherence      (evaluationScorer)
 *   detectErrors()      → BehaviorError[]       (behaviorDetector)
 *   classifyGrade()     → TradeGrade            (evaluationClassifier)
 *   classifyProcess()   → ProcessOutcomeLabel   (evaluationClassifier)
 *   classifyExecution() → ExecutionProfile      (evaluationClassifier)
 *   buildSummary()      → EvaluationSummary     (evaluationClassifier)
 *   applyToTrade()      → Trade (with evaluation block populated)
 *
 * Contract:
 *   - Input:  raw Trade object (from tradeBuilder, not yet evaluated)
 *   - Output: EvaluationResult containing all computed data
 *   - The caller is responsible for applying the result to the Trade
 *     and calling Store.trades.add() or Store.trades.update()
 *
 * @module evaluationEngine
 * @version 1.0.0
 */






// ─────────────────────────────────────────────────────────────
// SECTION 1 — BEHAVIOR DETECTION
// Detects specific behavioral errors from observable trade data.
// Each rule is a pure function: Trade → BehaviorError | null
// Rules are registered in BEHAVIOR_RULES array below.
//
// Separation: rules are defined here because they read trade
// structure and produce BehaviorError objects. The errorEngine
// (a different module) is responsible for TRACKING frequency
// and generating pattern-level insights. These are two
// different concerns.
// ─────────────────────────────────────────────────────────────

/**
 * A behavior detection rule.
 * @typedef {Object} BehaviorRule
 * @property {string} code
 * @property {string} category     - ErrorCategory
 * @property {string} severity     - ErrorSeverity
 * @property {string} description
 * @property {Function} detect     - (trade: Trade) => boolean
 */

const BEHAVIOR_RULES = [

  // ── ANALYSIS ERRORS ───────────────────────────────────────

  {
    code:        'ERR_A01',
    category:    ErrorCategory.ANALYSIS,
    severity:    ErrorSeverity.CRITICAL,
    description: 'Trade taken without confirmed D1 trend',
    detect: (trade) => {
      const { trend_D1 } = trade.context.marketCondition;
      const cc = trade.setup.s1_data?.conditionChecks ?? trade.setup.s2_data?.conditionChecks ?? {};
      // S1 specifically requires D1 trend. S2 in ranging can still be valid
      // but a completely unconfirmed D1 on S1 is always an error.
      if (trade.setup.type === 'S1_OB_H4') {
        return cc.trend_D1_confirmed === false;
      }
      // For S2: flag only if D1 is explicitly UNCLEAR
      return trend_D1 === 'UNCLEAR';
    },
  },

  {
    code:        'ERR_A02',
    category:    ErrorCategory.ANALYSIS,
    severity:    ErrorSeverity.HIGH,
    description: 'Setup pre-classified as A+/B+ but validated as C (Discard)',
    detect: (trade) => {
      const preClass       = trade.setup.classification_pre;
      const validatedClass = trade.validation?.conditionsMet !== undefined
        ? null  // Will be checked via validation block
        : null;
      // We can check if the trader pre-classified optimistically
      // against hard invalidating conditions
      const hasInvalidating = trade.validation?.conditionsViolated?.some(
        c => c.required && c.weight >= 3 && !c.passed
      ) ?? false;
      return (
        (preClass === SetupClassification.A_PLUS || preClass === SetupClassification.B_PLUS) &&
        hasInvalidating
      );
    },
  },

  {
    code:        'ERR_A03',
    category:    ErrorCategory.ANALYSIS,
    severity:    ErrorSeverity.HIGH,
    description: 'Trade taken with no space available to TP (resistance within 2R)',
    detect: (trade) => {
      if (trade.setup.type !== 'S1_OB_H4') return false;
      const cc = trade.setup.s1_data?.conditionChecks ?? {};
      return cc.space_available === false;
    },
  },

  {
    code:        'ERR_A04',
    category:    ErrorCategory.ANALYSIS,
    severity:    ErrorSeverity.CRITICAL,
    description: 'Operated on a mitigated OB or FVG zone',
    detect: (trade) => {
      // S2: FVG was already mitigated
      if (trade.setup.type === 'S2_FVG_H1') {
        return trade.setup.s2_data?.conditionChecks?.not_mitigated === false;
      }
      // S1: OB was not a first retest (proxy for partial mitigation)
      if (trade.setup.type === 'S1_OB_H4') {
        return trade.setup.s1_data?.conditionChecks?.first_retest === false;
      }
      return false;
    },
  },

  {
    code:        'ERR_A05',
    category:    ErrorCategory.ANALYSIS,
    severity:    ErrorSeverity.MEDIUM,
    description: 'Market was in a ranging structure but S1 OB trade was taken',
    detect: (trade) => {
      if (trade.setup.type !== 'S1_OB_H4') return false;
      return trade.setup.s1_data?.conditionChecks?.market_not_ranging === false;
    },
  },

  // ── EXECUTION ERRORS ──────────────────────────────────────

  {
    code:        'ERR_E01',
    category:    ErrorCategory.EXECUTION,
    severity:    ErrorSeverity.CRITICAL,
    description: 'Market entry used on a setup that requires LIMIT order',
    detect: (trade) => trade.execution.entryType === EntryType.MARKET,
  },

  {
    code:        'ERR_E02',
    category:    ErrorCategory.EXECUTION,
    severity:    ErrorSeverity.HIGH,
    description: 'Stop loss tightened after entry',
    detect: (trade) => {
      const devs = trade.execution.executionDeviations ?? [];
      return devs.some(d => {
        const upper = d.toUpperCase();
        return upper.includes('SL') && (upper.includes('TIGHT') || upper.includes('MOVED') || upper.includes('ADJUST'));
      });
    },
  },

  {
    code:        'ERR_E03',
    category:    ErrorCategory.EXECUTION,
    severity:    ErrorSeverity.HIGH,
    description: 'Take profit moved or reduced before being hit',
    detect: (trade) => {
      const { outcome, exitReason, pnlR } = trade.result;
      const plannedRR = trade.execution.rRatio ?? 2.0;
      // Manual exit significantly below planned TP on a winning trade
      return (
        exitReason === 'MANUAL_EXIT' &&
        outcome === Outcome.WIN &&
        pnlR !== null &&
        pnlR < plannedRR * 0.80
      );
    },
  },

  {
    code:        'ERR_E04',
    category:    ErrorCategory.EXECUTION,
    severity:    ErrorSeverity.CRITICAL,
    description: 'Reentry on a previously traded zone (second attempt)',
    detect: (trade) => {
      if (trade.setup.type === 'S2_FVG_H1') {
        return trade.setup.s2_data?.conditionChecks?.no_reentry === false;
      }
      // S1: multiple attempts same zone proxied via executionDeviations
      const devs = trade.execution.executionDeviations ?? [];
      return devs.some(d => d.toUpperCase().includes('REENT'));
    },
  },

  {
    code:        'ERR_E05',
    category:    ErrorCategory.EXECUTION,
    severity:    ErrorSeverity.CRITICAL,
    description: 'Price was chased — entered after price passed the planned level',
    detect: (trade) => {
      if (trade.setup.type === 'S2_FVG_H1') {
        return trade.setup.s2_data?.conditionChecks?.price_not_chased === false;
      }
      const devs = trade.execution.executionDeviations ?? [];
      return devs.some(d => d.toUpperCase().includes('CHAS'));
    },
  },

  // ── PSYCHOLOGY ERRORS ─────────────────────────────────────

  {
    code:        'ERR_P01',
    category:    ErrorCategory.PSYCHOLOGY,
    severity:    ErrorSeverity.CRITICAL,
    description: 'Trade entered during an active high-impact news event',
    detect: (trade) => trade.context.marketCondition.newsPresent === true,
  },

  {
    code:        'ERR_P03',
    category:    ErrorCategory.PSYCHOLOGY,
    severity:    ErrorSeverity.MEDIUM,
    description: 'R:R below minimum threshold — risk not justified by reward',
    detect: (trade) => {
      const rr = trade.execution.rRatio;
      return rr !== null && rr < 2.0;
    },
  },

  // ── RISK ERRORS ───────────────────────────────────────────

  {
    code:        'ERR_R01',
    category:    ErrorCategory.RISK,
    severity:    ErrorSeverity.HIGH,
    description: 'R:R ratio is below the minimum defined for this setup type',
    detect: (trade) => {
      const rr = trade.execution.rRatio;
      return rr !== null && rr < 2.0;
    },
  },

  // ── PROCESS ERRORS ────────────────────────────────────────

  {
    code:        'ERR_PR01',
    category:    ErrorCategory.PROCESS,
    severity:    ErrorSeverity.MEDIUM,
    description: 'Trade taken without pre-trade analysis notes',
    detect: (trade) => !trade.notes.preTradeAnalysis?.trim(),
  },

  {
    code:        'ERR_PR02',
    category:    ErrorCategory.PROCESS,
    severity:    ErrorSeverity.LOW,
    description: 'Post-trade review not completed on a closed trade',
    detect: (trade) => {
      const isClosed = trade.result.outcome !== Outcome.OPEN &&
                       trade.result.outcome !== Outcome.CANCELLED;
      return isClosed && !trade.notes.postTradeReview?.trim();
    },
  },

  {
    code:        'ERR_PR03',
    category:    ErrorCategory.PROCESS,
    severity:    ErrorSeverity.MEDIUM,
    description: 'Setup taken with validation score below 60% — checklist not met',
    detect: (trade) => {
      const vs = trade.validation?.validationScore ?? 0;
      return vs < 0.60 && vs > 0; // 0 = not yet validated
    },
  },
];

/**
 * Runs all behavior detection rules against a trade.
 * Returns an array of detected BehaviorError objects.
 *
 * @param {Trade} trade
 * @returns {BehaviorError[]}
 */
function detectBehavioralErrors(trade) {
  const errors = [];

  for (const rule of BEHAVIOR_RULES) {
    let triggered = false;
    try {
      triggered = rule.detect(trade);
    } catch (err) {
      console.log(`[evaluationEngine] Rule ${rule.code} threw an error:`, err.message);
    }

    if (triggered) {
      errors.push(createBehaviorError({
        code:        rule.code,
        category:    rule.category,
        severity:    rule.severity,
        description: rule.description,
        tradeId:     trade.id,
      }));
    }
  }

  return errors;
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — INDIVIDUAL EVALUATION FUNCTIONS
// These are the exposed hooks for partial evaluation.
// The full pipeline is in evaluateTrade() below.
// ─────────────────────────────────────────────────────────────

/**
 * Evaluates execution quality of a trade.
 * Can be called independently for execution-only review.
 *
 * @param {Trade} trade
 * @param {ValidationResult} validationResult
 * @returns {DimensionScore}
 */
function evaluateExecution(trade, validationResult) {
  return scoreExecutionQuality(trade, validationResult);
}

/**
 * Evaluates process adherence of a trade.
 *
 * @param {Trade} trade
 * @param {ValidationResult} validationResult
 * @param {BehaviorError[]} behavioralErrors
 * @returns {DimensionScore}
 */
function evaluateProcess(trade, validationResult, behavioralErrors) {
  return scoreProcessQuality(trade, validationResult, behavioralErrors);
}

/**
 * Evaluates outcome coherence (result vs setup quality expectation).
 *
 * @param {Trade} trade
 * @param {ValidationResult} validationResult
 * @returns {OutcomeCoherenceResult}
 */
function evaluateOutcome(trade, validationResult) {
  return scoreOutcomeCoherence(trade, validationResult);
}

/**
 * Detects execution deviations from the trade record.
 * Returns a structured list of detected deviations with severity.
 *
 * @param {Trade} trade
 * @returns {Array<{ code: string, description: string, severity: string }>}
 */
function detectExecutionDeviations(trade) {
  const deviations = [];
  const exec = trade.execution;

  if (exec.entryType === EntryType.MARKET) {
    deviations.push({
      code:        'MARKET_ENTRY',
      description: 'Market entry used — LIMIT required by setup definition',
      severity:    ErrorSeverity.CRITICAL,
    });
  }

  const devStrings = exec.executionDeviations ?? [];
  for (const dev of devStrings) {
    const upper = dev.toUpperCase();
    let severity = ErrorSeverity.MEDIUM;
    if (upper.includes('REENT') || upper.includes('CHAS')) severity = ErrorSeverity.CRITICAL;
    if (upper.includes('TP') || upper.includes('SL')) severity = ErrorSeverity.HIGH;

    deviations.push({
      code:        dev,
      description: dev,
      severity,
    });
  }

  return deviations;
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — FULL EVALUATION PIPELINE
// The main entry point. Runs all evaluation steps and returns
// a complete EvaluationResult.
// ─────────────────────────────────────────────────────────────

/**
 * Runs the complete evaluation pipeline for a trade.
 *
 * Steps:
 *   1. Validate setup and context (setupValidator)
 *   2. Score analysis quality
 *   3. Detect behavioral errors
 *   4. Score execution quality
 *   5. Score process quality
 *   6. Score outcome coherence
 *   7. Compute composite score
 *   8. Classify grade
 *   9. Determine valid process
 *  10. Classify process/outcome label
 *  11. Classify execution profile
 *  12. Build evaluation summary
 *  13. Assemble and return complete EvaluationResult
 *
 * @param {Trade} trade - Trade object from tradeBuilder (not yet evaluated)
 * @returns {EvaluationResult}
 */
function evaluateTrade(trade) {
  // ── Step 1: Validate ───────────────────────────────────────
  const validationResult = validateTrade(trade);

  // ── Step 2: Score analysis ─────────────────────────────────
  const analysisScore = scoreAnalysisQuality(trade, validationResult);

  // ── Step 3: Detect behavioral errors ──────────────────────
  // Must happen before process scoring — process scorer needs errors
  // Note: we run detection on the trade as-is (before writing validation
  // result back), since the detection rules read validation.conditionsViolated
  // from the current trade state. We pass validationResult separately.
  const tradeWithValidation = applyValidationResult(trade, validationResult);
  const behavioralErrors    = detectBehavioralErrors(tradeWithValidation);

  // ── Step 4: Score execution ────────────────────────────────
  const executionScore = scoreExecutionQuality(trade, validationResult);

  // ── Step 5: Score process ──────────────────────────────────
  const processScore = scoreProcessQuality(trade, validationResult, behavioralErrors);

  // ── Step 6: Score outcome coherence ───────────────────────
  const outcomeCoherence = scoreOutcomeCoherence(trade, validationResult);

  // ── Step 7: Composite score ────────────────────────────────
  const overallScore = computeCompositeScore(
    analysisScore.score,
    executionScore.score,
    processScore.score
  );

  // ── Step 8: Classify grade ─────────────────────────────────
  const hasCriticalError = behavioralErrors.some(e => e.severity === ErrorSeverity.CRITICAL);
  const tradeGrade       = classifyTradeGrade(
    analysisScore.score,
    executionScore.score,
    hasCriticalError
  );

  // ── Step 9: Determine valid process ───────────────────────
  const { isValid: isValidProcess, reasons: invalidProcessReasons } = determineValidProcess({
    analysisScore:   analysisScore.score,
    executionScore:  executionScore.score,
    processScore:    processScore.score,
    validationScore: validationResult.validationScore,
    classification:  validationResult.classification,
    behavioralErrors,
  });

  // ── Step 10: Process/outcome label ────────────────────────
  const processOutcomeLabel = classifyProcessOutcome(
    isValidProcess,
    trade.result.outcome
  );

  // ── Step 11: Execution profile ────────────────────────────
  const executionProfile = classifyExecutionProfile(
    executionScore.score,
    trade.execution.executionDeviations ?? [],
    behavioralErrors
  );

  // ── Step 12: Build summary ────────────────────────────────
  const evaluationSummary = buildEvaluationSummary({
    tradeGrade,
    processOutcomeLabel,
    executionProfile,
    isValidProcess,
    invalidProcessReasons,
    outcomeCoherence,
    behavioralErrors,
  });

  // ── Step 13: Assemble EvaluationResult ────────────────────
  return {
    // The enriched trade (validation applied, ready for storage)
    enrichedTrade: tradeWithValidation,

    // Validation
    validationResult,

    // Dimension scores (full breakdowns)
    scores: {
      analysis:   analysisScore,
      execution:  executionScore,
      process:    processScore,
      overall:    overallScore,
    },

    // Outcome coherence
    outcomeCoherence,

    // Classification outputs
    classification: {
      tradeGrade,
      processOutcomeLabel,
      executionProfile,
      isValidProcess,
      invalidProcessReasons,
    },

    // Behavioral errors
    behavioralErrors,

    // Narrative summary
    summary: evaluationSummary,
  };
}

/**
 * Applies a complete EvaluationResult to a Trade object.
 * Returns a new Trade with the evaluation block fully populated.
 * Does not mutate the input trade.
 *
 * This is the bridge between evaluateTrade() and Store.trades.add/update().
 *
 * @param {Trade} trade
 * @param {EvaluationResult} evaluationResult
 * @returns {Trade}
 */
function applyEvaluationToTrade(trade, evaluationResult) {
  const {
    scores,
    classification,
    behavioralErrors,
    summary,
    validationResult,
  } = evaluationResult;

  const evaluation = {
    analysisQuality:   scores.analysis.score,
    executionQuality:  scores.execution.score,
    overallScore:      scores.overall,

    tradeGrade:        classification.tradeGrade,
    isValidProcess:    classification.isValidProcess,

    behavioralErrors,

    evaluationNotes: summary.lines,

    scoringBreakdown: {
      analysis:  scores.analysis.breakdown,
      execution: scores.execution.breakdown,
      process:   scores.process.breakdown,
    },

    // Extended classification fields (beyond the base schema)
    processOutcomeLabel:   classification.processOutcomeLabel,
    executionProfile:      classification.executionProfile,
    invalidProcessReasons: classification.invalidProcessReasons,
  };

  // Apply both evaluation and validation result
  return {
    ...evaluationResult.enrichedTrade,
    evaluation,
    updatedAt: new Date().toISOString(),
    version:   (trade.version ?? 1) + 1,
  };
}

// ━━━ memoryAggregator.js ━━━
/**
 * memoryAggregator.js — Trading Analytics Engine
 * ─────────────────────────────────────────────────
 * Pure statistical computation layer.
 * Takes arrays of trades and produces aggregate metrics.
 *
 * Responsibilities:
 *   - All numeric calculations for any trade slice
 *   - Rolling window statistics
 *   - Edge metrics (expectancy, profit factor, valid-process only)
 *   - Quality averages (analysis, execution, process scores)
 *   - Streak tracking
 *   - Outcome coherence averages
 *
 * Design rules:
 *   - Every function is pure: (Trade[]) → metrics object
 *   - No side effects. No Store access. No persistence.
 *   - Input is ALWAYS a pre-filtered array — filtering is the
 *     caller's responsibility (memoryEngine, memorySelectors)
 *   - Edge metrics only computed when isValidProcess = true trades
 *     are passed in — callers must pre-filter
 *
 * @module memoryAggregator
 * @version 1.0.0
 */



// ─────────────────────────────────────────────────────────────
// SECTION 1 — BASE STATS
// Core win/loss/R metrics over any slice of trades.
// ─────────────────────────────────────────────────────────────

/**
 * Computes base outcome statistics from a trade array.
 * Input should already be filtered by the caller.
 *
 * @param {Trade[]} trades
 * @returns {BaseOutcomeStats}
 */
function computeBaseStats(trades) {
  const total      = trades.length;
  const wins       = trades.filter(t => t.result.outcome === Outcome.WIN).length;
  const losses     = trades.filter(t => t.result.outcome === Outcome.LOSS).length;
  const breakevens = trades.filter(t => t.result.outcome === Outcome.BREAKEVEN).length;
  const open       = trades.filter(t => t.result.outcome === Outcome.OPEN).length;
  const cancelled  = trades.filter(t => t.result.outcome === Outcome.CANCELLED).length;
  const closed     = wins + losses + breakevens;

  // Only closed trades with a real P&L feed the financial metrics
  const closedWithPnl = trades.filter(
    t => t.result.pnlR !== null &&
         t.result.outcome !== Outcome.OPEN &&
         t.result.outcome !== Outcome.CANCELLED
  );

  const totalPnlR = _sum(closedWithPnl.map(t => t.result.pnlR));

  const winningTrades = closedWithPnl.filter(t => t.result.pnlR > 0);
  const losingTrades  = closedWithPnl.filter(t => t.result.pnlR < 0);

  const grossWins  = _sum(winningTrades.map(t => t.result.pnlR));
  const grossLosses = Math.abs(_sum(losingTrades.map(t => t.result.pnlR)));

  const avgWinR  = winningTrades.length > 0 ? _round(grossWins  / winningTrades.length) : 0;
  const avgLossR = losingTrades.length  > 0 ? _round(grossLosses / losingTrades.length) : 0;

  const winRate     = closed > 0 ? _round(wins / closed, 4) : 0;
  const lossRate    = closed > 0 ? _round(losses / closed, 4) : 0;
  const avgPnlR     = closedWithPnl.length > 0 ? _round(totalPnlR / closedWithPnl.length) : 0;

  // Expectancy: average R earned per trade (positive = profitable long-term)
  // Formula: (winRate × avgWin) - (lossRate × avgLoss)
  const expectancy  = _round((winRate * avgWinR) - (lossRate * avgLossR));

  // Profit factor: ratio of gross wins to gross losses
  // >1.0 = profitable, <1.0 = losing system
  const profitFactor = grossLosses > 0 ? _round(grossWins / grossLosses) : (grossWins > 0 ? 999 : 0);

  return {
    totalTrades:  total,
    wins,
    losses,
    breakevens,
    openTrades:   open,
    cancelled,
    closedTrades: closed,

    winRate,
    lossRate,
    avgPnlR,
    totalPnlR:    _round(totalPnlR),
    expectancy,
    profitFactor,
    grossWins:    _round(grossWins),
    grossLosses:  _round(grossLosses),
    avgWinR,
    avgLossR,
  };
}

/**
 * Computes quality score averages across a trade array.
 * Includes analysis, execution, process, and overall.
 *
 * @param {Trade[]} trades
 * @returns {QualityAverages}
 */
function computeQualityAverages(trades) {
  const withEval = trades.filter(t => t.evaluation?.overallScore !== undefined);
  if (withEval.length === 0) {
    return {
      avgAnalysisQuality:  0,
      avgExecutionQuality: 0,
      avgOverallScore:     0,
      sampleSize:          0,
    };
  }

  return {
    avgAnalysisQuality:  _avg(withEval.map(t => t.evaluation.analysisQuality  ?? 0)),
    avgExecutionQuality: _avg(withEval.map(t => t.evaluation.executionQuality ?? 0)),
    avgOverallScore:     _avg(withEval.map(t => t.evaluation.overallScore     ?? 0)),
    sampleSize:          withEval.length,
  };
}

/**
 * Computes grade distribution across a trade array.
 *
 * @param {Trade[]} trades
 * @returns {Object<TradeGrade, number>}
 */
function computeGradeDistribution(trades) {
  const dist = {};
  for (const grade of Object.values(TradeGrade)) {
    dist[grade] = 0;
  }
  for (const trade of trades) {
    const g = trade.evaluation?.tradeGrade;
    if (g && dist[g] !== undefined) dist[g]++;
  }
  return dist;
}

/**
 * Computes process/outcome label distribution across a trade array.
 *
 * @param {Trade[]} trades
 * @returns {Object<ProcessOutcomeLabel, number>}
 */
function computeProcessOutcomeDistribution(trades) {
  const dist = {};
  for (const label of Object.values(ProcessOutcomeLabel)) {
    dist[label] = 0;
  }
  for (const trade of trades) {
    const label = trade.evaluation?.processOutcomeLabel;
    if (label && dist[label] !== undefined) dist[label]++;
  }
  return dist;
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — VALID PROCESS EDGE METRICS
// These metrics are only meaningful when computed over
// valid-process trades. The caller must pre-filter.
// Calling these on all trades conflates skill with noise.
// ─────────────────────────────────────────────────────────────

/**
 * Computes edge metrics exclusively for valid-process trades.
 * These are the numbers that represent the trader's actual skill.
 *
 * @param {Trade[]} validProcessTrades - Pre-filtered: isValidProcess === true
 * @returns {EdgeMetrics}
 */
function computeEdgeMetrics(validProcessTrades) {
  const total  = validProcessTrades.length;
  const closed = validProcessTrades.filter(
    t => t.result.outcome !== Outcome.OPEN && t.result.outcome !== Outcome.CANCELLED
  );

  const base = computeBaseStats(validProcessTrades);

  // Valid-process win rate — the number that matters for edge confirmation
  const validWinRate = closed.length > 0
    ? _round(validProcessTrades.filter(t => t.result.outcome === Outcome.WIN).length / closed.length, 4)
    : 0;

  // Consistency: std deviation of pnlR — lower = more consistent outcomes
  const pnlRValues = closed
    .filter(t => t.result.pnlR !== null)
    .map(t => t.result.pnlR);
  const pnlStdDev = _stdDev(pnlRValues);

  // Classification breakdown within valid-process trades
  const aPlus = validProcessTrades.filter(
    t => t.setup.classification_pre === SetupClassification.A_PLUS
  );
  const bPlus = validProcessTrades.filter(
    t => t.setup.classification_pre === SetupClassification.B_PLUS
  );

  const aPlusWinRate = aPlus.filter(t => t.result.outcome === Outcome.WIN).length /
    Math.max(aPlus.filter(t => t.result.outcome !== Outcome.OPEN && t.result.outcome !== Outcome.CANCELLED).length, 1);

  const bPlusWinRate = bPlus.filter(t => t.result.outcome === Outcome.WIN).length /
    Math.max(bPlus.filter(t => t.result.outcome !== Outcome.OPEN && t.result.outcome !== Outcome.CANCELLED).length, 1);

  return {
    validProcessCount:     total,
    validProcessClosed:    closed.length,
    validProcessWinRate:   validWinRate,
    validProcessExpectancy: base.expectancy,
    validProcessProfitFactor: base.profitFactor,
    validProcessTotalPnlR: base.totalPnlR,
    pnlStdDev:             _round(pnlStdDev),
    consistencyScore:      _computeConsistencyScore(pnlStdDev, base.avgPnlR),

    // By classification within valid process
    aPlus: {
      count:   aPlus.length,
      winRate: _round(aPlusWinRate, 4),
    },
    bPlus: {
      count:   bPlus.length,
      winRate: _round(bPlusWinRate, 4),
    },
  };
}

/**
 * Computes execution consistency score across a trade slice.
 * Measures how closely the trader's execution matches the plan.
 *
 * @param {Trade[]} trades
 * @returns {number} 0–100
 */
function computeExecutionConsistency(trades) {
  const withExec = trades.filter(t => t.evaluation?.executionQuality !== undefined);
  if (withExec.length === 0) return 0;

  const scores = withExec.map(t => t.evaluation.executionQuality ?? 0);
  const avg    = _avg(scores);
  const stdDev = _stdDev(scores);

  // High average + low variance = high consistency
  // Penalize high variance even if average is good
  const variancePenalty = Math.min(stdDev * 0.5, 20);
  return _clamp(Math.round(avg - variancePenalty));
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — STREAK TRACKING
// Computed incrementally from recent trades.
// ─────────────────────────────────────────────────────────────

/**
 * Computes win/loss streaks from an ordered array of trades.
 * Trades must be sorted oldest-first for correct streak calculation.
 *
 * @param {Trade[]} tradesOldestFirst
 * @returns {StreakStats}
 */
function computeStreaks(tradesOldestFirst) {
  let currentWinStreak  = 0;
  let currentLossStreak = 0;
  let maxWinStreak      = 0;
  let maxLossStreak     = 0;
  let tempWin           = 0;
  let tempLoss          = 0;

  for (const trade of tradesOldestFirst) {
    const o = trade.result.outcome;
    if (o === Outcome.OPEN || o === Outcome.CANCELLED) continue;

    if (o === Outcome.WIN) {
      tempWin++;
      tempLoss = 0;
      if (tempWin > maxWinStreak) maxWinStreak = tempWin;
    } else if (o === Outcome.LOSS) {
      tempLoss++;
      tempWin = 0;
      if (tempLoss > maxLossStreak) maxLossStreak = tempLoss;
    } else {
      // BREAKEVEN resets both
      tempWin  = 0;
      tempLoss = 0;
    }
  }

  // Current streaks are the final temp values
  currentWinStreak  = tempWin;
  currentLossStreak = tempLoss;

  return {
    currentWinStreak,
    currentLossStreak,
    maxWinStreak,
    maxLossStreak,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 4 — ROLLING WINDOW STATS
// Short-window metrics for detecting recent performance shifts.
// Recency-weighted: recent trades matter more for trend detection.
// ─────────────────────────────────────────────────────────────

/**
 * Computes rolling window statistics for a trade array.
 * The input should already be the N most recent trades.
 * Applies linear recency weighting: most recent trade has
 * weight N, oldest has weight 1.
 *
 * @param {Trade[]} recentTradesNewestFirst
 * @returns {RollingStats}
 */
function computeRollingStats(recentTradesNewestFirst) {
  const trades = recentTradesNewestFirst.slice(); // don't mutate
  const n = trades.length;
  if (n === 0) {
    return {
      count: 0, weightedWinRate: 0, weightedAvgPnlR: 0,
      recentExpectancy: 0, trend: 'INSUFFICIENT_DATA',
    };
  }

  let weightedWins    = 0;
  let weightedPnlR    = 0;
  let totalWeight     = 0;
  let closedCount     = 0;

  for (let i = 0; i < n; i++) {
    const trade  = trades[i];
    const weight = n - i; // newest = weight n, oldest = weight 1
    const o = trade.result.outcome;

    if (o === Outcome.OPEN || o === Outcome.CANCELLED) continue;

    closedCount++;
    totalWeight += weight;

    if (o === Outcome.WIN) weightedWins += weight;
    if (trade.result.pnlR !== null) weightedPnlR += trade.result.pnlR * weight;
  }

  const weightedWinRate = totalWeight > 0 ? _round(weightedWins / totalWeight, 4) : 0;
  const weightedAvgPnlR = totalWeight > 0 ? _round(weightedPnlR / totalWeight) : 0;

  // Simple trend detection: compare first half vs second half win rates
  const trend = _detectTrend(trades);

  return {
    count:              n,
    closedCount,
    weightedWinRate,
    weightedAvgPnlR,
    recentExpectancy:   weightedAvgPnlR,
    trend,
  };
}

/**
 * Detects whether recent performance trend is improving, declining,
 * or stable by comparing the two halves of the window.
 *
 * @param {Trade[]} tradesNewestFirst
 * @returns {'IMPROVING' | 'DECLINING' | 'STABLE' | 'INSUFFICIENT_DATA'}
 */
function _detectTrend(tradesNewestFirst) {
  const closed = tradesNewestFirst.filter(
    t => t.result.outcome !== Outcome.OPEN && t.result.outcome !== Outcome.CANCELLED
  );
  if (closed.length < 6) return 'INSUFFICIENT_DATA';

  const mid   = Math.floor(closed.length / 2);
  const recent = closed.slice(0, mid);   // newest
  const older  = closed.slice(mid);      // oldest

  const recentWR = recent.filter(t => t.result.outcome === Outcome.WIN).length / recent.length;
  const olderWR  = older.filter(t => t.result.outcome === Outcome.WIN).length / older.length;

  const delta = recentWR - olderWR;
  if (delta >  0.10) return 'IMPROVING';
  if (delta < -0.10) return 'DECLINING';
  return 'STABLE';
}


// ─────────────────────────────────────────────────────────────
// SECTION 5 — DIMENSIONAL AGGREGATIONS
// Pre-built aggregation patterns for specific dimensions.
// Used by memoryEngine to build cross-dimensional slices.
// ─────────────────────────────────────────────────────────────

/**
 * Builds a complete stats object for a single dimension slice.
 * Combines base stats + quality averages + grade distribution.
 *
 * This is the unified stats shape stored in every bySetup,
 * bySession, byMarketCondition, etc. bucket.
 *
 * @param {Trade[]} trades - Pre-filtered trades for this slice
 * @param {Trade[]} validProcessTrades - Pre-filtered valid-process trades
 * @param {Trade[]} allTradesOldestFirst - For streak computation
 * @returns {DimensionalStats}
 */
function computeDimensionalStats(trades, validProcessTrades, allTradesOldestFirst = []) {
  return {
    ...computeBaseStats(trades),
    ...computeQualityAverages(trades),
    gradeDistribution:        computeGradeDistribution(trades),
    processOutcomeDistribution: computeProcessOutcomeDistribution(trades),
    executionConsistency:     computeExecutionConsistency(trades),
    edgeMetrics:              computeEdgeMetrics(validProcessTrades),
    streaks:                  computeStreaks(allTradesOldestFirst),
    sampleSize:               trades.length,
    validProcessCount:        validProcessTrades.length,
    lastUpdated:              new Date().toISOString(),
  };
}

/**
 * Groups trades by a key extractor function and computes
 * dimensional stats for each group.
 *
 * @param {Trade[]} trades
 * @param {(trade: Trade) => string | null} keyExtractor
 * @param {(trade: Trade) => boolean} validProcessFilter
 * @returns {Object<string, DimensionalStats>}
 */
function groupAndAggregate(trades, keyExtractor, validProcessFilter) {
  const groups = new Map();

  for (const trade of trades) {
    const key = keyExtractor(trade);
    if (key === null || key === undefined) continue;

    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(trade);
  }

  const result = {};
  for (const [key, groupTrades] of groups) {
    const validProcess = groupTrades.filter(validProcessFilter);
    const oldestFirst  = [...groupTrades].sort(
      (a, b) => new Date(a.createdAt) - new Date(b.createdAt)
    );
    result[key] = computeDimensionalStats(groupTrades, validProcess, oldestFirst);
  }

  return result;
}


// ─────────────────────────────────────────────────────────────
// SECTION 6 — BEHAVIOR AGGREGATION
// Computes frequency and impact of behavioral errors.
// Separated from financial metrics — different analytical purpose.
// ─────────────────────────────────────────────────────────────

/**
 * Aggregates behavioral error statistics across a trade array.
 * Returns a map of errorCode → ErrorAggregateStats.
 *
 * @param {Trade[]} trades
 * @returns {Object<string, ErrorAggregateStats>}
 */
function aggregateBehaviorErrors(trades) {
  const registry = {};

  for (const trade of trades) {
    const errors = trade.evaluation?.behavioralErrors ?? [];
    for (const error of errors) {
      if (!registry[error.code]) {
        registry[error.code] = {
          code:        error.code,
          category:    error.category,
          severity:    error.severity,
          description: error.description,

          totalOccurrences:   0,
          tradeIds:           [],

          // Impact tracking
          winsWhenPresent:     0,
          lossesWhenPresent:   0,
          totalPnlRWhenPresent: 0,
          avgScoreWhenPresent:  0,
          scoreAccumulator:     0,  // internal running total

          lastSeen: null,
        };
      }

      const entry = registry[error.code];
      entry.totalOccurrences++;
      entry.tradeIds.push(trade.id);
      entry.lastSeen = trade.createdAt;

      // Impact
      if (trade.result.outcome === Outcome.WIN)  entry.winsWhenPresent++;
      if (trade.result.outcome === Outcome.LOSS) entry.lossesWhenPresent++;
      if (trade.result.pnlR !== null)            entry.totalPnlRWhenPresent += trade.result.pnlR;
      if (trade.evaluation?.overallScore !== undefined) {
        entry.scoreAccumulator += trade.evaluation.overallScore;
      }
    }
  }

  // Finalize derived fields
  for (const entry of Object.values(registry)) {
    const closedWithError = entry.winsWhenPresent + entry.lossesWhenPresent;
    entry.winRateWhenPresent  = closedWithError > 0
      ? _round(entry.winsWhenPresent / closedWithError, 4)
      : 0;
    entry.avgScoreWhenPresent = entry.totalOccurrences > 0
      ? _round(entry.scoreAccumulator / entry.totalOccurrences)
      : 0;
    entry.avgPnlRWhenPresent  = closedWithError > 0
      ? _round(entry.totalPnlRWhenPresent / closedWithError)
      : 0;
    entry.isRecurring = entry.totalOccurrences >= 3;

    // Clean up internal accumulator — not needed in the output
    delete entry.scoreAccumulator;
  }

  return registry;
}

/**
 * Computes the last-N occurrences of each error in a rolling window.
 * Used to determine isRecurring in recent trades specifically.
 *
 * @param {Trade[]} recentTradesNewestFirst
 * @param {number}  windowSize
 * @returns {Object<string, number>} errorCode → count in window
 */
function computeRecentErrorFrequency(recentTradesNewestFirst, windowSize = 10) {
  const window  = recentTradesNewestFirst.slice(0, windowSize);
  const freq    = {};

  for (const trade of window) {
    for (const error of (trade.evaluation?.behavioralErrors ?? [])) {
      freq[error.code] = (freq[error.code] ?? 0) + 1;
    }
  }

  return freq;
}


// ─────────────────────────────────────────────────────────────
// SECTION 7 — INCREMENTAL UPDATE HELPERS
// These functions update an existing stats object by incorporating
// a single new trade. O(1) per trade — no full recomputation.
// ─────────────────────────────────────────────────────────────

/**
 * Incrementally updates a BaseOutcomeStats object with one new trade.
 * Used by memoryEngine for O(1) memory updates.
 *
 * @param {Object} existing - Current BaseOutcomeStats
 * @param {Trade}  newTrade
 * @returns {Object} Updated stats (new object, not mutated)
 */
function incrementalBaseUpdate(existing, newTrade) {
  const o = newTrade.result.outcome;

  const wins       = existing.wins       + (o === Outcome.WIN       ? 1 : 0);
  const losses     = existing.losses     + (o === Outcome.LOSS      ? 1 : 0);
  const breakevens = existing.breakevens + (o === Outcome.BREAKEVEN ? 1 : 0);
  const open       = existing.openTrades + (o === Outcome.OPEN      ? 1 : 0);
  const cancelled  = existing.cancelled  + (o === Outcome.CANCELLED ? 1 : 0);
  const closed     = wins + losses + breakevens;
  const total      = existing.totalTrades + 1;

  const newPnlR    = newTrade.result.pnlR ?? 0;
  const totalPnlR  = _round(existing.totalPnlR + (o !== Outcome.OPEN && o !== Outcome.CANCELLED ? newPnlR : 0));

  // Recalculate derived metrics
  const closedTrades = closed;
  const winRate      = closedTrades > 0 ? _round(wins / closedTrades, 4) : 0;

  // For avgPnlR, avgWinR, avgLossR: incremental running averages
  // Using: newAvg = oldAvg + (newVal - oldAvg) / newCount
  const isClosedTrade = o !== Outcome.OPEN && o !== Outcome.CANCELLED && newTrade.result.pnlR !== null;
  const prevClosedCount = existing.closedTrades ?? (existing.wins + existing.losses + existing.breakevens);
  const newClosedCount  = prevClosedCount + (isClosedTrade ? 1 : 0);

  const avgPnlR = isClosedTrade && newClosedCount > 0
    ? _round(existing.avgPnlR + (newPnlR - existing.avgPnlR) / newClosedCount)
    : existing.avgPnlR;

  const avgWinR = o === Outcome.WIN && wins > 0
    ? _round(existing.avgWinR + (newPnlR - existing.avgWinR) / wins)
    : existing.avgWinR;

  const avgLossR = o === Outcome.LOSS && losses > 0
    ? _round(existing.avgLossR + (Math.abs(newPnlR) - existing.avgLossR) / losses)
    : existing.avgLossR;

  const lossRate     = closedTrades > 0 ? _round(losses / closedTrades, 4) : 0;
  const expectancy   = _round((winRate * avgWinR) - (lossRate * avgLossR));
  const grossWins    = _round((existing.grossWins  ?? 0) + (o === Outcome.WIN  ? newPnlR : 0));
  const grossLosses  = _round((existing.grossLosses ?? 0) + (o === Outcome.LOSS ? Math.abs(newPnlR) : 0));
  const profitFactor = grossLosses > 0 ? _round(grossWins / grossLosses) : (grossWins > 0 ? 999 : 0);

  return {
    ...existing,
    totalTrades: total,
    wins, losses, breakevens,
    openTrades: open, cancelled,
    closedTrades: closed,
    winRate, lossRate,
    avgPnlR, totalPnlR,
    expectancy, profitFactor,
    grossWins, grossLosses,
    avgWinR, avgLossR,
    lastUpdated: new Date().toISOString(),
  };
}

/**
 * Incrementally updates quality score averages with one new trade.
 * Uses Welford's online algorithm for numerically stable running mean.
 *
 * @param {Object} existing - Current quality averages
 * @param {Trade}  newTrade
 * @param {number} newCount - New total count (after adding this trade)
 * @returns {Object}
 */
function incrementalQualityUpdate(existing, newTrade, newCount) {
  if (!newTrade.evaluation?.overallScore !== undefined) return existing;

  const analysis  = newTrade.evaluation?.analysisQuality  ?? 0;
  const execution = newTrade.evaluation?.executionQuality ?? 0;
  const overall   = newTrade.evaluation?.overallScore     ?? 0;

  // Welford's online mean: newMean = oldMean + (newVal - oldMean) / newCount
  return {
    avgAnalysisQuality:  _round(existing.avgAnalysisQuality  + (analysis  - existing.avgAnalysisQuality)  / newCount),
    avgExecutionQuality: _round(existing.avgExecutionQuality + (execution - existing.avgExecutionQuality) / newCount),
    avgOverallScore:     _round(existing.avgOverallScore     + (overall   - existing.avgOverallScore)     / newCount),
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 8 — INTERNAL MATH UTILITIES
// ─────────────────────────────────────────────────────────────

function _sum(values) {
  return values.reduce((acc, v) => acc + (v ?? 0), 0);
}

function _avg(values) {
  if (values.length === 0) return 0;
  return _round(_sum(values) / values.length);
}

function _round(val, decimals = 2) {
  const factor = Math.pow(10, decimals);
  return Math.round((val ?? 0) * factor) / factor;
}

function _clamp(val, min = 0, max = 100) {
  return Math.max(min, Math.min(max, val));
}

function _stdDev(values) {
  if (values.length < 2) return 0;
  const mean = _sum(values) / values.length;
  const variance = _sum(values.map(v => Math.pow(v - mean, 2))) / values.length;
  return Math.sqrt(variance);
}

/**
 * Converts P&L standard deviation and average into a consistency score (0–100).
 * Higher average + lower std deviation = higher consistency.
 *
 * @param {number} stdDev
 * @param {number} avgPnlR
 * @returns {number} 0–100
 */
function _computeConsistencyScore(stdDev, avgPnlR) {
  if (stdDev === 0) return avgPnlR > 0 ? 100 : 50;
  // Coefficient of variation — normalized inverse
  const cv    = Math.abs(stdDev / (Math.abs(avgPnlR) + 0.01));
  const score = Math.max(0, 100 - (cv * 30));
  return _clamp(Math.round(score));
}

// ━━━ memorySelectors.js ━━━
/**
 * memorySelectors.js — Trading Analytics Engine
 * ───────────────────────────────────────────────
 * Optimized read layer over the MemorySnapshot.
 * All queries operate on the snapshot — never on raw trade arrays.
 * This guarantees O(1) reads for any dimension.
 *
 * Responsibilities:
 *   - Structured access to all memory dimensions
 *   - Contextual comparisons (e.g. setup A vs setup B)
 *   - Edge ranking (which setup/session has best edge?)
 *   - Behavioral pattern detection from aggregated data
 *   - Answer the system's core analytical questions
 *
 * Rules:
 *   - No computation here — only selection and comparison
 *   - All heavy stats are pre-computed in memoryAggregator
 *   - Selectors return null/empty when insufficient data exists
 *   - Every selector documents its minimum sample requirement
 *
 * @module memorySelectors
 * @version 1.0.0
 */


// Minimum trades in a slice to consider its statistics meaningful
const _MS_EDGE       = 15;  // For edge detection
const _MS_PAT    = 8;   // For pattern detection
const _MS_CMP = 5;   // For basic comparisons


// ─────────────────────────────────────────────────────────────
// SECTION 1 — SETUP SELECTORS
// ─────────────────────────────────────────────────────────────

/**
 * Returns stats for a specific setup type.
 * Returns null if setup has no data.
 *
 * @param {MemorySnapshot} memory
 * @param {string} setupType - SetupType enum value
 * @returns {DimensionalStats | null}
 */
function getSetupStats(memory, setupType) {
  return memory.bySetup?.[setupType] ?? null;
}

/**
 * Returns stats for all setup types as an array, sorted by expectancy desc.
 * Only includes setups with at least _MS_CMP trades.
 *
 * @param {MemorySnapshot} memory
 * @returns {Array<{ setupType: string, stats: DimensionalStats }>}
 */
function getAllSetupStats(memory) {
  return Object.entries(memory.bySetup ?? {})
    .filter(([, stats]) => stats.totalTrades >= _MS_CMP)
    .map(([setupType, stats]) => ({ setupType, stats }))
    .sort((a, b) => (b.stats.edgeMetrics?.validProcessExpectancy ?? 0) -
                    (a.stats.edgeMetrics?.validProcessExpectancy ?? 0));
}

/**
 * Returns the setup with the highest confirmed edge.
 * Requires _MS_EDGE valid-process trades.
 *
 * @param {MemorySnapshot} memory
 * @returns {{ setupType: string, stats: DimensionalStats } | null}
 */
function getBestSetupByEdge(memory) {
  const candidates = getAllSetupStats(memory).filter(
    ({ stats }) => (stats.edgeMetrics?.validProcessCount ?? 0) >= _MS_EDGE
  );
  return candidates[0] ?? null;
}

/**
 * Returns the valid-process win rate for a specific setup.
 * Returns null if insufficient data.
 *
 * @param {MemorySnapshot} memory
 * @param {string} setupType
 * @returns {number | null}
 */
function getSetupValidWinRate(memory, setupType) {
  const stats = getSetupStats(memory, setupType);
  if (!stats) return null;
  const count = stats.edgeMetrics?.validProcessCount ?? 0;
  return count >= _MS_CMP
    ? stats.edgeMetrics?.validProcessWinRate ?? null
    : null;
}

/**
 * Compares two setups across key performance dimensions.
 * Returns a structured comparison or null if insufficient data for either.
 *
 * @param {MemorySnapshot} memory
 * @param {string} setupTypeA
 * @param {string} setupTypeB
 * @returns {SetupComparison | null}
 */
function compareSetups(memory, setupTypeA, setupTypeB) {
  const a = getSetupStats(memory, setupTypeA);
  const b = getSetupStats(memory, setupTypeB);

  if (!a || !b) return null;
  if (a.totalTrades < _MS_CMP || b.totalTrades < _MS_CMP) return null;

  return {
    [setupTypeA]: _extractComparisonMetrics(a),
    [setupTypeB]: _extractComparisonMetrics(b),
    winner: _compareWinner(a, b, setupTypeA, setupTypeB),
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — SESSION SELECTORS
// ─────────────────────────────────────────────────────────────

/**
 * Returns stats for a specific trading session.
 *
 * @param {MemorySnapshot} memory
 * @param {string} session - Session enum value
 * @returns {DimensionalStats | null}
 */
function getSessionStats(memory, session) {
  return memory.bySession?.[session] ?? null;
}

/**
 * Returns all session stats sorted by expectancy desc.
 *
 * @param {MemorySnapshot} memory
 * @returns {Array<{ session: string, stats: DimensionalStats }>}
 */
function getAllSessionStats(memory) {
  return Object.entries(memory.bySession ?? {})
    .filter(([, stats]) => stats.totalTrades >= _MS_CMP)
    .map(([session, stats]) => ({ session, stats }))
    .sort((a, b) => (b.stats.expectancy ?? 0) - (a.stats.expectancy ?? 0));
}

/**
 * Returns the session with the worst performance.
 * Useful for generating warnings about sessions to avoid.
 *
 * @param {MemorySnapshot} memory
 * @returns {{ session: string, stats: DimensionalStats } | null}
 */
function getWorstSession(memory) {
  const sessions = getAllSessionStats(memory).filter(
    ({ stats }) => stats.totalTrades >= _MS_PAT
  );
  if (sessions.length === 0) return null;
  return sessions[sessions.length - 1]; // lowest expectancy
}

/**
 * Returns session performance for a specific setup type.
 * Cross-dimensional: which session works best for setup S1?
 *
 * @param {MemorySnapshot} memory
 * @param {string} setupType
 * @returns {Array<{ session: string, stats: Object }> | null}
 */
function getSessionStatsForSetup(memory, setupType) {
  const setupStats = getSetupStats(memory, setupType);
  if (!setupStats?.bySession) return null;

  return Object.entries(setupStats.bySession)
    .filter(([, stats]) => stats.totalTrades >= _MS_CMP)
    .map(([session, stats]) => ({ session, stats }))
    .sort((a, b) => (b.stats.expectancy ?? 0) - (a.stats.expectancy ?? 0));
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — MARKET CONDITION SELECTORS
// ─────────────────────────────────────────────────────────────

/**
 * Returns stats for a specific market condition key.
 * conditionKey format: `${trend_D1}__${volatility}` e.g. 'BULLISH__NORMAL'
 *
 * @param {MemorySnapshot} memory
 * @param {string} conditionKey
 * @returns {DimensionalStats | null}
 */
function getMarketConditionStats(memory, conditionKey) {
  return memory.byMarketCondition?.[conditionKey] ?? null;
}

/**
 * Returns all market condition stats sorted by expectancy.
 *
 * @param {MemorySnapshot} memory
 * @returns {Array<{ conditionKey: string, stats: DimensionalStats }>}
 */
function getAllMarketConditionStats(memory) {
  return Object.entries(memory.byMarketCondition ?? {})
    .filter(([, stats]) => stats.totalTrades >= _MS_CMP)
    .map(([conditionKey, stats]) => ({ conditionKey, stats }))
    .sort((a, b) => (b.stats.expectancy ?? 0) - (a.stats.expectancy ?? 0));
}

/**
 * Returns the best-performing market condition.
 *
 * @param {MemorySnapshot} memory
 * @returns {{ conditionKey: string, stats: DimensionalStats } | null}
 */
function getBestMarketCondition(memory) {
  const conditions = getAllMarketConditionStats(memory).filter(
    ({ stats }) => stats.totalTrades >= _MS_PAT
  );
  return conditions[0] ?? null;
}

/**
 * Returns stats for a specific instrument/market.
 *
 * @param {MemorySnapshot} memory
 * @param {string} market - Market enum value
 * @returns {DimensionalStats | null}
 */
function getMarketStats(memory, market) {
  return memory.byMarket?.[market] ?? null;
}


// ─────────────────────────────────────────────────────────────
// SECTION 4 — CLASSIFICATION SELECTORS
// ─────────────────────────────────────────────────────────────

/**
 * Returns stats for trades of a specific pre-classification.
 *
 * @param {MemorySnapshot} memory
 * @param {string} classification - SetupClassification enum value
 * @returns {DimensionalStats | null}
 */
function getClassificationStats(memory, classification) {
  return memory.byClassification?.[classification] ?? null;
}

/**
 * Returns the win rate difference between A+ and B+ trades.
 * If large, confirms that classification quality matters.
 *
 * @param {MemorySnapshot} memory
 * @returns {{ aPlusWinRate: number, bPlusWinRate: number, delta: number } | null}
 */
function getClassificationEdgeDifference(memory) {
  const aPlus = getClassificationStats(memory, SetupClassification.A_PLUS);
  const bPlus = getClassificationStats(memory, SetupClassification.B_PLUS);

  if (!aPlus || !bPlus) return null;
  if (aPlus.closedTrades < _MS_CMP || bPlus.closedTrades < _MS_CMP) return null;

  const aPlusWR = aPlus.edgeMetrics?.validProcessWinRate ?? aPlus.winRate;
  const bPlusWR = bPlus.edgeMetrics?.validProcessWinRate ?? bPlus.winRate;

  return {
    aPlusWinRate: aPlusWR,
    bPlusWinRate: bPlusWR,
    delta:        Math.round((aPlusWR - bPlusWR) * 10000) / 100, // as percentage
    hasSignificantDifference: Math.abs(aPlusWR - bPlusWR) > 0.10,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 5 — BEHAVIORAL PATTERN SELECTORS
// ─────────────────────────────────────────────────────────────

/**
 * Returns the error registry from memory.
 *
 * @param {MemorySnapshot} memory
 * @returns {Object<string, ErrorAggregateStats>}
 */
function getBehaviorPatterns(memory) {
  return memory.errorRegistry ?? {};
}

/**
 * Returns errors that are classified as recurring
 * (appear frequently in recent trades).
 *
 * @param {MemorySnapshot} memory
 * @returns {ErrorAggregateStats[]}
 */
function getRecurringErrors(memory) {
  return Object.values(memory.errorRegistry ?? {})
    .filter(e => e.isRecurring)
    .sort((a, b) => b.totalOccurrences - a.totalOccurrences);
}

/**
 * Returns errors that have a measurable negative impact on P&L.
 * Sorted by impact (most negative first).
 *
 * @param {MemorySnapshot} memory
 * @returns {ErrorAggregateStats[]}
 */
function getHighImpactErrors(memory) {
  return Object.values(memory.errorRegistry ?? {})
    .filter(e => e.totalOccurrences >= 3 && e.avgPnlRWhenPresent < -0.5)
    .sort((a, b) => a.avgPnlRWhenPresent - b.avgPnlRWhenPresent);
}

/**
 * Returns the win rate degradation caused by a specific error.
 * Compares win rate when error present vs global win rate.
 *
 * @param {MemorySnapshot} memory
 * @param {string} errorCode
 * @returns {{ globalWinRate: number, errorWinRate: number, impact: number } | null}
 */
function getErrorImpact(memory, errorCode) {
  const errorStats  = memory.errorRegistry?.[errorCode];
  const globalStats = memory.global;

  if (!errorStats || !globalStats) return null;
  if (errorStats.totalOccurrences < 3) return null;

  const globalWR = globalStats.winRate;
  const errorWR  = errorStats.winRateWhenPresent;

  return {
    globalWinRate: globalWR,
    errorWinRate:  errorWR,
    impact:        Math.round((errorWR - globalWR) * 10000) / 100, // negative = harmful
    isHarmful:     errorWR < globalWR - 0.05,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 6 — PROCESS/OUTCOME PATTERN SELECTORS
// ─────────────────────────────────────────────────────────────

/**
 * Returns the ratio of BAD_PROCESS_WIN trades in the total.
 * High ratio = trader is getting lucky but not building real edge.
 *
 * @param {MemorySnapshot} memory
 * @returns {{ ratio: number, count: number, total: number } | null}
 */
function getBadProcessWinRatio(memory) {
  const dist = memory.global?.processOutcomeDistribution;
  if (!dist) return null;

  const badWins = dist[ProcessOutcomeLabel.BAD_PROCESS_WIN] ?? 0;
  const total   = memory.global?.closedTrades ?? 0;
  if (total < _MS_CMP) return null;

  return {
    count: badWins,
    total,
    ratio: Math.round((badWins / total) * 10000) / 100,
    isWarning: (badWins / total) > 0.20, // >20% of wins from bad process
  };
}

/**
 * Returns the valid-process ratio — proportion of trades
 * that went through a correct process.
 * Tracks discipline over time.
 *
 * @param {MemorySnapshot} memory
 * @returns {{ validCount: number, totalClosed: number, ratio: number } | null}
 */
function getValidProcessRatio(memory) {
  const global = memory.global;
  if (!global || global.closedTrades < _MS_CMP) return null;

  const validCount  = global.validProcessCount ?? 0;
  const totalClosed = global.closedTrades;

  return {
    validCount,
    totalClosed,
    ratio:      Math.round((validCount / totalClosed) * 10000) / 100,
    isHealthy:  (validCount / totalClosed) >= 0.70,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 7 — GLOBAL / SUMMARY SELECTORS
// ─────────────────────────────────────────────────────────────

/**
 * Returns global performance stats.
 *
 * @param {MemorySnapshot} memory
 * @returns {DimensionalStats | null}
 */
function getGlobalStats(memory) {
  return memory.global ?? null;
}

/**
 * Returns rolling window stats for recent performance.
 *
 * @param {MemorySnapshot} memory
 * @param {number} windowSize - 'short' (10) or 'long' (30)
 * @returns {RollingStats | null}
 */
function getRecentPerformance(memory, windowSize = 'short') {
  return windowSize === 'short'
    ? memory.rolling?.last10 ?? null
    : memory.rolling?.last30 ?? null;
}

/**
 * Returns a system health summary — quick overview of the
 * most important metrics across all dimensions.
 *
 * @param {MemorySnapshot} memory
 * @returns {HealthSummary}
 */
function getSystemHealthSummary(memory) {
  const global        = getGlobalStats(memory);
  const recurringErr  = getRecurringErrors(memory);
  const validRatio    = getValidProcessRatio(memory);
  const badProcRatio  = getBadProcessWinRatio(memory);
  const recentPerf    = getRecentPerformance(memory, 'short');
  const bestSetup     = getBestSetupByEdge(memory);
  const worstSession  = getWorstSession(memory);

  return {
    totalTrades:        global?.totalTrades ?? 0,
    globalExpectancy:   global?.expectancy  ?? 0,
    globalWinRate:      global?.winRate     ?? 0,
    globalPnlR:         global?.totalPnlR   ?? 0,

    validProcessRatio:  validRatio?.ratio   ?? null,
    processHealthy:     validRatio?.isHealthy ?? null,

    recentTrend:        recentPerf?.trend   ?? 'INSUFFICIENT_DATA',
    recentWinRate:      recentPerf?.weightedWinRate ?? null,

    recurringErrorCount: recurringErr.length,
    topRecurringError:   recurringErr[0]?.code ?? null,

    badProcessWinRatio: badProcRatio?.ratio ?? null,
    badProcessWarning:  badProcRatio?.isWarning ?? false,

    bestSetupType:      bestSetup?.setupType ?? null,
    bestSetupExpectancy: bestSetup?.stats?.edgeMetrics?.validProcessExpectancy ?? null,

    worstSessionType:   worstSession?.session ?? null,
    worstSessionExpectancy: worstSession?.stats?.expectancy ?? null,

    hasEnoughData:      (global?.totalTrades ?? 0) >= _MS_CMP,
    hasEdgeData:        (global?.validProcessCount ?? 0) >= _MS_EDGE,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 8 — INTERNAL HELPERS
// ─────────────────────────────────────────────────────────────

function _extractComparisonMetrics(stats) {
  return {
    totalTrades:        stats.totalTrades,
    winRate:            stats.winRate,
    expectancy:         stats.expectancy,
    profitFactor:       stats.profitFactor,
    avgOverallScore:    stats.avgOverallScore,
    executionConsistency: stats.executionConsistency,
    validProcessCount:  stats.edgeMetrics?.validProcessCount ?? 0,
    validProcessWinRate: stats.edgeMetrics?.validProcessWinRate ?? 0,
  };
}

function _compareWinner(statsA, statsB, keyA, keyB) {
  const scoreA = (statsA.edgeMetrics?.validProcessExpectancy ?? statsA.expectancy ?? 0)
               + (statsA.avgOverallScore ?? 0) * 0.01;
  const scoreB = (statsB.edgeMetrics?.validProcessExpectancy ?? statsB.expectancy ?? 0)
