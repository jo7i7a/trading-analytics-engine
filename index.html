               + (statsB.avgOverallScore ?? 0) * 0.01;

  if (Math.abs(scoreA - scoreB) < 0.05) return 'TIE';
  return scoreA > scoreB ? keyA : keyB;
}

// ━━━ memoryEngine.js ━━━
/**
 * memoryEngine.js — Trading Analytics Engine
 * ────────────────────────────────────────────
 * Orchestrator for the memory system.
 * Manages incremental updates to the MemorySnapshot after every trade.
 *
 * The core contract:
 *   Every evaluated trade triggers updateMemory().
 *   updateMemory() updates ALL dimensions incrementally — O(1) per trade.
 *   rebuildMemory() recomputes everything from scratch — O(n) — used
 *   only for data recovery, imports, or manual recalculation.
 *
 * Separation of concerns:
 *   - memoryAggregator: HOW to compute stats (pure math)
 *   - memorySelectors: HOW to query stats (pure reads)
 *   - memoryEngine: WHEN and WHERE to update (orchestration)
 *
 * Edge contamination prevention:
 *   Trades with isValidProcess = false are stored in a SEPARATE
 *   behavioral bucket and never feed the edge metrics.
 *   The financial metrics (expectancy, profit factor, valid-process
 *   win rate) are computed exclusively from valid-process trades.
 *
 * @module memoryEngine
 * @version 1.0.0
 */






// ─────────────────────────────────────────────────────────────
// KEY EXTRACTORS
// Functions that map a trade to a dimensional bucket key.
// Used by groupAndAggregate in rebuild and incremental updates.
// ─────────────────────────────────────────────────────────────

const KEY_EXTRACTORS = {
  setup:     (t) => t.setup?.type ?? null,
  session:   (t) => t.context?.session ?? null,
  market:    (t) => t.context?.market  ?? null,
  condition: (t) => _buildConditionKey(t),
  classification: (t) => t.setup?.classification_pre ?? null,
};

/**
 * Builds a market condition composite key.
 * Format: `${trend_D1}__${volatility}`
 * e.g. 'BULLISH__NORMAL', 'RANGING__HIGH'
 *
 * @param {Trade} trade
 * @returns {string | null}
 */
function _buildConditionKey(trade) {
  const mc = trade.context?.marketCondition;
  if (!mc) return null;
  const trend = mc.trend_D1 ?? 'UNCLEAR';
  const vol   = mc.volatility ?? 'NORMAL';
  return `${trend}__${vol}`;
}

/**
 * Standard valid-process filter used across all dimensions.
 * @param {Trade} trade
 * @returns {boolean}
 */
const IS_VALID_PROCESS = (trade) => trade.evaluation?.isValidProcess === true;


// ─────────────────────────────────────────────────────────────
// SECTION 1 — FULL REBUILD
// Recomputes all memory from the full trade history.
// Use only for: initial setup, data import, manual reset.
// ─────────────────────────────────────────────────────────────

/**
 * Rebuilds the complete MemorySnapshot from the full trade history.
 * O(n×d) where n = trades, d = dimensions.
 *
 * Steps:
 *   1. Load all trades from Store
 *   2. Compute global stats
 *   3. Group and compute all dimensional stats
 *   4. Compute rolling windows
 *   5. Aggregate behavioral errors
 *   6. Persist and return new snapshot
 *
 * @returns {{ ok: boolean, snapshot?: MemorySnapshot, error?: string }}
 */
function rebuildMemory() {
  try {
    const allTrades = Store.trades.getAll();

    if (allTrades.length === 0) {
      const empty = createMemorySnapshot();
      Store.memory.set(empty);
      return { ok: true, snapshot: empty };
    }

    const snapshot = _buildSnapshotFromTrades(allTrades);
    const result   = Store.memory.set(snapshot);

    if (!result.ok) {
      return { ok: false, error: `Failed to persist rebuilt memory: ${result.error}` };
    }

    console.log(`[memoryEngine] Rebuilt memory from ${allTrades.length} trades.`);
    return { ok: true, snapshot };

  } catch (err) {
    return { ok: false, error: `rebuildMemory failed: ${err.message}` };
  }
}

/**
 * Core snapshot builder from a trade array.
 * Internal — used by both rebuildMemory and tests.
 *
 * @param {Trade[]} trades
 * @returns {MemorySnapshot}
 */
function _buildSnapshotFromTrades(trades) {
  const snapshot  = createMemorySnapshot();
  const validTrades = trades.filter(IS_VALID_PROCESS);

  const oldestFirst = [...trades].sort(
    (a, b) => new Date(a.createdAt) - new Date(b.createdAt)
  );
  const newestFirst = [...oldestFirst].reverse();

  // ── Global stats ─────────────────────────────────────────
  snapshot.global = _buildGlobalStats(trades, validTrades, oldestFirst, newestFirst);

  // ── Dimensional breakdowns ────────────────────────────────
  snapshot.bySetup    = groupAndAggregate(trades, KEY_EXTRACTORS.setup,    IS_VALID_PROCESS);
  snapshot.bySession  = groupAndAggregate(trades, KEY_EXTRACTORS.session,  IS_VALID_PROCESS);
  snapshot.byMarket   = groupAndAggregate(trades, KEY_EXTRACTORS.market,   IS_VALID_PROCESS);
  snapshot.byMarketCondition = groupAndAggregate(trades, KEY_EXTRACTORS.condition, IS_VALID_PROCESS);
  snapshot.byClassification  = groupAndAggregate(trades, KEY_EXTRACTORS.classification, IS_VALID_PROCESS);

  // ── Cross-dimensional: session breakdown per setup ────────
  _attachSessionBreakdownsToSetups(snapshot, trades, validTrades);

  // ── Rolling windows ───────────────────────────────────────
  snapshot.rolling = {
    last10: computeRollingStats(newestFirst.slice(0, 10)),
    last30: computeRollingStats(newestFirst.slice(0, 30)),
  };

  // ── Behavioral error registry ─────────────────────────────
  snapshot.errorRegistry = aggregateBehaviorErrors(trades);

  // ── Recent error frequency (for isRecurring flag) ─────────
  _updateRecurringFlags(snapshot.errorRegistry, newestFirst);

  // ── Rolling trade ID lists ────────────────────────────────
  snapshot.last10Trades = newestFirst.slice(0, 10).map(t => t.id);
  snapshot.last30Trades = newestFirst.slice(0, 30).map(t => t.id);

  // ── Metadata ──────────────────────────────────────────────
  snapshot.tradeCount  = trades.length;
  snapshot.lastUpdated = new Date().toISOString();

  return snapshot;
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — INCREMENTAL UPDATE
// Adds a single evaluated trade to the existing snapshot.
// O(1) — updates only the affected buckets.
// ─────────────────────────────────────────────────────────────

/**
 * Updates the MemorySnapshot incrementally after a single new trade
 * has been evaluated and persisted to Store.
 *
 * This is the PRIMARY memory update path — called after every trade.
 *
 * @param {Trade} newTrade - Fully evaluated trade (with evaluation block)
 * @returns {{ ok: boolean, snapshot?: MemorySnapshot, error?: string }}
 */
function updateMemory(newTrade) {
  try {
    let snapshot = Store.memory.get();

    // If no snapshot exists, do a full rebuild instead
    if (!snapshot || snapshot.tradeCount === 0) {
      return rebuildMemory();
    }

    snapshot = _incrementalUpdate(snapshot, newTrade);

    const result = Store.memory.set(snapshot);
    if (!result.ok) {
      return { ok: false, error: `Failed to persist memory update: ${result.error}` };
    }

    return { ok: true, snapshot };

  } catch (err) {
    return { ok: false, error: `updateMemory failed: ${err.message}` };
  }
}

/**
 * Core incremental update logic.
 * Returns a new snapshot — does not mutate the input.
 *
 * @param {MemorySnapshot} current
 * @param {Trade} trade
 * @returns {MemorySnapshot}
 */
function _incrementalUpdate(current, trade) {
  const snapshot    = { ...current };
  const isValid     = IS_VALID_PROCESS(trade);
  const newCount    = (snapshot.tradeCount ?? 0) + 1;

  // ── Global ────────────────────────────────────────────────
  snapshot.global = _updateDimensionalSlice(snapshot.global, trade, isValid, newCount);

  // ── By setup ──────────────────────────────────────────────
  snapshot.bySetup = _updateDimensionalMap(
    snapshot.bySetup, trade, isValid, newCount, KEY_EXTRACTORS.setup
  );

  // ── By session ────────────────────────────────────────────
  snapshot.bySession = _updateDimensionalMap(
    snapshot.bySession, trade, isValid, newCount, KEY_EXTRACTORS.session
  );

  // ── By market ─────────────────────────────────────────────
  snapshot.byMarket = _updateDimensionalMap(
    snapshot.byMarket, trade, isValid, newCount, KEY_EXTRACTORS.market
  );

  // ── By market condition ───────────────────────────────────
  snapshot.byMarketCondition = _updateDimensionalMap(
    snapshot.byMarketCondition, trade, isValid, newCount, KEY_EXTRACTORS.condition
  );

  // ── By classification ─────────────────────────────────────
  snapshot.byClassification = _updateDimensionalMap(
    snapshot.byClassification, trade, isValid, newCount, KEY_EXTRACTORS.classification
  );

  // ── Rolling windows ───────────────────────────────────────
  // Get recent trades for rolling update — cheaper than full recompute
  const recentTrades = Store.trades.getRecent(30);
  snapshot.rolling = {
    last10: computeRollingStats(recentTrades.slice(0, 10)),
    last30: computeRollingStats(recentTrades),
  };

  // ── Error registry ────────────────────────────────────────
  snapshot.errorRegistry = _updateErrorRegistry(
    snapshot.errorRegistry ?? {},
    trade,
    recentTrades
  );

  // ── Rolling ID lists ──────────────────────────────────────
  snapshot.last10Trades = [trade.id, ...(snapshot.last10Trades ?? [])].slice(0, 10);
  snapshot.last30Trades = [trade.id, ...(snapshot.last30Trades ?? [])].slice(0, 30);

  // ── Metadata ──────────────────────────────────────────────
  snapshot.tradeCount  = newCount;
  snapshot.lastUpdated = new Date().toISOString();

  return snapshot;
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — SETUP AND BEHAVIOR STATS (Public API)
// Named exports used by evaluationEngine pipeline.
// ─────────────────────────────────────────────────────────────

/**
 * Updates the setup-specific stats in the memory snapshot.
 * Exposed for use in the evaluation pipeline when only setup
 * stats need refreshing (e.g. after a trade update).
 *
 * @param {Trade} trade
 * @returns {{ ok: boolean }}
 */
function updateSetupStats(trade) {
  try {
    const snapshot = Store.memory.get() ?? createMemorySnapshot();
    const isValid  = IS_VALID_PROCESS(trade);
    const newCount = snapshot.tradeCount ?? 0;

    snapshot.bySetup = _updateDimensionalMap(
      snapshot.bySetup, trade, isValid, newCount, KEY_EXTRACTORS.setup
    );

    Store.memory.set(snapshot);
    return { ok: true };
  } catch (err) {
    return { ok: false, error: err.message };
  }
}

/**
 * Updates behavioral error stats in memory after a trade evaluation.
 *
 * @param {Trade} trade
 * @returns {{ ok: boolean }}
 */
function updateBehaviorStats(trade) {
  try {
    const snapshot    = Store.memory.get() ?? createMemorySnapshot();
    const recentTrades = Store.trades.getRecent(30);

    snapshot.errorRegistry = _updateErrorRegistry(
      snapshot.errorRegistry ?? {},
      trade,
      recentTrades
    );

    Store.memory.set(snapshot);
    return { ok: true };
  } catch (err) {
    return { ok: false, error: err.message };
  }
}

/**
 * Returns a fresh MemorySnapshot object (empty).
 * Exported for use in initialization and testing.
 *
 * @returns {MemorySnapshot}
 */



// ─────────────────────────────────────────────────────────────
// SECTION 4 — INTERNAL UPDATE HELPERS
// ─────────────────────────────────────────────────────────────

/**
 * Updates a single dimensional stats slice incrementally.
 *
 * @param {Object} existing - Current stats for this bucket
 * @param {Trade}  trade
 * @param {boolean} isValid
 * @param {number}  newCount - Global running count (for quality running avg)
 * @returns {Object}
 */
function _updateDimensionalSlice(existing, trade, isValid, newCount) {
  if (!existing) {
    // First trade in this bucket — initialize from createBaseStats
    existing = createBaseStats();
  }

  // Base outcome and financial stats
  const updated = incrementalBaseUpdate(existing, trade);

  // Quality averages (Welford's method)
  const qualityUpdated = {
    ...updated,
    ...incrementalQualityUpdate(updated, trade, newCount),
  };

  // Grade distribution
  const grade = trade.evaluation?.tradeGrade;
  if (grade && qualityUpdated.gradeDistribution) {
    qualityUpdated.gradeDistribution = {
      ...qualityUpdated.gradeDistribution,
      [grade]: (qualityUpdated.gradeDistribution[grade] ?? 0) + 1,
    };
  }

  // Process/outcome distribution
  const pol = trade.evaluation?.processOutcomeLabel;
  if (pol && qualityUpdated.processOutcomeDistribution) {
    qualityUpdated.processOutcomeDistribution = {
      ...qualityUpdated.processOutcomeDistribution,
      [pol]: (qualityUpdated.processOutcomeDistribution[pol] ?? 0) + 1,
    };
  }

  // Valid process count
  if (isValid) {
    qualityUpdated.validProcessCount = (qualityUpdated.validProcessCount ?? 0) + 1;
  }

  // Re-derive validProcessWinRate from valid process count and win count
  // This is only approximate incrementally — full rebuild gives exact value
  // We store valid process data separately to enable exact recalculation
  qualityUpdated.lastUpdated = new Date().toISOString();

  return qualityUpdated;
}

/**
 * Updates a dimensional map (e.g. bySetup, bySession) incrementally.
 *
 * @param {Object} dimensionalMap - e.g. { S1_OB_H4: DimensionalStats }
 * @param {Trade}  trade
 * @param {boolean} isValid
 * @param {number}  newCount
 * @param {Function} keyExtractor - (trade) => string | null
 * @returns {Object}
 */
function _updateDimensionalMap(dimensionalMap, trade, isValid, newCount, keyExtractor) {
  const key = keyExtractor(trade);
  if (!key) return dimensionalMap;

  const existing = dimensionalMap?.[key] ?? createBaseStats();
  const updated  = _updateDimensionalSlice(existing, trade, isValid, newCount);

  return {
    ...dimensionalMap,
    [key]: updated,
  };
}

/**
 * Incrementally updates the error registry with errors from a new trade.
 *
 * @param {Object} registry - Current errorRegistry
 * @param {Trade}  trade
 * @param {Trade[]} recentTrades - For recurring flag update
 * @returns {Object}
 */
function _updateErrorRegistry(registry, trade, recentTrades) {
  const errors = trade.evaluation?.behavioralErrors ?? [];
  if (errors.length === 0) return registry;

  const updated = { ...registry };

  for (const error of errors) {
    const existing = updated[error.code] ?? {
      code:        error.code,
      category:    error.category,
      severity:    error.severity,
      description: error.description,
      totalOccurrences:    0,
      tradeIds:            [],
      winsWhenPresent:     0,
      lossesWhenPresent:   0,
      totalPnlRWhenPresent: 0,
      avgScoreWhenPresent:  0,
      _scoreAccumulator:   0,
      avgPnlRWhenPresent:  0,
      winRateWhenPresent:  0,
      isRecurring:         false,
      lastSeen:            null,
    };

    const newOccurrences = existing.totalOccurrences + 1;
    const newTradeIds    = [...existing.tradeIds, trade.id];
    const o              = trade.result.outcome;
    const newWins        = existing.winsWhenPresent  + (o === Outcome.WIN  ? 1 : 0);
    const newLosses      = existing.lossesWhenPresent + (o === Outcome.LOSS ? 1 : 0);
    const newTotalPnl    = existing.totalPnlRWhenPresent + (trade.result.pnlR ?? 0);
    const newScoreAcc    = (existing._scoreAccumulator ?? 0) + (trade.evaluation?.overallScore ?? 0);

    const closedCount    = newWins + newLosses;
    const winRateWhenPresent = closedCount > 0 ? _round(newWins / closedCount, 4) : 0;
    const avgPnlR        = closedCount > 0 ? _round(newTotalPnl / closedCount) : 0;
    const avgScore       = newOccurrences > 0 ? _round(newScoreAcc / newOccurrences) : 0;

    updated[error.code] = {
      ...existing,
      totalOccurrences:     newOccurrences,
      tradeIds:             newTradeIds,
      winsWhenPresent:      newWins,
      lossesWhenPresent:    newLosses,
      totalPnlRWhenPresent: _round(newTotalPnl),
      _scoreAccumulator:    newScoreAcc,
      avgScoreWhenPresent:  avgScore,
      avgPnlRWhenPresent:   avgPnlR,
      winRateWhenPresent,
      lastSeen:             trade.createdAt,
    };
  }

  // Update recurring flags based on recent window
  _updateRecurringFlags(updated, recentTrades);

  return updated;
}

/**
 * Builds global stats combining all trades and valid-process trades.
 *
 * @param {Trade[]} allTrades
 * @param {Trade[]} validTrades
 * @param {Trade[]} oldestFirst
 * @param {Trade[]} newestFirst
 * @returns {Object}
 */
function _buildGlobalStats(allTrades, validTrades, oldestFirst, newestFirst) {
  const base            = computeBaseStats(allTrades);
  const quality         = computeQualityAverages(allTrades);
  const grades          = computeGradeDistribution(allTrades);
  const processOutcome  = computeProcessOutcomeDistribution(allTrades);
  const edgeMetrics     = computeEdgeMetrics(validTrades);
  const streaks         = computeStreaks(oldestFirst);
  const execConsistency = computeExecutionConsistency(allTrades);

  return {
    ...base,
    ...quality,
    gradeDistribution:          grades,
    processOutcomeDistribution: processOutcome,
    edgeMetrics,
    streaks,
    executionConsistency: execConsistency,
    validProcessCount:    validTrades.length,
    lastUpdated:          new Date().toISOString(),
  };
}

/**
 * Attaches session breakdowns to each setup entry.
 * Allows answering: "Which session works best for S1?"
 *
 * @param {MemorySnapshot} snapshot
 * @param {Trade[]} allTrades
 * @param {Trade[]} validTrades
 */
function _attachSessionBreakdownsToSetups(snapshot, allTrades, validTrades) {
  for (const setupType of Object.keys(snapshot.bySetup)) {
    const setupTrades = allTrades.filter(t => t.setup?.type === setupType);
    const setupValid  = validTrades.filter(t => t.setup?.type === setupType);

    if (setupTrades.length === 0) continue;

    const bySession = groupAndAggregate(setupTrades, KEY_EXTRACTORS.session, IS_VALID_PROCESS);
    snapshot.bySetup[setupType] = {
      ...snapshot.bySetup[setupType],
      bySession,
    };
  }
}

/**
 * Updates isRecurring flag for all errors based on recent window.
 * A recurring error appears 3+ times in the last 10 trades.
 *
 * @param {Object} registry
 * @param {Trade[]} recentTradesNewestFirst
 */
function _updateRecurringFlags(registry, recentTradesNewestFirst) {
  const recentFreq = computeRecentErrorFrequency(recentTradesNewestFirst, 10);

  for (const errorCode of Object.keys(registry)) {
    registry[errorCode].isRecurring = (recentFreq[errorCode] ?? 0) >= 3;
  }
}

function _round(val, decimals = 2) {
  const factor = Math.pow(10, decimals);
  return Math.round((val ?? 0) * factor) / factor;
}

// ━━━ errorAnalyzer.js ━━━
/**
 * errorAnalyzer.js — Trading Analytics Engine
 * ──────────────────────────────────────────────
 * Deep behavioral analysis layer.
 * Detects non-obvious patterns in error data that cannot be
 * derived from single-error frequency counts alone.
 *
 * This module answers questions like:
 *   - Does the trader's process degrade after consecutive losses?
 *   - Are there error clusters tied to specific sessions?
 *   - Does winning create complacency (looser execution after streaks)?
 *   - Are impulsive entries correlated with specific market conditions?
 *   - Is execution quality drifting over time?
 *
 * Design rules:
 *   - All functions are pure: (Trade[], params) → analysis result
 *   - No Store access. No persistence.
 *   - Results consumed by errorEngine and insightGenerator.
 *   - Minimum sample sizes enforced before any conclusion is drawn.
 *
 * @module errorAnalyzer
 * @version 1.0.0
 */


const _EA_PAT     = 8;
const _EA_COR = 10;
const _EA_DEG = 6;
const _EA_DS        = 8;      // 8 quality points
const _EA_FR    = 1.5;    // 50% above baseline rate


// ─────────────────────────────────────────────────────────────
// SECTION 1 — POST-LOSS BEHAVIORAL DEGRADATION
// Detects whether the trader's process deteriorates after
// consecutive losses — the primary driver of revenge trading
// and compulsive overtrading.
// ─────────────────────────────────────────────────────────────

/**
 * Analyzes whether process quality degrades after losing streaks.
 *
 * Method:
 *   1. Find all trades immediately following N consecutive losses
 *   2. Compare process/execution scores of those vs baseline
 *   3. Compare BAD_PROCESS rate and error rate of those vs baseline
 *
 * @param {Trade[]} tradesOldestFirst
 * @param {number}  lossStreakThreshold - Default: 2
 * @returns {PostLossDegradationResult | null}
 */
function analyzePostLossDegradation(tradesOldestFirst, lossStreakThreshold = 2) {
  const closed = tradesOldestFirst.filter(
    t => t.result.outcome !== Outcome.OPEN && t.result.outcome !== Outcome.CANCELLED
  );

  if (closed.length < _EA_DEG + lossStreakThreshold) return null;

  const postLossTrades  = [];
  const baselineTrades  = [];
  let consecutiveLosses = 0;

  for (let i = 0; i < closed.length; i++) {
    const trade = closed[i];
    const o     = trade.result.outcome;

    if (consecutiveLosses >= lossStreakThreshold) {
      postLossTrades.push(trade);
    } else {
      baselineTrades.push(trade);
    }

    consecutiveLosses = o === Outcome.LOSS ? consecutiveLosses + 1 : 0;
  }

  if (postLossTrades.length < _EA_DEG) return null;
  if (baselineTrades.length < _EA_DEG) return null;

  const postLossMetrics = _computeBehaviorMetrics(postLossTrades);
  const baselineMetrics = _computeBehaviorMetrics(baselineTrades);

  const scoreDropped       = baselineMetrics.avgProcessScore  - postLossMetrics.avgProcessScore;
  const errorRateIncreased = postLossMetrics.errorRate        - baselineMetrics.errorRate;
  const badProcessRateUp   = postLossMetrics.badProcessRate   - baselineMetrics.badProcessRate;

  const isSignificant = scoreDropped > _EA_DS || errorRateIncreased > 0.15 || badProcessRateUp > 0.15;

  return {
    type:               'POST_LOSS_DEGRADATION',
    lossStreakThreshold,
    postLossSampleSize:  postLossTrades.length,
    baselineSampleSize:  baselineTrades.length,
    isSignificant,
    postLoss:            postLossMetrics,
    baseline:            baselineMetrics,
    deltas: {
      avgProcessScoreDelta: _round(scoreDropped),
      errorRateDelta:       _round(errorRateIncreased, 4),
      badProcessRateDelta:  _round(badProcessRateUp, 4),
    },
    severity: scoreDropped > 15 || errorRateIncreased > 0.25
      ? ErrorSeverity.HIGH
      : ErrorSeverity.MEDIUM,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — POST-WIN COMPLACENCY
// Detects whether the trader becomes less disciplined after
// winning streaks — confidence lowering vigilance.
// ─────────────────────────────────────────────────────────────

/**
 * Analyzes whether execution quality declines after winning streaks.
 *
 * @param {Trade[]} tradesOldestFirst
 * @param {number}  winStreakThreshold - Default: 3
 * @returns {PostWinComplacencyResult | null}
 */
function analyzePostWinComplacency(tradesOldestFirst, winStreakThreshold = 3) {
  const closed = tradesOldestFirst.filter(
    t => t.result.outcome !== Outcome.OPEN && t.result.outcome !== Outcome.CANCELLED
  );

  if (closed.length < _EA_DEG + winStreakThreshold) return null;

  const postWinTrades  = [];
  const baselineTrades = [];
  let consecutiveWins  = 0;

  for (let i = 0; i < closed.length; i++) {
    const trade = closed[i];
    const o     = trade.result.outcome;

    if (consecutiveWins >= winStreakThreshold) {
      postWinTrades.push(trade);
    } else {
      baselineTrades.push(trade);
    }

    consecutiveWins = o === Outcome.WIN ? consecutiveWins + 1 : 0;
  }

  if (postWinTrades.length < _EA_DEG) return null;
  if (baselineTrades.length < _EA_DEG) return null;

  const postWinMetrics  = _computeBehaviorMetrics(postWinTrades);
  const baselineMetrics = _computeBehaviorMetrics(baselineTrades);

  const execDrop      = baselineMetrics.avgExecutionScore - postWinMetrics.avgExecutionScore;
  const analysisDrop  = baselineMetrics.avgAnalysisScore  - postWinMetrics.avgAnalysisScore;
  const isSignificant = execDrop > _EA_DS || analysisDrop > _EA_DS;

  return {
    type:              'POST_WIN_COMPLACENCY',
    winStreakThreshold,
    postWinSampleSize:  postWinTrades.length,
    baselineSampleSize: baselineTrades.length,
    isSignificant,
    postWin:            postWinMetrics,
    baseline:           baselineMetrics,
    deltas: {
      executionScoreDelta: _round(execDrop),
      analysisScoreDelta:  _round(analysisDrop),
    },
    severity: execDrop > 15 ? ErrorSeverity.HIGH : ErrorSeverity.MEDIUM,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — SESSION ERROR CORRELATION
// Detects sessions where behavioral discipline is weakest.
// ─────────────────────────────────────────────────────────────

/**
 * Analyzes error rates by session to identify problematic sessions.
 *
 * @param {Trade[]} trades
 * @returns {SessionErrorCorrelation[]}
 */
function analyzeSessionErrorCorrelation(trades) {
  if (trades.length < _EA_PAT) return [];

  const bySession      = _groupBy(trades, t => t.context?.session);
  const globalErrorRate = _computeErrorRate(trades);
  const results         = [];

  for (const [session, sessionTrades] of Object.entries(bySession)) {
    if (sessionTrades.length < _EA_PAT) continue;

    const sessionErrorRate = _computeErrorRate(sessionTrades);
    const badProcessRate   = _computeBadProcessRate(sessionTrades);
    const avgScore         = _computeAvgScore(sessionTrades, 'overallScore');
    const frequencyRatio   = globalErrorRate > 0 ? sessionErrorRate / globalErrorRate : 0;

    results.push({
      session,
      sampleSize:       sessionTrades.length,
      errorRate:        _round(sessionErrorRate, 4),
      globalErrorRate:  _round(globalErrorRate, 4),
      frequencyRatio:   _round(frequencyRatio),
      badProcessRate:   _round(badProcessRate, 4),
      avgOverallScore:  _round(avgScore),
      isProblematic:    frequencyRatio >= _EA_FR,
      severity: frequencyRatio >= 2.0 ? ErrorSeverity.HIGH : ErrorSeverity.MEDIUM,
    });
  }

  return results.sort((a, b) => b.frequencyRatio - a.frequencyRatio);
}


// ─────────────────────────────────────────────────────────────
// SECTION 4 — ERROR CLUSTER DETECTION
// A cluster = same error in 3+ of the last N trades.
// Indicates a behavioral mode, not a one-off mistake.
// ─────────────────────────────────────────────────────────────

/**
 * Detects clusters of the same error code in a recent trade window.
 *
 * @param {Trade[]} recentTradesNewestFirst
 * @param {number}  windowSize
 * @param {number}  clusterThreshold
 * @returns {ErrorCluster[]}
 */
function detectErrorClusters(recentTradesNewestFirst, windowSize = 5, clusterThreshold = 3) {
  const window   = recentTradesNewestFirst.slice(0, windowSize);
  const errorMap = new Map();

  for (const trade of window) {
    for (const error of (trade.evaluation?.behavioralErrors ?? [])) {
      if (!errorMap.has(error.code)) {
        errorMap.set(error.code, { error, count: 0, tradeIds: [] });
      }
      const entry = errorMap.get(error.code);
      entry.count++;
      entry.tradeIds.push(trade.id);
    }
  }

  const clusters = [];
  for (const [code, { error, count, tradeIds }] of errorMap) {
    if (count >= clusterThreshold) {
      clusters.push({
        errorCode:    code,
        category:     error.category,
        severity:     error.severity,
        description:  error.description,
        count,
        windowSize,
        tradeIds,
        clusterRatio: _round(count / windowSize, 2),
        intensity:    count >= windowSize - 1 ? 'CRITICAL' : 'HIGH',
      });
    }
  }

  return clusters.sort((a, b) => b.count - a.count);
}


// ─────────────────────────────────────────────────────────────
// SECTION 5 — MARKET CONDITION ERROR BIAS
// Detects whether specific errors concentrate in specific contexts.
// Example: ERR_E05 (chase price) 3× more frequent in RANGING__HIGH.
// ─────────────────────────────────────────────────────────────

/**
 * Analyzes whether a specific error is disproportionately
 * correlated with particular market conditions.
 *
 * @param {Trade[]} trades
 * @param {string}  errorCode
 * @returns {ErrorConditionBias[]}
 */
function analyzeErrorConditionBias(trades, errorCode) {
  if (trades.length < _EA_COR) return [];

  const withError = trades.filter(t =>
    t.evaluation?.behavioralErrors?.some(e => e.code === errorCode)
  );

  if (withError.length < 3) return [];

  const conditionKey = t => {
    const mc = t.context?.marketCondition;
    return mc ? `${mc.trend_D1}__${mc.volatility}` : null;
  };

  const byCondition      = _groupBy(withError, conditionKey);
  const allByCondition   = _groupBy(trades, conditionKey);
  const globalRate       = withError.length / trades.length;
  const results          = [];

  for (const [key, errorTrades] of Object.entries(byCondition)) {
    if (!key) continue;
    const total = allByCondition[key]?.length ?? 0;
    if (total < _EA_PAT) continue;

    const rate  = errorTrades.length / total;
    const bias  = rate / (globalRate || 0.01);

    if (bias >= _EA_FR) {
      results.push({
        conditionKey:          key,
        errorCode,
        errorCountInCondition: errorTrades.length,
        totalInCondition:      total,
        conditionErrorRate:    _round(rate, 4),
        globalErrorRate:       _round(globalRate, 4),
        biasRatio:             _round(bias),
        isSignificant:         bias >= 2.0,
      });
    }
  }

  return results.sort((a, b) => b.biasRatio - a.biasRatio);
}


// ─────────────────────────────────────────────────────────────
// SECTION 6 — EXECUTION DRIFT DETECTION
// Compares recent execution quality to an earlier baseline.
// Drift = process getting worse before results reflect it.
// ─────────────────────────────────────────────────────────────

/**
 * Detects execution or analysis quality drift over time.
 *
 * @param {Trade[]} tradesNewestFirst
 * @param {number}  recentWindow   - Recent trades to compare
 * @param {number}  baselineWindow - Historical trades for baseline
 * @returns {ExecutionDriftResult | null}
 */
function detectExecutionDrift(tradesNewestFirst, recentWindow = 10, baselineWindow = 20) {
  const withScores = tradesNewestFirst.filter(t => t.evaluation?.executionQuality !== undefined);
  if (withScores.length < recentWindow + baselineWindow) return null;

  const recentTrades   = withScores.slice(0, recentWindow);
  const baselineTrades = withScores.slice(recentWindow, recentWindow + baselineWindow);

  const recentExec    = _computeAvgScore(recentTrades,   'executionQuality');
  const baselineExec  = _computeAvgScore(baselineTrades, 'executionQuality');
  const recentAnal    = _computeAvgScore(recentTrades,   'analysisQuality');
  const baselineAnal  = _computeAvgScore(baselineTrades, 'analysisQuality');

  const execDrift     = baselineExec - recentExec;
  const analysisDrift = baselineAnal - recentAnal;

  if (execDrift <= _EA_DS && analysisDrift <= _EA_DS) return null;

  return {
    type:           'EXECUTION_DRIFT',
    recentWindow,
    baselineWindow,
    isDrifting:     true,
    execution: {
      recent:   _round(recentExec),
      baseline: _round(baselineExec),
      drift:    _round(execDrift),
    },
    analysis: {
      recent:   _round(recentAnal),
      baseline: _round(baselineAnal),
      drift:    _round(analysisDrift),
    },
    primaryDimension: execDrift >= analysisDrift ? 'EXECUTION' : 'ANALYSIS',
    severity: Math.max(execDrift, analysisDrift) > 20
      ? ErrorSeverity.HIGH
      : ErrorSeverity.MEDIUM,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 7 — INTERNAL UTILITIES
// ─────────────────────────────────────────────────────────────

function _computeBehaviorMetrics(trades) {
  return {
    sampleSize:        trades.length,
    avgProcessScore:   _round(_computeAvgScore(trades, 'overallScore')),
    avgExecutionScore: _round(_computeAvgScore(trades, 'executionQuality')),
    avgAnalysisScore:  _round(_computeAvgScore(trades, 'analysisQuality')),
    errorRate:         _round(_computeErrorRate(trades), 4),
    badProcessRate:    _round(_computeBadProcessRate(trades), 4),
  };
}

function _computeErrorRate(trades) {
  if (trades.length === 0) return 0;
  return trades.filter(t => (t.evaluation?.behavioralErrors?.length ?? 0) > 0).length / trades.length;
}

function _computeBadProcessRate(trades) {
  const closed = trades.filter(
    t => t.result.outcome !== Outcome.OPEN && t.result.outcome !== Outcome.CANCELLED
  );
  if (closed.length === 0) return 0;
  return closed.filter(t => t.evaluation?.processOutcomeLabel?.startsWith('BAD_PROCESS')).length / closed.length;
}

function _computeAvgScore(trades, field) {
  const valid = trades.filter(t => t.evaluation?.[field] !== undefined);
  if (valid.length === 0) return 0;
  return valid.reduce((sum, t) => sum + (t.evaluation[field] ?? 0), 0) / valid.length;
}

function _groupBy(arr, keyFn) {
  return arr.reduce((acc, item) => {
    const key = keyFn(item);
    if (key == null) return acc;
    if (!acc[key]) acc[key] = [];
    acc[key].push(item);
    return acc;
  }, {});
}

function _round(val, decimals = 2) {
  const factor = Math.pow(10, decimals);
  return Math.round((val ?? 0) * factor) / factor;
}

// ━━━ errorEngine.js ━━━
/**
 * errorEngine.js — Trading Analytics Engine
 * ────────────────────────────────────────────
 * Orchestrates the full behavioral error tracking pipeline.
 *
 * Responsibilities:
 *   - Register behavioral errors after each trade evaluation
 *   - Calculate frequency and recurrence from accumulated data
 *   - Calculate impact: win rate degradation, P&L drag per error
 *   - Run pattern detection via errorAnalyzer
 *   - Detect error clusters in recent trades
 *   - Produce structured ErrorReport consumed by insightGenerator
 *
 * @module errorEngine
 * @version 1.0.0
 */


const MIN_OCCURRENCES_FOR_ANALYSIS = 3;
const CLUSTER_WINDOW_SIZE = 5;
const CLUSTER_THRESHOLD   = 3;
const _EE_RW   = 10;
const RECURRENCE_THRESHOLD = 3;

// ─────────────────────────────────────────────────────────────
// SECTION 1 — ERROR REGISTRATION
// ─────────────────────────────────────────────────────────────

function registerBehaviorErrors(evaluatedTrade) {
  const errors = evaluatedTrade.evaluation?.behavioralErrors ?? [];
  if (errors.length === 0) return { ok: true, registeredCount: 0 };

  try {
    const registry = Store.errorRegistry.get() ?? {};
    const updated  = { ...registry };
    const o        = evaluatedTrade.result.outcome;
    const pnlR     = evaluatedTrade.result.pnlR ?? 0;
    const score    = evaluatedTrade.evaluation?.overallScore ?? 0;
    const now      = new Date().toISOString();

    for (const error of errors) {
      const existing = updated[error.code] ?? _createErrorEntry(error);
      const newTotal    = existing.totalOccurrences + 1;
      const newTradeIds = [...existing.tradeIds, evaluatedTrade.id].slice(-200);
      const newWins     = existing.winsWhenPresent   + (o === Outcome.WIN  ? 1 : 0);
      const newLosses   = existing.lossesWhenPresent + (o === Outcome.LOSS ? 1 : 0);
      const newTotalPnl = existing.totalPnlRAccumulator + (
        o !== Outcome.OPEN && o !== Outcome.CANCELLED ? pnlR : 0
      );
      const newScoreAcc  = existing.scoreAccumulator + score;
      const closedCount  = newWins + newLosses;
      const winRate      = closedCount > 0 ? _round(newWins / closedCount, 4) : 0;
      const avgPnlR      = closedCount > 0 ? _round(newTotalPnl / closedCount) : 0;
      const avgScore     = newTotal > 0 ? _round(newScoreAcc / newTotal) : 0;

      updated[error.code] = {
        ...existing,
        totalOccurrences:     newTotal,
        tradeIds:             newTradeIds,
        winsWhenPresent:      newWins,
        lossesWhenPresent:    newLosses,
        totalPnlRAccumulator: _round(newTotalPnl),
        scoreAccumulator:     _round(newScoreAcc),
        avgPnlRWhenPresent:   avgPnlR,
        avgScoreWhenPresent:  avgScore,
        winRateWhenPresent:   winRate,
        lastSeen:             now,
      };
    }

    const recentTrades = Store.trades.getRecent(_EE_RW);
    _refreshRecurrenceFlags(updated, recentTrades);

    const persistResult = Store.errorRegistry.set(updated);
    if (!persistResult.ok) return { ok: false, registeredCount: 0, error: persistResult.error };
    return { ok: true, registeredCount: errors.length };
  } catch (err) {
    return { ok: false, registeredCount: 0, error: err.message };
  }
}

// ─────────────────────────────────────────────────────────────
// SECTION 2 — FREQUENCY AND RECURRENCE
// ─────────────────────────────────────────────────────────────

function calculateErrorFrequency(errorCode) {
  const registry   = Store.errorRegistry.get();
  const entry      = registry?.[errorCode];
  if (!entry) return null;

  const recentTrades = Store.trades.getRecent(30);
  const allTrades    = Store.trades.getAll();
  const last10       = recentTrades.slice(0, 10);
  const last30       = recentTrades;
  const total        = allTrades.length;

  const countIn10    = _countErrorInTrades(errorCode, last10);
  const countIn30    = _countErrorInTrades(errorCode, last30);
  const overallRate  = total > 0 ? _round(entry.totalOccurrences / total, 4) : 0;
  const rate10       = last10.length > 0 ? _round(countIn10 / last10.length, 4) : 0;
  const rate30       = last30.length > 0 ? _round(countIn30 / last30.length, 4) : 0;
  const acceleration = overallRate > 0 ? _round(rate10 / overallRate) : 0;

  return {
    errorCode,
    totalOccurrences: entry.totalOccurrences,
    countInLast10: countIn10,
    countInLast30: countIn30,
    overallRate, recentRate10: rate10, recentRate30: rate30,
    acceleration,
    isRecurring:     entry.isRecurring,
    isAccelerating:  acceleration >= 1.5 && countIn10 >= 2,
    lastSeen:        entry.lastSeen,
  };
}

function getAllErrorFrequencies() {
  const registry = Store.errorRegistry.get() ?? {};
  return Object.keys(registry)
    .map(code => calculateErrorFrequency(code))
    .filter(Boolean)
    .sort((a, b) => b.totalOccurrences - a.totalOccurrences);
}

// ─────────────────────────────────────────────────────────────
// SECTION 3 — ERROR IMPACT
// ─────────────────────────────────────────────────────────────

function calculateErrorImpact(errorCode) {
  const registry = Store.errorRegistry.get();
  const memory   = Store.memory.get();
  const entry    = registry?.[errorCode];
  const global   = memory?.global;
  if (!entry || !global) return null;
  if (entry.totalOccurrences < MIN_OCCURRENCES_FOR_ANALYSIS) return null;

  const globalWinRate  = global.winRate ?? 0;
  const globalAvgPnlR  = global.avgPnlR ?? 0;
  const globalAvgScore = global.avgOverallScore ?? 0;

  const winRateDelta = _round(entry.winRateWhenPresent - globalWinRate, 4);
  const pnlDelta     = _round(entry.avgPnlRWhenPresent - globalAvgPnlR);
  const scoreDelta   = _round(entry.avgScoreWhenPresent - globalAvgScore);

  const totalTrades    = Store.trades.getAll().length;
  const errorRate      = totalTrades > 0 ? entry.totalOccurrences / totalTrades : 0;
  const estimatedDrag  = totalTrades > 0
    ? _round(errorRate * Math.abs(Math.min(pnlDelta, 0)) * totalTrades)
    : 0;

  return {
    errorCode,
    sampleSize:           entry.totalOccurrences,
    globalWinRate,
    errorWinRate:         entry.winRateWhenPresent,
    winRateDelta,
    globalAvgPnlR,
    errorAvgPnlR:         entry.avgPnlRWhenPresent,
    pnlDelta,
    globalAvgScore,
    errorAvgScore:        entry.avgScoreWhenPresent,
    scoreDelta,
    estimatedTotalDragR:  estimatedDrag,
    isHarmful:            winRateDelta < -0.05 || pnlDelta < -0.3,
    impactLevel: Math.abs(winRateDelta) > 0.15 || Math.abs(pnlDelta) > 0.5
      ? 'HIGH'
      : Math.abs(winRateDelta) > 0.07 || Math.abs(pnlDelta) > 0.2
        ? 'MEDIUM' : 'LOW',
  };
}

// ─────────────────────────────────────────────────────────────
// SECTION 4 — BEHAVIORAL PATTERN DETECTION
// ─────────────────────────────────────────────────────────────

function detectBehaviorPatterns() {
  const allTrades = Store.trades.getAll();
  if (allTrades.length < 6) return { hasEnoughData: false, patterns: [], clusters: [], driftResult: null };

  const oldestFirst = [...allTrades].sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
  const newestFirst = [...oldestFirst].reverse();
  const patterns    = [];

  const postLoss = analyzePostLossDegradation(oldestFirst);
  if (postLoss?.isSignificant) patterns.push({ patternType: 'POST_LOSS_DEGRADATION', ...postLoss });

  const postWin = analyzePostWinComplacency(oldestFirst);
  if (postWin?.isSignificant) patterns.push({ patternType: 'POST_WIN_COMPLACENCY', ...postWin });

  for (const se of analyzeSessionErrorCorrelation(allTrades).filter(s => s.isProblematic)) {
    patterns.push({ patternType: 'SESSION_ERROR_BIAS', ...se });
  }

  const registry  = Store.errorRegistry.get() ?? {};
  const topErrors = Object.values(registry)
    .filter(e => e.totalOccurrences >= MIN_OCCURRENCES_FOR_ANALYSIS)
    .sort((a, b) => b.totalOccurrences - a.totalOccurrences)
    .slice(0, 3);

  for (const errorEntry of topErrors) {
    for (const bias of analyzeErrorConditionBias(allTrades, errorEntry.code).filter(b => b.isSignificant)) {
      patterns.push({ patternType: 'ERROR_CONDITION_BIAS', ...bias });
    }
  }

  const clusters    = detectErrorClusters(newestFirst.slice(0, CLUSTER_WINDOW_SIZE), CLUSTER_WINDOW_SIZE, CLUSTER_THRESHOLD);
  const driftResult = detectExecutionDrift(newestFirst);

  return { hasEnoughData: true, patterns, clusters, driftResult, analyzedAt: new Date().toISOString(), tradeCount: allTrades.length };
}

function detectRecentErrorClusters() {
  return detectErrorClusters(Store.trades.getRecent(CLUSTER_WINDOW_SIZE), CLUSTER_WINDOW_SIZE, CLUSTER_THRESHOLD);
}

// ─────────────────────────────────────────────────────────────
// SECTION 5 — ERROR REPORT
// ─────────────────────────────────────────────────────────────

function buildErrorReport() {
  const registry      = Store.errorRegistry.get() ?? {};
  const patterns      = detectBehaviorPatterns();
  const frequencies   = getAllErrorFrequencies();
  const clusters      = detectRecentErrorClusters();

  const impacts = frequencies
    .filter(f => f.totalOccurrences >= MIN_OCCURRENCES_FOR_ANALYSIS)
    .map(f => calculateErrorImpact(f.errorCode))
    .filter(Boolean);

  return {
    generatedAt:   new Date().toISOString(),
    hasEnoughData: patterns.hasEnoughData,
    summary: {
      totalErrorCodes:    Object.keys(registry).length,
      recurringCount:     frequencies.filter(f => f.isRecurring).length,
      acceleratingCount:  frequencies.filter(f => f.isAccelerating).length,
      highImpactCount:    impacts.filter(i => i.impactLevel === 'HIGH').length,
      activeClusterCount: clusters.length,
      driftDetected:      patterns.driftResult !== null,
    },
    recurringErrors:     frequencies.filter(f => f.isRecurring),
    acceleratingErrors:  frequencies.filter(f => f.isAccelerating),
    highImpactErrors:    impacts.filter(i => i.impactLevel === 'HIGH'),
    clusters,
    behavioralPatterns:  patterns.patterns,
    driftResult:         patterns.driftResult,
    allFrequencies:      frequencies,
    allImpacts:          impacts,
  };
}

// ─────────────────────────────────────────────────────────────
// INTERNALS
// ─────────────────────────────────────────────────────────────

function _createErrorEntry(error) {
  return {
    code: error.code, category: error.category, severity: error.severity,
    description: error.description,
    totalOccurrences: 0, tradeIds: [],
    winsWhenPresent: 0, lossesWhenPresent: 0,
    totalPnlRAccumulator: 0, scoreAccumulator: 0,
    avgPnlRWhenPresent: 0, avgScoreWhenPresent: 0,
    winRateWhenPresent: 0, isRecurring: false, lastSeen: null,
  };
}

function _countErrorInTrades(errorCode, trades) {
  return trades.filter(t => t.evaluation?.behavioralErrors?.some(e => e.code === errorCode)).length;
}

function _refreshRecurrenceFlags(registry, recentTrades) {
  const freqMap = {};
  for (const trade of recentTrades) {
    for (const error of (trade.evaluation?.behavioralErrors ?? [])) {
      freqMap[error.code] = (freqMap[error.code] ?? 0) + 1;
    }
  }
  for (const code of Object.keys(registry)) {
    registry[code].isRecurring = (freqMap[code] ?? 0) >= RECURRENCE_THRESHOLD;
  }
}

function _round(val, decimals = 2) {
  const factor = Math.pow(10, decimals);
  return Math.round((val ?? 0) * factor) / factor;
}

// ━━━ insightGenerator.js ━━━
/**
 * insightGenerator.js — Trading Analytics Engine
 * -------------------------------------------------
 * Converts raw analytical data into concrete, specific Insight objects.
 * No motivational language. Operational facts only.
 * Every insight includes the data that generated it.
 *
 * @module insightGenerator
 * @version 1.0.0
 */


const _IG_EDGE     = 15;
const _IG_PAT  = 8;
const _IG_WARN  = 6;
const MIN_EDGE_WIN_RATE   = 0.55;
const MIN_EXPECTANCY_POS  = 0.10;
const MIN_WIN_RATE_DELTA  = 0.10;
const MIN_BAD_PROC_RATIO  = 0.20;
const _IG_RW   = 10;

// ─────────────────────────────────────────────────────────────
// SECTION 1 — EDGE INSIGHTS
// ─────────────────────────────────────────────────────────────

function generateEdgeInsights(memory) {
  const insights = [];

  for (const [setupType, stats] of Object.entries(memory.bySetup ?? {})) {
    const em = stats.edgeMetrics;
    if (!em || em.validProcessCount < _IG_EDGE) continue;
    if (em.validProcessWinRate < MIN_EDGE_WIN_RATE || em.validProcessExpectancy < MIN_EXPECTANCY_POS) continue;

    insights.push(createInsight({
      type:     InsightType.EDGE,
      priority: em.validProcessWinRate >= 0.65 ? InsightPriority.HIGH : InsightPriority.MEDIUM,
      title:    `${setupType} shows confirmed edge in valid-process trades`,
      body:     `${setupType} — ${em.validProcessCount} valid-process trades: ` +
                `${_pct(em.validProcessWinRate)} win rate, ${_r(em.validProcessExpectancy)}R expectancy, ` +
                `profit factor ${_r(em.validProcessProfitFactor)}.`,
      relatedSetup:          setupType,
      minimumSampleSize:     _IG_EDGE,
      currentSampleSize:     em.validProcessCount,
      isStatisticallyValid:  true,
      confidence:            _edgeConf(em.validProcessCount, em.validProcessWinRate),
      supportingData:        { validProcessCount: em.validProcessCount, winRate: em.validProcessWinRate, expectancy: em.validProcessExpectancy },
      actionRequired:        false,
    }));
  }

  for (const [session, stats] of Object.entries(memory.bySession ?? {})) {
    if ((stats.closedTrades ?? 0) < _IG_EDGE) continue;
    if (stats.expectancy < MIN_EXPECTANCY_POS || stats.winRate < MIN_EDGE_WIN_RATE) continue;
    insights.push(createInsight({
      type:     InsightType.EDGE,
      priority: InsightPriority.MEDIUM,
      title:    `${session} session shows positive expectancy`,
      body:     `${session}: ${stats.closedTrades} trades, ${_pct(stats.winRate)} win rate, ${_r(stats.expectancy)}R expectancy.`,
      relatedSession:        session,
      minimumSampleSize:     _IG_EDGE,
      currentSampleSize:     stats.closedTrades,
      isStatisticallyValid:  true,
      confidence:            _edgeConf(stats.closedTrades, stats.winRate),
      supportingData:        { session, winRate: stats.winRate, expectancy: stats.expectancy },
      actionRequired:        false,
    }));
  }

  const aPlus = memory.byClassification?.[SetupClassification.A_PLUS];
  const bPlus = memory.byClassification?.[SetupClassification.B_PLUS];
  if (aPlus && bPlus && (aPlus.closedTrades ?? 0) >= _IG_PAT && (bPlus.closedTrades ?? 0) >= _IG_PAT) {
    const aPlusWR = aPlus.edgeMetrics?.validProcessWinRate ?? aPlus.winRate ?? 0;
    const bPlusWR = bPlus.edgeMetrics?.validProcessWinRate ?? bPlus.winRate ?? 0;
    const delta   = aPlusWR - bPlusWR;
    if (delta > MIN_WIN_RATE_DELTA) {
      insights.push(createInsight({
        type:     InsightType.EDGE,
        priority: InsightPriority.HIGH,
        title:    `A+ setups outperform B+ by ${_pct(delta)} win rate`,
        body:     `A+ win rate: ${_pct(aPlusWR)} (n=${aPlus.closedTrades}). B+ win rate: ${_pct(bPlusWR)} (n=${bPlus.closedTrades}). ` +
                  `Delta: +${_pct(delta)}. Prioritize A+ setups. Reduce B+ exposure.`,
        minimumSampleSize:    _IG_PAT,
        currentSampleSize:    (aPlus.closedTrades ?? 0) + (bPlus.closedTrades ?? 0),
        isStatisticallyValid: delta > 0.05,
        confidence:           Math.min(0.95, 0.5 + delta * 2),
        supportingData:       { aPlusWR, bPlusWR, delta },
        actionRequired:       true,
      }));
    }
  }

  return insights;
}

// ─────────────────────────────────────────────────────────────
// SECTION 2 — WARNING INSIGHTS
// ─────────────────────────────────────────────────────────────

function generateWarningInsights(errorReport, memory) {
  const insights = [];
  if (!errorReport.hasEnoughData) return insights;

  for (const freq of errorReport.recurringErrors) {
    const impact  = errorReport.allImpacts?.find(i => i.errorCode === freq.errorCode);
    const pnlLine = impact?.isHarmful
      ? ` Win rate drops ${_pct(Math.abs(impact.winRateDelta))}; avg P&L delta ${_r(impact.pnlDelta)}R.`
      : '';
    insights.push(createInsight({
      type:     InsightType.WARNING,
      priority: freq.isAccelerating ? InsightPriority.CRITICAL : InsightPriority.HIGH,
      title:    `Recurring error: ${freq.errorCode} (${freq.countInLast10}/${_IG_RW} recent trades)`,
      body:     `${freq.errorCode} in ${freq.countInLast10} of last ${_IG_RW} trades ` +
                `(total: ${freq.totalOccurrences}).${pnlLine} Requires active correction.`,
      relatedError:         freq.errorCode,
      minimumSampleSize:    _IG_WARN,
      currentSampleSize:    freq.totalOccurrences,
      isStatisticallyValid: freq.totalOccurrences >= _IG_WARN,
      confidence:           Math.min(0.95, 0.6 + (freq.countInLast10 / 10) * 0.35),
      supportingData:       { frequency: freq, impact },
      actionRequired:       true,
    }));
  }

  for (const cluster of (errorReport.clusters ?? [])) {
    insights.push(createInsight({
      type:     InsightType.WARNING,
      priority: InsightPriority.CRITICAL,
      title:    `Error cluster: ${cluster.errorCode} in ${cluster.count}/${cluster.windowSize} most recent trades`,
      body:     `${cluster.errorCode} detected in ${cluster.count} of last ${cluster.windowSize} trades. ` +
                `You are currently in a negative behavioral mode. Stop and review before the next trade.`,
      relatedError:         cluster.errorCode,
      minimumSampleSize:    cluster.windowSize,
      currentSampleSize:    cluster.count,
      isStatisticallyValid: true,
      confidence:           0.90,
      supportingData:       cluster,
      actionRequired:       true,
    }));
  }

  for (const impact of (errorReport.highImpactErrors ?? [])) {
    if (errorReport.recurringErrors?.some(r => r.errorCode === impact.errorCode)) continue;
    insights.push(createInsight({
      type:     InsightType.WARNING,
      priority: InsightPriority.HIGH,
      title:    `${impact.errorCode} causes measurable P&L damage`,
      body:     `With ${impact.errorCode}: ${_pct(impact.errorWinRate)} win rate vs ${_pct(impact.globalWinRate)} global. ` +
                `Avg P&L delta: ${_r(impact.pnlDelta)}R. Estimated total drag: ${_r(impact.estimatedTotalDragR)}R over ${impact.sampleSize} occurrences.`,
      relatedError:         impact.errorCode,
      minimumSampleSize:    _IG_WARN,
      currentSampleSize:    impact.sampleSize,
      isStatisticallyValid: impact.sampleSize >= _IG_WARN,
      confidence:           Math.min(0.90, 0.5 + (impact.sampleSize / 20) * 0.4),
      supportingData:       impact,
      actionRequired:       false,
    }));
  }

  if (errorReport.driftResult) {
    const d   = errorReport.driftResult;
    const dim = d.primaryDimension === 'EXECUTION' ? d.execution : d.analysis;
    insights.push(createInsight({
      type:     InsightType.WARNING,
      priority: d.severity === 'HIGH' ? InsightPriority.HIGH : InsightPriority.MEDIUM,
      title:    `${d.primaryDimension} quality declining: −${_r(dim.drift)} pts over last ${d.recentWindow} trades`,
      body:     `${d.primaryDimension} score: ${_r(dim.baseline)} baseline → ${_r(dim.recent)} recent. ` +
                `Drift: −${_r(dim.drift)} pts. This degradation typically precedes result decline.`,
      minimumSampleSize:    d.recentWindow + d.baselineWindow,
      currentSampleSize:    d.recentWindow + d.baselineWindow,
      isStatisticallyValid: true,
      confidence:           0.75,
      supportingData:       d,
      actionRequired:       true,
    }));
  }

  return insights;
}

// ─────────────────────────────────────────────────────────────
// SECTION 3 — PATTERN INSIGHTS
// ─────────────────────────────────────────────────────────────

function generatePatternInsights(patternReport) {
  const insights = [];
  if (!patternReport.hasEnoughData) return insights;

  for (const pattern of patternReport.patterns) {

    if (pattern.patternType === 'POST_LOSS_DEGRADATION' && pattern.isSignificant) {
      const d = pattern.deltas;
      insights.push(createInsight({
        type:     InsightType.PATTERN,
        priority: pattern.severity === 'HIGH' ? InsightPriority.HIGH : InsightPriority.MEDIUM,
        title:    `Process degrades after ${pattern.lossStreakThreshold}+ consecutive losses`,
        body:     `After ${pattern.lossStreakThreshold}+ losses (n=${pattern.postLossSampleSize}): ` +
                  `process score −${_r(Math.abs(d.avgProcessScoreDelta))} pts, error rate +${_pct(d.errorRateDelta)}, ` +
                  `bad-process rate +${_pct(d.badProcessRateDelta)}. ` +
                  `Baseline score: ${_r(pattern.baseline.avgProcessScore)} vs post-loss: ${_r(pattern.postLoss.avgProcessScore)}.`,
        minimumSampleSize:    _IG_PAT,
        currentSampleSize:    (pattern.postLossSampleSize ?? 0) + (pattern.baselineSampleSize ?? 0),
        isStatisticallyValid: (pattern.postLossSampleSize ?? 0) >= _IG_PAT,
        confidence:           Math.min(0.90, 0.55 + ((pattern.postLossSampleSize ?? 0) / 20) * 0.35),
        supportingData:       pattern,
        actionRequired:       true,
      }));
    }

    if (pattern.patternType === 'POST_WIN_COMPLACENCY' && pattern.isSignificant) {
      const d = pattern.deltas;
      insights.push(createInsight({
        type:     InsightType.PATTERN,
        priority: InsightPriority.MEDIUM,
        title:    `Execution quality drops after ${pattern.winStreakThreshold}+ consecutive wins`,
        body:     `After ${pattern.winStreakThreshold}+ wins (n=${pattern.postWinSampleSize}): ` +
                  `execution −${_r(Math.abs(d.executionScoreDelta))} pts, analysis −${_r(Math.abs(d.analysisScoreDelta))} pts.`,
        minimumSampleSize:    _IG_PAT,
        currentSampleSize:    (pattern.postWinSampleSize ?? 0) + (pattern.baselineSampleSize ?? 0),
        isStatisticallyValid: (pattern.postWinSampleSize ?? 0) >= _IG_PAT,
        confidence:           0.70,
        supportingData:       pattern,
        actionRequired:       false,
      }));
    }

    if (pattern.patternType === 'SESSION_ERROR_BIAS' && pattern.isProblematic) {
      insights.push(createInsight({
        type:     InsightType.PATTERN,
        priority: pattern.severity === 'HIGH' ? InsightPriority.HIGH : InsightPriority.MEDIUM,
        title:    `${pattern.session} has ${_r(pattern.frequencyRatio)}× higher error rate than baseline`,
        body:     `${pattern.session} (n=${pattern.sampleSize}): ${_pct(pattern.errorRate)} error rate vs ${_pct(pattern.globalErrorRate)} global. ` +
                  `Bad-process rate: ${_pct(pattern.badProcessRate)}. Avg score: ${_r(pattern.avgOverallScore)}.`,
        relatedSession:       pattern.session,
        minimumSampleSize:    _IG_PAT,
        currentSampleSize:    pattern.sampleSize,
        isStatisticallyValid: (pattern.sampleSize ?? 0) >= _IG_PAT,
        confidence:           Math.min(0.85, 0.50 + ((pattern.sampleSize ?? 0) / 30) * 0.35),
        supportingData:       pattern,
        actionRequired:       true,
      }));
    }

    if (pattern.patternType === 'ERROR_CONDITION_BIAS' && pattern.isSignificant) {
      insights.push(createInsight({
        type:     InsightType.PATTERN,
        priority: InsightPriority.MEDIUM,
        title:    `${pattern.errorCode} is ${_r(pattern.biasRatio)}× more frequent in ${pattern.conditionKey} conditions`,
        body:     `${pattern.errorCode} in ${pattern.conditionKey}: ${_pct(pattern.conditionErrorRate)} vs ${_pct(pattern.globalErrorRate)} globally.`,
        relatedError:         pattern.errorCode,
        minimumSampleSize:    _IG_PAT,
        currentSampleSize:    pattern.totalInCondition,
        isStatisticallyValid: (pattern.totalInCondition ?? 0) >= _IG_PAT,
        confidence:           Math.min(0.80, 0.50 + (pattern.biasRatio - 1.5) * 0.20),
        supportingData:       pattern,
        actionRequired:       false,
      }));
    }
  }

  return insights;
}

// ─────────────────────────────────────────────────────────────
// SECTION 4 — RECOMMENDATION INSIGHTS
// ─────────────────────────────────────────────────────────────

function generateRecommendationInsights(memory, errorReport) {
  const insights = [];
  const global   = memory?.global;
  if (!global || (global.totalTrades ?? 0) < _IG_PAT) return insights;

  const avgAnalysis  = global.avgAnalysisQuality  ?? 0;
  const avgExecution = global.avgExecutionQuality ?? 0;

  if (avgAnalysis - avgExecution > 15) {
    insights.push(createInsight({
      type:     InsightType.RECOMMENDATION,
      priority: InsightPriority.HIGH,
      title:    `Analysis (${_r(avgAnalysis)}) exceeds execution (${_r(avgExecution)}) — execution is the constraint`,
      body:     `${_r(avgAnalysis - avgExecution)} point gap between analysis and execution quality. ` +
                `You are reading the market correctly but failing to execute the plan. ` +
                `Focus: entry precision, SL placement, TP discipline.`,
      minimumSampleSize:    _IG_PAT,
      currentSampleSize:    global.totalTrades,
      isStatisticallyValid: (global.totalTrades ?? 0) >= _IG_PAT,
      confidence:           0.80,
      supportingData:       { avgAnalysis, avgExecution, delta: avgAnalysis - avgExecution },
      actionRequired:       true,
    }));
  }

  if (avgExecution - avgAnalysis > 15) {
    insights.push(createInsight({
      type:     InsightType.RECOMMENDATION,
      priority: InsightPriority.HIGH,
      title:    `Execution (${_r(avgExecution)}) exceeds analysis (${_r(avgAnalysis)}) — setup selection is the constraint`,
      body:     `${_r(avgExecution - avgAnalysis)} point gap. You execute plans well but take suboptimal setups. ` +
                `Fewer trades, stricter qualification criteria.`,
      minimumSampleSize:    _IG_PAT,
      currentSampleSize:    global.totalTrades,
      isStatisticallyValid: (global.totalTrades ?? 0) >= _IG_PAT,
      confidence:           0.80,
      supportingData:       { avgAnalysis, avgExecution },
      actionRequired:       true,
    }));
  }

  const dist         = global.processOutcomeDistribution ?? {};
  const badProcWins  = dist['BAD_PROCESS_WIN'] ?? 0;
  const closedTrades = global.closedTrades ?? 0;
  const ratio        = closedTrades > 0 ? badProcWins / closedTrades : 0;

  if (ratio > MIN_BAD_PROC_RATIO && closedTrades >= _IG_PAT) {
    const validWR = global.edgeMetrics?.validProcessWinRate ?? 0;
    insights.push(createInsight({
      type:     InsightType.RECOMMENDATION,
      priority: InsightPriority.HIGH,
      title:    `${_pct(ratio)} of closed trades are BAD_PROCESS_WIN — luck dependency is high`,
      body:     `${badProcWins}/${closedTrades} trades: BAD_PROCESS_WIN. ` +
                `These wins are not edge. Your valid-process win rate: ${_pct(validWR)} vs apparent ${_pct(global.winRate)}. ` +
                `The gap is your luck dependency. Reject C-grade setups consistently.`,
      minimumSampleSize:    _IG_PAT,
      currentSampleSize:    closedTrades,
      isStatisticallyValid: closedTrades >= _IG_PAT,
      confidence:           0.85,
      supportingData:       { badProcWins, closedTrades, ratio, validWR },
      actionRequired:       true,
    }));
  }

  return insights;
}

// ─────────────────────────────────────────────────────────────
// SECTION 5 — MILESTONE INSIGHTS
// ─────────────────────────────────────────────────────────────

function generateMilestoneInsights(memory, existingMilestones = []) {
  const insights   = [];
  const total      = memory.global?.totalTrades ?? 0;
  const global     = memory.global;
  const milestones = [10, 25, 50, 100, 200];

  for (const milestone of milestones) {
    if (total < milestone || existingMilestones.includes(milestone)) continue;
    const validProcessCount  = global.validProcessCount ?? 0;
    const closedTrades       = global.closedTrades ?? 1;
    insights.push(createInsight({
      type:     InsightType.MILESTONE,
      priority: InsightPriority.LOW,
      title:    `${milestone} trades completed`,
      body:     `At ${milestone} trades — win rate: ${_pct(global.winRate)}, expectancy: ${_r(global.expectancy)}R, ` +
                `profit factor: ${_r(global.profitFactor)}, valid-process rate: ${_pct(validProcessCount / closedTrades)}, ` +
                `avg score: ${_r(global.avgOverallScore)}.`,
      minimumSampleSize:    milestone,
      currentSampleSize:    total,
      isStatisticallyValid: true,
      confidence:           1.0,
      supportingData:       { milestone, total, winRate: global.winRate, expectancy: global.expectancy },
      actionRequired:       false,
    }));
  }

  return insights;
}

// ─────────────────────────────────────────────────────────────
// INTERNALS
// ─────────────────────────────────────────────────────────────

function _pct(val) { return `${Math.round((val ?? 0) * 10000) / 100}%`; }
function _r(val)   { return `${Math.round((val ?? 0) * 100) / 100}`; }
function _edgeConf(n, wr) {
  return Math.round(Math.min(0.95, 0.40 + Math.min(1, n / 30) * 0.35 + Math.min(1, Math.abs(wr - 0.5) * 5) * 0.20) * 100) / 100;
}

// ━━━ insightEngine.js ━━━
/**
 * insightEngine.js — Trading Analytics Engine
 * ──────────────────────────────────────────────
 * Orchestrates the complete insight generation pipeline.
 *
 * Responsibilities:
 *   - Coordinate all insight generators
 *   - Deduplicate: never surface the same insight twice
 *   - Rank: prioritize actionable, high-confidence insights
 *   - Filter: suppress low-confidence or data-insufficient insights
 *   - Archive: mark obsolete insights (superseded by new data)
 *   - Expose a clean interface to the UI layer
 *
 * This module controls the SIGNAL-TO-NOISE ratio of the system.
 * Its job is not to generate as many insights as possible —
 * it is to surface only what is statistically meaningful,
 * actionable, and not already known.
 *
 * @module insightEngine
 * @version 1.0.0
 */




// Minimum confidence to surface an insight to the user
const MIN_CONFIDENCE_THRESHOLD = 0.55;

// Minimum global trades before running insight generation
const MIN_TRADES_FOR_INSIGHTS = 8;

// Cooldown: same-title insight not regenerated within N trades
const SAME_INSIGHT_COOLDOWN_TRADES = 10;

// Priority ordering for ranking
const PRIORITY_ORDER = {
  [InsightPriority.CRITICAL]: 0,
  [InsightPriority.HIGH]:     1,
  [InsightPriority.MEDIUM]:   2,
  [InsightPriority.LOW]:      3,
};


// ─────────────────────────────────────────────────────────────
// SECTION 1 — MAIN PIPELINE
// ─────────────────────────────────────────────────────────────

/**
 * Runs the full insight generation pipeline after a trade is added.
 * This is the primary entry point, called by app.js.
 *
 * Steps:
 *   1. Check if enough data exists to generate insights
 *   2. Build error report (needed by multiple generators)
 *   3. Run all generators
 *   4. Deduplicate against existing insights
 *   5. Filter low-confidence results
 *   6. Rank by priority and confidence
 *   7. Archive obsolete existing insights
 *   8. Persist new insights to Store
 *
 * @returns {{ ok: boolean, newInsights: Insight[], archivedCount: number, error?: string }}
 */
function generateInsights() {
  try {
    const memory = Store.memory.get();
    const global = memory?.global;

    if (!global || (global.totalTrades ?? 0) < MIN_TRADES_FOR_INSIGHTS) {
      return { ok: true, newInsights: [], archivedCount: 0 };
    }

    // Build error report once — shared across generators
    const errorReport = buildErrorReport();

    // Get behavioral pattern report from error engine
    const patternReport = detectBehaviorPatterns();

    // Run all generators
    const candidates = [
      ...generateEdgeInsights(memory),
      ...generateWarningInsights(errorReport, memory),
      ...generatePatternInsights(patternReport),
      ...generateRecommendationInsights(memory, errorReport),
      ...generateMilestoneInsights(memory, _getExistingMilestones()),
    ];

    // Load existing insights for deduplication
    const existing = Store.insights.getAll();

    // Filter pipeline
    const filtered  = filterLowConfidenceInsights(candidates);
    const deduped   = _deduplicateInsights(filtered, existing);
    const ranked    = rankInsights(deduped);

    // Archive obsolete existing insights
    const archivedCount = _archiveObsoleteInsights(existing, candidates);

    // Persist new insights
    for (const insight of ranked) {
      Store.insights.add(insight);
    }

    return { ok: true, newInsights: ranked, archivedCount };

  } catch (err) {
    console.error('[insightEngine] generateInsights failed:', err.message);
    return { ok: false, newInsights: [], archivedCount: 0, error: err.message };
  }
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — RANKING
// Determines the order in which insights are surfaced.
// Priority order: CRITICAL > HIGH > MEDIUM > LOW
// Within same priority: actionRequired > confidence > recency
// ─────────────────────────────────────────────────────────────

/**
 * Ranks insights by priority, actionability, and confidence.
 * Returns a new sorted array — does not mutate input.
 *
 * @param {Insight[]} insights
 * @returns {Insight[]}
 */
function rankInsights(insights) {
  return [...insights].sort((a, b) => {
    // 1. Priority
    const priorityDiff = (PRIORITY_ORDER[a.priority] ?? 4) - (PRIORITY_ORDER[b.priority] ?? 4);
    if (priorityDiff !== 0) return priorityDiff;

    // 2. Action required first
    if (a.actionRequired && !b.actionRequired) return -1;
    if (!a.actionRequired && b.actionRequired) return 1;

    // 3. Higher confidence first
    return (b.confidence ?? 0) - (a.confidence ?? 0);
  });
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — FILTERING
// ─────────────────────────────────────────────────────────────

/**
 * Filters out insights that don't meet confidence or sample thresholds.
 *
 * @param {Insight[]} candidates
 * @returns {Insight[]}
 */
function filterLowConfidenceInsights(candidates) {
  return candidates.filter(insight => {
    // Must meet confidence threshold
    if ((insight.confidence ?? 0) < MIN_CONFIDENCE_THRESHOLD) return false;

    // Must be statistically valid (has enough data)
    if (!insight.isStatisticallyValid) return false;

    // Sample size must meet minimum
    if ((insight.currentSampleSize ?? 0) < (insight.minimumSampleSize ?? 0)) return false;

    return true;
  });
}


// ─────────────────────────────────────────────────────────────
// SECTION 4 — ARCHIVING OBSOLETE INSIGHTS
// An insight becomes obsolete when:
//   1. A newer, higher-confidence version of it has been generated
//   2. The underlying condition has resolved (e.g., error no longer recurring)
//   3. It is a milestone already exceeded by a newer milestone
// ─────────────────────────────────────────────────────────────

/**
 * Archives obsolete insights in the Store.
 * Returns the count of archived insights.
 *
 * @param {Insight[]} existingInsights
 * @param {Insight[]} newCandidates - Newly generated candidates (pre-filter)
 * @returns {number}
 */
function archiveObsoleteInsights(existingInsights, newCandidates) {
  return _archiveObsoleteInsights(existingInsights, newCandidates);
}

function _archiveObsoleteInsights(existingInsights, newCandidates) {
  let archivedCount = 0;
  const now = new Date().toISOString();

  for (const existing of existingInsights) {
    if (existing.dismissed) continue;

    // Archive if superseded by a newer same-type insight on same subject
    const superseded = newCandidates.some(candidate =>
      candidate.type           === existing.type          &&
      candidate.relatedSetup   === existing.relatedSetup  &&
      candidate.relatedSession === existing.relatedSession &&
      candidate.relatedError   === existing.relatedError  &&
      candidate.title          !== existing.title          &&  // Different conclusion
      candidate.confidence     >= (existing.confidence ?? 0)
    );

    // Archive if a WARNING insight's error is no longer recurring
    const errorResolved = (
      existing.type === InsightType.WARNING &&
      existing.relatedError &&
      _isErrorNoLongerRecurring(existing.relatedError)
    );

    if (superseded || errorResolved) {
      Store.insights.dismiss(existing.id);
      archivedCount++;
    }
  }

  return archivedCount;
}

/**
 * Checks if an error code is no longer flagged as recurring.
 * @param {string} errorCode
 * @returns {boolean}
 */
function _isErrorNoLongerRecurring(errorCode) {
  const registry = Store.errorRegistry.get();
  return registry?.[errorCode]?.isRecurring === false;
}


// ─────────────────────────────────────────────────────────────
// SECTION 5 — DEDUPLICATION
// Prevents the same insight from being generated on every trade.
// Uses title-based matching with a cooldown window.
// ─────────────────────────────────────────────────────────────

/**
 * Removes candidates that duplicate existing non-dismissed insights.
 *
 * Deduplication logic:
 *   - Exact title match: always deduplicate
 *   - Same type + same related entity + similar confidence: deduplicate
 *     if existing was generated within SAME_INSIGHT_COOLDOWN_TRADES trades
 *
 * @param {Insight[]} candidates
 * @param {Insight[]} existing
 * @returns {Insight[]}
 */
function _deduplicateInsights(candidates, existing) {
  const activeExisting = existing.filter(i => !i.dismissed);
  const currentCount   = Store.trades.count();

  return candidates.filter(candidate => {
    // Check exact title match
    const exactMatch = activeExisting.find(e => e.title === candidate.title);
    if (exactMatch) return false;

    // Check same type + entity within cooldown window
    const cooldownMatch = activeExisting.find(e => {
      if (e.type !== candidate.type) return false;
      if (e.relatedSetup   !== candidate.relatedSetup)   return false;
      if (e.relatedSession !== candidate.relatedSession) return false;
      if (e.relatedError   !== candidate.relatedError)   return false;

      // Count trades since existing insight was generated
      // (approximate using lastUpdated vs createdAt ordering)
      const existingTradeCount = e.supportingData?.tradeCountAtGeneration ?? 0;
      const tradesSince        = currentCount - existingTradeCount;
      return tradesSince < SAME_INSIGHT_COOLDOWN_TRADES;
    });

    return !cooldownMatch;
  });
}


// ─────────────────────────────────────────────────────────────
// SECTION 6 — INSIGHT QUERIES (for UI)
// ─────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────
// APPLICATION STATE
// Minimal runtime state — everything else lives in Store.
// ─────────────────────────────────────────────────────────────

const _appState = {
  initialized:  false,
  version:      '1.0.0',
  initErrors:   [],
  initWarnings: [],
};


// ─────────────────────────────────────────────────────────────
// SECTION 1 — INITIALIZATION
// ─────────────────────────────────────────────────────────────

/**
 * Initializes the entire application.
 * Must be called once before any other App method.
 *
 * Initialization sequence:
 *   1. Check localStorage availability
 *   2. Initialize Store (hydrates cache from persistence)
 *   3. Apply schema migrations if needed
 *   4. Validate memory snapshot integrity
 *   5. Rebuild memory if snapshot is missing or stale
 *   6. Register Store event listeners
 *
 * @returns {{ ok: boolean, warnings: string[], errors: string[] }}
 */
function _appBoot() {
  if (_appState.initialized) {
    console.log('[app] _app_init() called more than once. Ignoring.');
    return { ok: true, warnings: ['Already initialized'], errors: [] };
  }

  const warnings = [];
  const errors   = [];

  // ── Step 1: Storage availability ──────────────────────────
  if (!isStorageAvailable()) {
    const msg = 'localStorage is not available. The application cannot persist data.';
    errors.push(msg);
    console.error('[app]', msg);
    return { ok: false, warnings, errors };
  }

  // ── Step 2: Store initialization ──────────────────────────
  const storeResult = Store.init();
  warnings.push(...(storeResult.warnings ?? []));

  if (!storeResult.ok) {
    errors.push(`Store initialization failed: ${storeResult.error}`);
    return { ok: false, warnings, errors };
  }

  // ── Step 3: Memory snapshot validation ────────────────────
  const memory     = Store.memory.get();
  const tradeCount = Store.trades.count();

  // If trades exist but memory is empty or mismatched, rebuild
  const memoryMissing    = !memory || !memory.tradeCount;
  const memoryMismatched = memory && memory.tradeCount !== tradeCount && tradeCount > 0;

  if (memoryMissing && tradeCount > 0) {
    warnings.push(`Memory snapshot absent but ${tradeCount} trades found. Rebuilding.`);
    const rebuildResult = rebuildMemory();
    if (!rebuildResult.ok) {
      warnings.push(`Memory rebuild failed: ${rebuildResult.error}. Some statistics may be stale.`);
    }
  } else if (memoryMismatched) {
    warnings.push(
      `Memory count (${memory.tradeCount}) mismatches trade count (${tradeCount}). Rebuilding.`
    );
    const rebuildResult = rebuildMemory();
    if (!rebuildResult.ok) {
      warnings.push(`Memory rebuild failed: ${rebuildResult.error}.`);
    }
  }

  // ── Step 4: Register Store event listeners ─────────────────
  _registerEventListeners();

  // ── Complete ───────────────────────────────────────────────
  _appState.initialized  = true;
  _appState.initWarnings = warnings;

  console.log(
    `[app] Initialized v${_appState.version}. ` +
    `Trades: ${tradeCount}. ` +
    `Warnings: ${warnings.length}.`
  );

  return { ok: true, warnings, errors };
}

/**
 * Registers Store event listeners for cross-module coordination.
 * This is the only place app.js wires modules together reactively.
 */
function _registerEventListeners() {
  // When a trade is deleted, memory needs a full rebuild
  // (incremental delete is O(n) — full rebuild is cleaner)
  Store.subscribe(StoreEvents.TRADE_DELETED, ({ trade }) => {
    console.log(`[app] Trade deleted (${trade.id}). Scheduling memory rebuild.`);
    try {
      rebuildMemory();
    } catch (err) {
      console.error('[app] Post-delete memory rebuild failed:', err.message);
    }
  });
}
