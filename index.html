  if (!source || typeof source !== 'object' || Array.isArray(source)) {
    return source ?? target;
  }

  const result = { ...target };

  for (const key of Object.keys(source)) {
    if (
      source[key] !== null &&
      typeof source[key] === 'object' &&
      !Array.isArray(source[key]) &&
      typeof target[key] === 'object' &&
      target[key] !== null &&
      !Array.isArray(target[key])
    ) {
      result[key] = _deepMerge(target[key], source[key]);
    } else {
      result[key] = source[key];
    }
  }

  return result;
}


// ─────────────────────────────────────────────────────────────
// PUBLIC API — NAMED EXPORT NAMESPACE
// All other modules import from this single export.
// Namespaced to make usage semantics clear at call sites:
//   import { Store } from './data/store.js'
//   Store.trades.add(trade)
//   Store.subscribe(StoreEvents.TRADE_ADDED, handler)
// ─────────────────────────────────────────────────────────────

const Store = Object.freeze({
  // Lifecycle
  init,
  getStatus,

  // Pub/Sub
  subscribe,
  unsubscribe,

  // Trades
  trades: Object.freeze({
    add:        addTrade,
    getById:    getTradeById,
    getAll:     getAllTrades,
    getRecent:  getRecentTrades,
    query:      queryTrades,
    update:     updateTrade,
    delete:     deleteTrade,
    count:      getTradeCount,
  }),

  // Memory
  memory: Object.freeze({
    get: getMemory,
    set: setMemory,
  }),

  // Insights
  insights: Object.freeze({
    add:          addInsight,
    getAll:       getAllInsights,
    getActive:    getActiveInsights,
    dismiss:      dismissInsight,
    setAll:       setInsights,
  }),

  // Error registry
  errorRegistry: Object.freeze({
    get:    getErrorRegistry,
    getOne: getErrorStats,
    set:    setErrorRegistry,
  }),

  // Config
  config: Object.freeze({
    get:      getConfig,
    getValue: getConfigValue,
    update:   updateConfig,
  }),
});

// ━━━ tradeBuilder.js ━━━
/**
 * tradeBuilder.js — Trading Analytics Engine
 * ────────────────────────────────────────────
 * Central construction layer for Trade objects.
 *
 * Responsibilities:
 *   - Build complete, valid Trade objects from partial UI input
 *   - Apply setup-specific defaults automatically
 *   - Normalize and sanitize incoming data
 *   - Guarantee that every trade entering the system has a
 *     consistent, complete shape — regardless of how the UI sends it
 *   - Decouple the UI entirely from the internal data model
 *
 * Rules:
 *   - The UI NEVER constructs Trade objects directly
 *   - Every trade that enters Store.trades.add() must pass through here
 *   - No persistence logic in this module
 *   - No evaluation logic in this module — that is evaluationEngine's job
 *   - Pure functions where possible — same input always yields same shape
 *
 * @module tradeBuilder
 * @version 1.0.0
 */



// ─────────────────────────────────────────────────────────────
// SECTION 1 — NORMALIZATION HELPERS
// All incoming data from the UI is untyped (strings from form
// inputs, numbers that may be strings, booleans from checkboxes).
// These helpers coerce to the correct types silently.
// ─────────────────────────────────────────────────────────────

/**
 * Coerces a value to a float. Returns null if unparseable.
 * @param {*} val
 * @returns {number|null}
 */
function _toFloat(val) {
  if (val === null || val === undefined || val === '') return null;
  const n = parseFloat(val);
  return isNaN(n) ? null : n;
}

/**
 * Coerces a value to an integer. Returns null if unparseable.
 * @param {*} val
 * @returns {number|null}
 */
function _toInt(val) {
  if (val === null || val === undefined || val === '') return null;
  const n = parseInt(val, 10);
  return isNaN(n) ? null : n;
}

/**
 * Coerces a value to a boolean.
 * Handles strings like 'true', 'false', '1', '0' from form inputs.
 * @param {*} val
 * @returns {boolean}
 */
function _toBool(val) {
  if (typeof val === 'boolean') return val;
  if (val === 'true' || val === '1' || val === 1) return true;
  if (val === 'false' || val === '0' || val === 0) return false;
  return Boolean(val);
}

/**
 * Coerces a value to a string, trimmed. Returns '' if null/undefined.
 * @param {*} val
 * @returns {string}
 */
function _toStr(val) {
  if (val === null || val === undefined) return '';
  return String(val).trim();
}

/**
 * Validates that a value is a member of a frozen enum object.
 * Returns the value if valid, fallback if not.
 * @param {*} val
 * @param {Object} enumObj
 * @param {*} fallback
 * @returns {*}
 */
function _coerceEnum(val, enumObj, fallback) {
  return Object.values(enumObj).includes(val) ? val : fallback;
}

/**
 * Ensures a value is an Array. Wraps non-arrays, returns empty for null.
 * @param {*} val
 * @returns {Array}
 */
function _toArray(val) {
  if (Array.isArray(val)) return val;
  if (val === null || val === undefined) return [];
  return [val];
}

/**
 * Computes R:R ratio from entry, SL, and TP prices.
 * Returns null if any input is missing or SL distance is zero.
 *
 * @param {number|null} entry
 * @param {number|null} sl
 * @param {number|null} tp
 * @returns {number|null}
 */
function _computeRRRatio(entry, sl, tp) {
  if (entry == null || sl == null || tp == null) return null;
  const risk   = Math.abs(entry - sl);
  const reward = Math.abs(tp - entry);
  if (risk === 0) return null;
  return Math.round((reward / risk) * 100) / 100;
}

/**
 * Computes the midpoint of two price levels.
 * Returns null if either is missing.
 *
 * @param {number|null} high
 * @param {number|null} low
 * @returns {number|null}
 */
function _computeMidpoint(high, low) {
  if (high == null || low == null) return null;
  return Math.round(((high + low) / 2) * 100000) / 100000; // 5 decimal precision
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — CONTEXT NORMALIZATION
// Parses and sanitizes the context block of a trade.
// ─────────────────────────────────────────────────────────────

/**
 * Normalizes the context block from raw UI data.
 *
 * @param {Object} raw - Raw context data from form
 * @returns {Trade['context']}
 */
function normalizeContext(raw = {}) {
  return {
    market:    _coerceEnum(_toStr(raw.market),    Market,    Market.NAS100),
    session:   _coerceEnum(_toStr(raw.session),   Session,   Session.LONDON),
    date:      _toStr(raw.date)  || null,
    time:      _toStr(raw.time)  || null,
    direction: _coerceEnum(_toStr(raw.direction), Direction, Direction.LONG),

    marketCondition: {
      trend_D1:   _coerceEnum(_toStr(raw.marketCondition?.trend_D1),   TrendBias,  TrendBias.UNCLEAR),
      trend_H4:   _coerceEnum(_toStr(raw.marketCondition?.trend_H4),   TrendBias,  TrendBias.UNCLEAR),
      volatility: _coerceEnum(_toStr(raw.marketCondition?.volatility), Volatility, Volatility.NORMAL),
      newsPresent: _toBool(raw.marketCondition?.newsPresent ?? false),
      newsType:    _toStr(raw.marketCondition?.newsType) || null,
    },
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — SETUP DATA NORMALIZATION
// Each setup type has its own normalization path.
// ─────────────────────────────────────────────────────────────

/**
 * Normalizes S1 (Order Block H4) setup data from raw input.
 * Auto-computes entryLevel as 50% of OB if not explicitly provided.
 *
 * @param {Object} raw - Raw S1 data from form
 * @returns {S1SetupData}
 */
function normalizeS1Data(raw = {}) {
  const base    = createS1SetupData();
  const obHigh  = _toFloat(raw.obHigh);
  const obLow   = _toFloat(raw.obLow);

  // Auto-compute 50% entry if not provided
  const entryLevel = _toFloat(raw.entryLevel) ?? _computeMidpoint(obHigh, obLow);

  const rawChecks = raw.conditionChecks ?? {};

  return {
    ...base,
    obHigh,
    obLow,
    entryLevel,
    obDescription: _toStr(raw.obDescription),

    conditionChecks: {
      trend_D1_confirmed:    _toBool(rawChecks.trend_D1_confirmed    ?? false),
      impulse_candles_count: _toInt(rawChecks.impulse_candles_count  ?? 0),
      bos_present:           _toBool(rawChecks.bos_present           ?? false),
      first_retest:          _toBool(rawChecks.first_retest          ?? false),
      space_available:       _toBool(rawChecks.space_available       ?? false),
      market_not_ranging:    _toBool(rawChecks.market_not_ranging    ?? false),
    },

    impulseStrength: _coerceEnum(
      _toStr(raw.impulseStrength),
      ImpulseStrength,
      ImpulseStrength.MODERATE
    ),

    zoneQuality: _coerceEnum(
      _toStr(raw.zoneQuality),
      ZoneQuality,
      ZoneQuality.ACCEPTABLE
    ),
  };
}

/**
 * Normalizes S2 (Fair Value Gap H1) setup data from raw input.
 * Auto-computes fvgMidpoint if not provided.
 *
 * @param {Object} raw - Raw S2 data from form
 * @returns {S2SetupData}
 */
function normalizeS2Data(raw = {}) {
  const base    = createS2SetupData();
  const fvgHigh = _toFloat(raw.fvgHigh);
  const fvgLow  = _toFloat(raw.fvgLow);

  const fvgMidpoint = _toFloat(raw.fvgMidpoint) ?? _computeMidpoint(fvgHigh, fvgLow);

  const rawChecks       = raw.conditionChecks       ?? {};
  const rawOptional     = raw.optionalConfirmations ?? {};

  return {
    ...base,
    fvgHigh,
    fvgLow,
    fvgMidpoint,

    conditionChecks: {
      valid_3_candle_structure: _toBool(rawChecks.valid_3_candle_structure ?? false),
      entry_at_50_percent:      _toBool(rawChecks.entry_at_50_percent      ?? false),
      not_mitigated:            _toBool(rawChecks.not_mitigated            ?? false),
      price_not_chased:         _toBool(rawChecks.price_not_chased         ?? false),
      no_reentry:               _toBool(rawChecks.no_reentry               ?? false),
      strong_impulse:           _toBool(rawChecks.strong_impulse           ?? false),
      clean_continuation:       _toBool(rawChecks.clean_continuation       ?? false),
    },

    optionalConfirmations: {
      bos_m5_confirmed: _toBool(rawOptional.bos_m5_confirmed ?? false),
      clear_rejection:  _toBool(rawOptional.clear_rejection  ?? false),
      fvg_aligned:      _toBool(rawOptional.fvg_aligned      ?? false),
    },

    fvgStrength: _coerceEnum(
      _toStr(raw.fvgStrength),
      ImpulseStrength,
      ImpulseStrength.MODERATE
    ),

    fvgClarity: _coerceEnum(
      _toStr(raw.fvgClarity),
      ZoneQuality,
      ZoneQuality.ACCEPTABLE
    ),
  };
}

/**
 * Normalizes the full setup block, routing to the correct
 * setup-specific normalizer based on setup type.
 *
 * @param {Object} raw - Raw setup data from form
 * @returns {Trade['setup']}
 */
function normalizeSetup(raw = {}) {
  const type = _coerceEnum(_toStr(raw.type), SetupType, null);

  return {
    type,
    classification_pre: _coerceEnum(
      _toStr(raw.classification_pre),
      SetupClassification,
      SetupClassification.B_PLUS
    ),
    s1_data: type === SetupType.S1_OB_H4  ? normalizeS1Data(raw.s1_data  ?? {}) : null,
    s2_data: type === SetupType.S2_FVG_H1 ? normalizeS2Data(raw.s2_data  ?? {}) : null,
  };
}

/**
 * Normalizes the execution block.
 * Computes R:R ratio from prices if not provided directly.
 *
 * @param {Object} raw
 * @returns {Trade['execution']}
 */
function normalizeExecution(raw = {}) {
  const entryPrice = _toFloat(raw.entryPrice);
  const stopLoss   = _toFloat(raw.stopLoss);
  const takeProfit = _toFloat(raw.takeProfit);

  return {
    entryType:  _coerceEnum(_toStr(raw.entryType), EntryType, EntryType.LIMIT),
    entryPrice,
    stopLoss,
    takeProfit,
    riskAmount: _toFloat(raw.riskAmount),
    rRatio:     _toFloat(raw.rRatio) ?? _computeRRRatio(entryPrice, stopLoss, takeProfit),
    lotSize:    _toFloat(raw.lotSize),
    executionDeviations: _toArray(raw.executionDeviations),
  };
}

/**
 * Normalizes the result block.
 *
 * @param {Object} raw
 * @returns {Trade['result']}
 */
function normalizeResult(raw = {}) {
  return {
    outcome:    _coerceEnum(_toStr(raw.outcome), Outcome, Outcome.OPEN),
    pnlR:       _toFloat(raw.pnlR),
    pnlAmount:  _toFloat(raw.pnlAmount),
    exitReason: _toStr(raw.exitReason) || null,
    exitPrice:  _toFloat(raw.exitPrice),
    maxAdverseExcursion:   _toFloat(raw.maxAdverseExcursion),
    maxFavorableExcursion: _toFloat(raw.maxFavorableExcursion),
  };
}

/**
 * Normalizes the notes block.
 *
 * @param {Object} raw
 * @returns {Trade['notes']}
 */
function normalizeNotes(raw = {}) {
  return {
    preTradeAnalysis: _toStr(raw.preTradeAnalysis),
    postTradeReview:  _toStr(raw.postTradeReview),
    lessonsLearned:   _toStr(raw.lessonsLearned),
    tags:             _toArray(raw.tags).map(_toStr).filter(Boolean),
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 4 — SETUP DEFAULTS
// Applies opinionated defaults based on setup type.
// Defaults represent the "expected" state for a given setup —
// not the validated state. The validator sets actual pass/fail.
// ─────────────────────────────────────────────────────────────

/**
 * Applies setup-specific defaults to a trade after normalization.
 * Mutates a copy — does not modify the input.
 *
 * Defaults applied:
 *   - S1: entryType always LIMIT, rRatio default 2.0
 *   - S2: entryType always LIMIT, rRatio default 2.0
 *   - Both: OPEN outcome on new trade
 *
 * @param {Trade} trade - Already normalized trade object
 * @returns {Trade}
 */
function applySetupDefaults(trade) {
  const updated = { ...trade };

  // Both setups use LIMIT entries — enforce unless explicitly overridden
  if (updated.setup.type !== null) {
    if (updated.execution.entryType === EntryType.MARKET) {
      // Market entries are allowed but flag them — UI should warn
      // We do not override — we let the validator flag it
    } else {
      updated.execution = {
        ...updated.execution,
        entryType: EntryType.LIMIT,
      };
    }
  }

  // Default R:R = 2.0 if still null after normalization
  if (updated.execution.rRatio === null) {
    updated.execution = { ...updated.execution, rRatio: 2.0 };
  }

  // New trades are always OPEN
  if (!updated.result.outcome || updated.result.outcome === Outcome.OPEN) {
    updated.result = { ...updated.result, outcome: Outcome.OPEN };
  }

  return updated;
}


// ─────────────────────────────────────────────────────────────
// SECTION 5 — FULL NORMALIZATION PIPELINE
// Combines all normalizers into a single pass over raw input.
// ─────────────────────────────────────────────────────────────

/**
 * Normalizes a raw data object into a complete, typed Trade shape.
 * Does NOT assign a new ID — preserves any existing id in raw.
 * Use buildTrade() for new trades that need a generated ID.
 *
 * @param {Object} raw - Arbitrary object from UI or import
 * @returns {Trade}
 */
function normalizeTradeData(raw = {}) {
  const base = schemaCreateTrade(); // Get the full default shape

  return {
    ...base,

    // Preserve existing identity fields if present
    id:            _toStr(raw.id)            || base.id,
    schemaVersion: _toStr(raw.schemaVersion) || SCHEMA_VERSION,
    createdAt:     _toStr(raw.createdAt)     || base.createdAt,
    updatedAt:     _toStr(raw.updatedAt)     || base.updatedAt,
    version:       _toInt(raw.version)       ?? 1,

    context:    normalizeContext(raw.context),
    setup:      normalizeSetup(raw.setup),
    validation: {
      conditionsMet:      _toArray(raw.validation?.conditionsMet),
      conditionsViolated: _toArray(raw.validation?.conditionsViolated),
      validationScore:    _toFloat(raw.validation?.validationScore) ?? 0.0,
      shouldHaveTaken:    raw.validation?.shouldHaveTaken ?? null,
    },
    execution:  normalizeExecution(raw.execution),
    result:     normalizeResult(raw.result),

    // Evaluation is always rebuilt by evaluationEngine — never trust raw
    evaluation: createTradeEvaluation(),

    notes: normalizeNotes(raw.notes),
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 6 — PUBLIC BUILDER FUNCTIONS
// ─────────────────────────────────────────────────────────────

/**
 * Constructs a new, complete Trade object from partial UI input.
 *
 * Pipeline:
 *   1. Normalize all incoming raw data
 *   2. Apply setup-specific defaults
 *   3. Assign fresh ID and timestamps
 *   4. Return a complete, store-ready Trade
 *
 * The returned trade is NOT yet persisted. Call Store.trades.add()
 * after running it through setupValidator and evaluationEngine.
 *
 * @param {Object} rawInput - Partial trade data from UI form
 * @returns {{ trade: Trade, warnings: string[] }}
 */
function buildTrade(rawInput = {}) {
  const warnings = [];

  // Step 1: Normalize
  const normalized = normalizeTradeData(rawInput);

  // Step 2: Apply setup defaults
  const withDefaults = applySetupDefaults(normalized);

  // Step 3: Assign fresh identity (overwrite any id from raw input)
  const trade = {
    ...withDefaults,
    id:        generateId(),
    createdAt: nowISO(),
    updatedAt: nowISO(),
    version:   1,
  };

  // Step 4: Warnings for incomplete data that the UI should surface
  if (!trade.context.date) {
    warnings.push('Trade date is not set.');
  }
  if (!trade.context.time) {
    warnings.push('Trade time is not set.');
  }
  if (trade.setup.type === null) {
    warnings.push('Setup type is not set. Trade cannot be validated.');
  }
  if (trade.execution.entryPrice === null) {
    warnings.push('Entry price is not set.');
  }
  if (trade.execution.stopLoss === null) {
    warnings.push('Stop loss is not set.');
  }
  if (trade.execution.takeProfit === null) {
    warnings.push('Take profit is not set.');
  }
  if (trade.context.marketCondition.trend_D1 === TrendBias.UNCLEAR) {
    warnings.push('D1 trend is UNCLEAR — this will reduce setup quality score.');
  }

  return { trade, warnings };
}

/**
 * Applies a partial update to an existing trade.
 *
 * This function:
 *   1. Merges patch into the existing trade (deep merge of known blocks)
 *   2. Re-normalizes only the patched blocks to ensure type safety
 *   3. Increments version and refreshes updatedAt
 *   4. Resets evaluation — it must be recomputed by evaluationEngine
 *
 * The caller must pass the result to evaluationEngine before
 * calling Store.trades.update().
 *
 * @param {Trade} existingTrade - Current trade from Store
 * @param {Object} patch - Partial update from UI
 * @returns {{ trade: Trade, warnings: string[] }}
 */
function patchTrade(existingTrade, patch = {}) {
  if (!existingTrade || !existingTrade.id) {
    throw new Error('[tradeBuilder] patchTrade: existingTrade must be a valid Trade object');
  }

  const warnings = [];

  // Merge and re-normalize only the blocks present in patch
  const merged = {
    ...existingTrade,

    context: patch.context
      ? normalizeContext({ ...existingTrade.context, ...patch.context })
      : existingTrade.context,

    setup: patch.setup
      ? normalizeSetup({ ...existingTrade.setup, ...patch.setup })
      : existingTrade.setup,

    execution: patch.execution
      ? normalizeExecution({ ...existingTrade.execution, ...patch.execution })
      : existingTrade.execution,

    result: patch.result
      ? normalizeResult({ ...existingTrade.result, ...patch.result })
      : existingTrade.result,

    notes: patch.notes
      ? normalizeNotes({ ...existingTrade.notes, ...patch.notes })
      : existingTrade.notes,

    // Validation block is patched directly — it comes from setupValidator
    validation: patch.validation
      ? { ...existingTrade.validation, ...patch.validation }
      : existingTrade.validation,

    // Evaluation is always reset — will be recomputed by evaluationEngine
    evaluation: createTradeEvaluation(),

    // Identity fields — never overwritten by patch
    id:        existingTrade.id,
    createdAt: existingTrade.createdAt,
    updatedAt: nowISO(),
    version:   (existingTrade.version ?? 1) + 1,
  };

  // Reapply setup defaults in case execution type changed
  const trade = applySetupDefaults(merged);

  // Warn on result updates without exit data
  if (
    patch.result?.outcome &&
    patch.result.outcome !== Outcome.OPEN &&
    patch.result.outcome !== Outcome.CANCELLED &&
    !trade.result.exitPrice
  ) {
    warnings.push('Outcome set but exit price is missing.');
  }

  // Warn if closing a trade without a post-trade review
  if (
    patch.result?.outcome === Outcome.WIN ||
    patch.result?.outcome === Outcome.LOSS
  ) {
    if (!trade.notes.postTradeReview) {
      warnings.push('Trade closed without post-trade review. This reduces evaluation score.');
    }
  }

  return { trade, warnings };
}

/**
 * Creates a deep clone of an existing trade with a new identity.
 * Useful for:
 *   - Testing a setup variation against historical data
 *   - Duplicating a trade template for a similar setup
 *
 * The clone:
 *   - Gets a new ID
 *   - Gets fresh timestamps
 *   - Resets to version 1
 *   - Resets evaluation (must be recomputed)
 *   - Resets result to OPEN
 *   - Preserves all setup and context data
 *
 * @param {Trade} sourceTrade
 * @returns {{ trade: Trade, warnings: string[] }}
 */
function cloneTrade(sourceTrade) {
  if (!sourceTrade || !sourceTrade.id) {
    throw new Error('[tradeBuilder] cloneTrade: sourceTrade must be a valid Trade object');
  }

  const cloned = {
    ...JSON.parse(JSON.stringify(sourceTrade)), // Deep clone without references
    id:         generateId(),
    createdAt:  nowISO(),
    updatedAt:  nowISO(),
    version:    1,
    evaluation: createTradeEvaluation(),
    result: {
      ...sourceTrade.result,
      outcome:     Outcome.OPEN,
      pnlR:        null,
      pnlAmount:   null,
      exitReason:  null,
      exitPrice:   null,
      maxAdverseExcursion:   null,
      maxFavorableExcursion: null,
    },
    validation: {
      conditionsMet:      [],
      conditionsViolated: [],
      validationScore:    0.0,
      shouldHaveTaken:    null,
    },
    notes: {
      ...sourceTrade.notes,
      postTradeReview: '',
      lessonsLearned:  '',
    },
  };

  return {
    trade:    cloned,
    warnings: ['Trade cloned from source. Review all fields before submission.'],
  };
}

// ━━━ setupValidator.js ━━━
/**
 * setupValidator.js — Trading Analytics Engine
 * ──────────────────────────────────────────────
 * The operational brain of the system.
 * Contains ALL business logic for validating, scoring, and
 * classifying trading setups S1 and S2.
 *
 * Responsibilities:
 *   - Validate structural completeness of setup data
 *   - Validate market context eligibility
 *   - Score setup quality across multiple dimensions
 *   - Classify setups as A+, B+, or C (Discard)
 *   - Detect invalidating conditions
 *   - Generate a detailed ValidationResult for each trade
 *
 * Architecture notes:
 *   - Every public function is pure: (input) → result
 *   - No side effects. No Store access. No persistence.
 *   - Results consumed by evaluationEngine.js and tradeBuilder.js
 *   - All conditions are explicit objects — no magic booleans
 *
 * ValidationResult shape:
 * {
 *   isValid:             boolean,   // Can this trade be taken?
 *   isInvalidating:      boolean,   // Hard rule violation — trade MUST NOT be taken
 *   conditionsMet:       ConditionCheck[],
 *   conditionsViolated:  ConditionCheck[],
 *   validationScore:     float,     // 0.0–1.0 ratio of required conditions met
 *   qualityScore:        float,     // 0–100 weighted quality assessment
 *   classification:      SetupClassification,
 *   shouldHaveTaken:     boolean,   // Post-hoc: was this objectively a takeable trade?
 *   invalidatingReasons: string[],  // Human-readable hard stop reasons
 *   scoringBreakdown:    Object,    // Per-dimension score detail
 *   notes:               string[],  // Advisory notes (not errors)
 * }
 *
 * @module setupValidator
 * @version 1.0.0
 */



// ─────────────────────────────────────────────────────────────
// CONSTANTS
// Thresholds that define quality boundaries.
// Centralizing them here makes future tuning explicit and safe.
// ─────────────────────────────────────────────────────────────

const THRESHOLDS = Object.freeze({
  // Minimum ratio of required conditions to be "valid"
  MIN_REQUIRED_CONDITIONS_RATIO: 0.7,

  // Minimum impulse candles for S1
  S1_MIN_IMPULSE_CANDLES: 3,

  // Quality score boundaries for classification
  A_PLUS_MIN_SCORE: 80,
  B_PLUS_MIN_SCORE: 60,
  // Below B_PLUS → C (Discard)

  // R:R minimum — below this is an automatic quality penalty
  MIN_RR_RATIO: 2.0,
});

// ─────────────────────────────────────────────────────────────
// CONDITION CHECK FACTORY
// Every condition in the system is represented as an explicit
// object — never a bare boolean. This enables:
//   - Display in UI checklist
//   - Storage in validation block
//   - Scoring in evaluationEngine
// ─────────────────────────────────────────────────────────────

/**
 * @typedef {Object} ConditionCheck
 * @property {string}  code     - Machine-readable identifier (e.g. 'S1_TREND_D1')
 * @property {string}  label    - Human-readable label
 * @property {boolean} passed   - Did this condition pass?
 * @property {boolean} required - Is this condition required (vs optional/advisory)?
 * @property {string}  [reason] - Explanation if failed
 * @property {number}  weight   - Relative weight in quality scoring (1–3)
 */

function makeCondition(code, label, passed, required, weight = 1, reason = '') {
  return { code, label, passed, required, weight, reason: passed ? '' : reason };
}


// ─────────────────────────────────────────────────────────────
// SECTION 1 — MARKET CONTEXT VALIDATION
// Validates whether the broader market context is eligible
// for trading at all — independent of setup type.
// ─────────────────────────────────────────────────────────────

/**
 * Validates the market context of a trade.
 * Returns a list of ConditionChecks covering:
 *   - News presence
 *   - Trend clarity (D1)
 *   - Session suitability
 *
 * These checks feed into both validation and quality scoring.
 *
 * @param {Trade['context']} context
 * @returns {{ checks: ConditionCheck[], invalidatingReasons: string[] }}
 */
function validateMarketContext(context) {
  const checks = [];
  const invalidatingReasons = [];

  const mc = context.marketCondition;

  // ── High-impact news — HARD INVALIDATION ─────────────────
  // Trading during high-impact news is an unconditional disqualifier.
  // Institutional order flow during news events invalidates
  // all technical setups regardless of quality.
  const noHighImpactNews = makeCondition(
    'CTX_NO_NEWS',
    'No high-impact news event active',
    !mc.newsPresent,
    true,   // required
    3,
    `High-impact news active (${mc.newsType ?? 'unknown'}). Setup invalidated.`
  );
  checks.push(noHighImpactNews);

  if (mc.newsPresent) {
    invalidatingReasons.push(
      `High-impact news active: ${mc.newsType ?? 'unknown'}. ` +
      `All technical setups are invalidated during institutional news flow.`
    );
  }

  // ── D1 Trend clarity ─────────────────────────────────────
  // Both S1 and S2 require directional bias. RANGING or UNCLEAR
  // D1 doesn't necessarily invalidate (S2 can work in ranges
  // with FVG alignment) but reduces quality significantly.
  const trendClarity = makeCondition(
    'CTX_TREND_CLARITY',
    'D1 trend is clear and directional',
    mc.trend_D1 !== TrendBias.UNCLEAR,
    false,  // advisory — not a hard invalidator at context level
    2,
    `D1 trend is UNCLEAR — reduces confidence in directional bias.`
  );
  checks.push(trendClarity);

  // ── D1 trend alignment with direction ────────────────────
  // This check is advisory here — the setup validators enforce
  // direction alignment for specific setups.
  const trendDefined = makeCondition(
    'CTX_TREND_DEFINED',
    'D1 trend is not RANGING',
    mc.trend_D1 !== TrendBias.RANGING,
    false,
    1,
    `D1 shows RANGING structure — continuation setups have lower edge in ranges.`
  );
  checks.push(trendDefined);

  // ── Extreme volatility warning ────────────────────────────
  // Not an invalidator, but HIGH volatility inflates spreads
  // and makes LIMIT entry fills less reliable.
  const volatilityAcceptable = makeCondition(
    'CTX_VOLATILITY',
    'Volatility is normal or low',
    mc.volatility !== Volatility.HIGH,
    false,
    1,
    `High volatility detected — LIMIT fills less reliable, spread impact higher.`
  );
  checks.push(volatilityAcceptable);

  return { checks, invalidatingReasons };
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — S1 VALIDATION (ORDER BLOCK H4)
// ─────────────────────────────────────────────────────────────

/**
 * Validates the S1 Order Block H4 setup.
 *
 * Required conditions (all must pass for isValid = true):
 *   1. D1 trend confirmed in trade direction
 *   2. Minimum 3 impulse candles
 *   3. First retest of the zone (no prior touches)
 *   4. Entry at or near 50% of OB
 *   5. Market is NOT in a lateral range
 *   6. Space available before TP (no major resistance within 2R)
 *
 * Quality amplifiers (improve score, don't invalidate):
 *   7. BOS present before OB formation
 *   8. Impulse strength is STRONG
 *   9. Zone quality is CLEAN
 *
 * Hard invalidators (immediate discard regardless of other checks):
 *   - Entry type is MARKET (S1 requires LIMIT)
 *   - OB levels are missing/invalid
 *   - Market is explicitly RANGING on D1
 *
 * @param {Trade} trade
 * @returns {ConditionCheck[]}
 */
function validateS1Conditions(trade) {
  const s1   = trade.setup.s1_data;
  const ctx  = trade.context;
  const exec = trade.execution;
  const cc   = s1?.conditionChecks ?? {};
  const checks = [];

  // ── Hard prerequisite: S1 data must exist ────────────────
  if (!s1) {
    return [makeCondition(
      'S1_DATA_MISSING',
      'S1 setup data is present',
      false, true, 3,
      'S1 setup data is completely missing. Cannot validate.'
    )];
  }

  // ── Hard prerequisite: OB price levels must be defined ───
  const hasOBLevels = s1.obHigh !== null && s1.obLow !== null && s1.obHigh > s1.obLow;
  checks.push(makeCondition(
    'S1_OB_LEVELS',
    'OB high/low price levels defined and valid',
    hasOBLevels,
    true, 3,
    'OB price levels are missing or invalid (high must be greater than low).'
  ));

  // ── Hard prerequisite: Entry must be LIMIT ───────────────
  // S1 is defined as a LIMIT order strategy — market entries
  // represent impulse buying and violate the setup's edge premise.
  const isLimitEntry = exec.entryType === EntryType.LIMIT;
  checks.push(makeCondition(
    'S1_ENTRY_LIMIT',
    'Entry type is LIMIT (not market)',
    isLimitEntry,
    true, 3,
    'S1 requires a LIMIT entry at 50% of OB. MARKET entry invalidates the setup.'
  ));

  // ── Required: D1 trend confirmed ─────────────────────────
  // The OB setup is a trend continuation strategy.
  // Counter-trend OBs are statistically much weaker.
  const trendConfirmed = cc.trend_D1_confirmed === true;
  checks.push(makeCondition(
    'S1_TREND_D1',
    'D1 trend confirmed in trade direction',
    trendConfirmed,
    true, 3,
    'D1 trend not confirmed. S1 is a trend continuation setup — no trend = no edge.'
  ));

  // ── Required: D1 is NOT ranging ──────────────────────────
  // A ranging D1 means the OB is likely to see both sides
  // of the zone tested repeatedly — 2R space assumption breaks.
  const notRanging = cc.market_not_ranging === true;
  checks.push(makeCondition(
    'S1_NOT_RANGING',
    'Market structure is not lateral/ranging on D1',
    notRanging,
    true, 2,
    'D1 shows lateral/ranging structure. OB edge significantly reduced in range conditions.'
  ));

  // ── Required: Minimum 3 impulse candles ──────────────────
  // The OB must have been created by a strong, sustained impulse.
  // Fewer than 3 candles = weak or corrective move = lower probability zone.
  const impulseCandleCount = cc.impulse_candles_count ?? 0;
  const hasMinImpulse = impulseCandleCount >= THRESHOLDS.S1_MIN_IMPULSE_CANDLES;
  checks.push(makeCondition(
    'S1_IMPULSE_COUNT',
    `Minimum ${THRESHOLDS.S1_MIN_IMPULSE_CANDLES} consecutive impulse candles`,
    hasMinImpulse,
    true, 2,
    `Only ${impulseCandleCount} impulse candle(s) detected. ` +
    `Minimum ${THRESHOLDS.S1_MIN_IMPULSE_CANDLES} required for valid OB formation.`
  ));

  // ── Required: First retest of the zone ───────────────────
  // An OB that has been touched multiple times is progressively
  // mitigated. The edge lives almost entirely in the first retest.
  const isFirstRetest = cc.first_retest === true;
  checks.push(makeCondition(
    'S1_FIRST_RETEST',
    'First retest of the OB zone (not previously tested)',
    isFirstRetest,
    true, 3,
    'OB has been previously retested. Mitigated zones have significantly reduced edge.'
  ));

  // ── Required: Space available to TP ──────────────────────
  // A 2R fixed TP requires clear space — no resistance within
  // the projected TP range. Blocked space = TP hits structure
  // before reaching 2R = negative expectancy on the setup.
  const spaceAvailable = cc.space_available === true;
  checks.push(makeCondition(
    'S1_SPACE_AVAILABLE',
    'No major resistance within 2R of entry',
    spaceAvailable,
    true, 3,
    'Resistance detected within the 2R target range. TP is obstructed — skip this setup.'
  ));

  // ── Entry level at 50% of OB ─────────────────────────────
  // The 50% entry is what gives S1 its risk/reward structure.
  // An entry at the top of the OB on a long trade worsens R:R.
  const entryIsAtFiftyPct = s1.entryLevel !== null && hasOBLevels
    ? _isNearMidpoint(s1.entryLevel, s1.obLow, s1.obHigh, 0.15)
    : false;
  checks.push(makeCondition(
    'S1_ENTRY_50PCT',
    'Entry level at or near 50% of OB',
    entryIsAtFiftyPct,
    true, 2,
    'Entry level is not at 50% of the OB. This changes the R:R and invalidates the setup structure.'
  ));

  // ── Quality: BOS present (amplifier) ─────────────────────
  // BOS confirms the impulse was strong enough to shift structure.
  // Not required but significantly improves confidence.
  const bosPresent = cc.bos_present === true;
  checks.push(makeCondition(
    'S1_BOS',
    'Break of Structure (BOS) present',
    bosPresent,
    false, 2,  // optional — improves classification
    'No BOS detected. BOS presence increases confidence in OB validity.'
  ));

  // ── Quality: Impulse strength STRONG ─────────────────────
  const strongImpulse = s1.impulseStrength === ImpulseStrength.STRONG;
  checks.push(makeCondition(
    'S1_IMPULSE_STRONG',
    'Impulse strength is STRONG (3 large candles, minimal retrace)',
    strongImpulse,
    false, 2,
    `Impulse strength is ${s1.impulseStrength}. STRONG impulse required for A+ classification.`
  ));

  // ── Quality: Zone quality is CLEAN ───────────────────────
  const cleanZone = s1.zoneQuality === ZoneQuality.CLEAN;
  checks.push(makeCondition(
    'S1_ZONE_CLEAN',
    'OB zone is clean (no wicks through the zone, tight structure)',
    cleanZone,
    false, 1,
    `Zone quality is ${s1.zoneQuality}. CLEAN zones have higher probability of price respecting the level.`
  ));

  return checks;
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — S2 VALIDATION (FAIR VALUE GAP H1)
// ─────────────────────────────────────────────────────────────

/**
 * Validates the S2 Fair Value Gap H1 setup.
 *
 * Required conditions:
 *   1. Valid 3-candle FVG structure
 *   2. FVG not previously mitigated (price has not returned to fill it)
 *   3. Entry at 50% of FVG (midpoint)
 *   4. Price was not chased (waited for price to come to level)
 *   5. No reentry attempt on same FVG
 *   6. Strong impulse creating the FVG
 *   7. Clean continuation structure (no chop)
 *
 * Optional confirmations (each adds to quality score):
 *   8. M5 BOS aligned with direction
 *   9. Clear rejection candle at FVG
 *  10. FVG aligned with higher-timeframe bias
 *
 * Hard invalidators:
 *   - FVG already mitigated
 *   - Price chased (market entry when price passed the level)
 *   - Reentry on same zone
 *
 * @param {Trade} trade
 * @returns {ConditionCheck[]}
 */
function validateS2Conditions(trade) {
  const s2   = trade.setup.s2_data;
  const exec = trade.execution;
  const cc   = s2?.conditionChecks  ?? {};
  const oc   = s2?.optionalConfirmations ?? {};
  const checks = [];

  // ── Hard prerequisite: S2 data must exist ────────────────
  if (!s2) {
    return [makeCondition(
      'S2_DATA_MISSING',
      'S2 setup data is present',
      false, true, 3,
      'S2 setup data is completely missing. Cannot validate.'
    )];
  }

  // ── Hard prerequisite: FVG price levels ──────────────────
  const hasFVGLevels = s2.fvgHigh !== null && s2.fvgLow !== null && s2.fvgHigh > s2.fvgLow;
  checks.push(makeCondition(
    'S2_FVG_LEVELS',
    'FVG high/low price levels defined and valid',
    hasFVGLevels,
    true, 3,
    'FVG price levels are missing or invalid.'
  ));

  // ── Hard prerequisite: Entry must be LIMIT ───────────────
  const isLimitEntry = exec.entryType === EntryType.LIMIT;
  checks.push(makeCondition(
    'S2_ENTRY_LIMIT',
    'Entry type is LIMIT (waiting for price to return to FVG)',
    isLimitEntry,
    true, 3,
    'S2 requires a LIMIT order at the FVG midpoint. Market entries chase price.'
  ));

  // ── Required: Valid 3-candle FVG structure ────────────────
  // Classic FVG = candle 1 high < candle 3 low (bullish) or
  // candle 1 low > candle 3 high (bearish). The gap must be real —
  // not just a shadow touch.
  const valid3Candle = cc.valid_3_candle_structure === true;
  checks.push(makeCondition(
    'S2_3_CANDLE',
    'Valid 3-candle FVG structure (no overlap between candle 1 and candle 3)',
    valid3Candle,
    true, 3,
    'FVG lacks a valid 3-candle structure. Price overlap between candle 1 and 3 invalidates the gap.'
  ));

  // ── Hard invalidator: FVG not mitigated ──────────────────
  // A mitigated FVG has been filled — price has returned and
  // traded through it. The imbalance is resolved. No edge remains.
  const notMitigated = cc.not_mitigated === true;
  checks.push(makeCondition(
    'S2_NOT_MITIGATED',
    'FVG has not been previously mitigated (price has not revisited)',
    notMitigated,
    true, 3,
    'FVG is already mitigated. Price has revisited the zone — imbalance is resolved. Setup is invalid.'
  ));

  // ── Hard invalidator: Price not chased ───────────────────
  // If price has already moved through the FVG level and the trader
  // enters at market — this is chasing. The edge of FVG is
  // specifically in having a pending LIMIT order waiting.
  const notChased = cc.price_not_chased === true;
  checks.push(makeCondition(
    'S2_NOT_CHASED',
    'Price was not chased (LIMIT order placed before price arrived)',
    notChased,
    true, 3,
    'Price was chased. FVG entries require pre-placed LIMIT orders — chasing eliminates the R:R.'
  ));

  // ── Hard invalidator: No reentry ─────────────────────────
  // Each FVG gets one attempt. A second entry on the same zone
  // means the first was stopped out — the zone has been tested
  // and failed. Reentry compounds the loss without adding edge.
  const noReentry = cc.no_reentry === true;
  checks.push(makeCondition(
    'S2_NO_REENTRY',
    'No reentry on same FVG zone (one attempt per zone)',
    noReentry,
    true, 3,
    'Reentry detected on previously traded FVG. One attempt per zone — reentries violate the setup rules.'
  ));

  // ── Required: Entry at 50% of FVG ────────────────────────
  const entryAt50 = cc.entry_at_50_percent === true;
  checks.push(makeCondition(
    'S2_ENTRY_50PCT',
    'Entry placed at 50% midpoint of FVG',
    entryAt50,
    true, 2,
    'Entry is not at FVG midpoint (50%). This alters R:R and deviates from setup definition.'
  ));

  // ── Required: Strong impulse creating the FVG ────────────
  // A weak or corrective move creating an FVG = low institutional
  // conviction. Strong impulse = unfinished institutional order.
  const strongImpulse = cc.strong_impulse === true;
  checks.push(makeCondition(
    'S2_STRONG_IMPULSE',
    'FVG created by a strong impulse move',
    strongImpulse,
    true, 2,
    'Impulse creating the FVG is not strong. Weak FVGs form in noise — no institutional conviction.'
  ));

  // ── Required: Clean continuation ─────────────────────────
  // The structure after the FVG should show clear continuation
  // intent — no immediate reversal candles, no choppy overlap.
  const cleanContinuation = cc.clean_continuation === true;
  checks.push(makeCondition(
    'S2_CLEAN_CONTINUATION',
    'Clean continuation structure (no chop or reversal signals)',
    cleanContinuation,
    true, 2,
    'Structure lacks clean continuation. Choppy price action around FVG reduces fill probability.'
  ));

  // ── Quality: FVG strength assessment ─────────────────────
  const strongFVG = s2.fvgStrength === ImpulseStrength.STRONG;
  checks.push(makeCondition(
    'S2_FVG_STRENGTH',
    'FVG strength is STRONG',
    strongFVG,
    false, 2,
    `FVG strength is ${s2.fvgStrength}. STRONG FVGs have higher probability of providing support/resistance.`
  ));

  // ── Quality: FVG clarity ──────────────────────────────────
  const cleanFVG = s2.fvgClarity === ZoneQuality.CLEAN;
  checks.push(makeCondition(
    'S2_FVG_CLEAN',
    'FVG zone is clean (clear gap, minimal overlap)',
    cleanFVG,
    false, 1,
    `FVG clarity is ${s2.fvgClarity}. CLEAN gaps are easier for price to respect as support/resistance.`
  ));

  // ── Optional: M5 BOS confirmation ────────────────────────
  checks.push(makeCondition(
    'S2_OPT_BOS_M5',
    '[Optional] M5 Break of Structure confirms direction',
    oc.bos_m5_confirmed === true,
    false, 1,
    'M5 BOS not confirmed. This is optional but adds execution confidence.'
  ));

  // ── Optional: Clear rejection at FVG ─────────────────────
  checks.push(makeCondition(
    'S2_OPT_REJECTION',
    '[Optional] Clear rejection candle visible at FVG entry',
    oc.clear_rejection === true,
    false, 1,
    'No clear rejection candle at FVG. Optional confirmation — absence reduces grade by one tier.'
  ));

  // ── Optional: FVG aligned with HTF bias ──────────────────
  checks.push(makeCondition(
    'S2_OPT_ALIGNED',
    '[Optional] FVG aligned with higher-timeframe directional bias',
    oc.fvg_aligned === true,
    false, 2,
    'FVG not confirmed as aligned with HTF bias. Counter-HTF FVGs have significantly lower edge.'
  ));

  return checks;
}


// ─────────────────────────────────────────────────────────────
// SECTION 4 — SCORING ENGINE
// Converts a list of ConditionChecks into a numeric quality score.
// ─────────────────────────────────────────────────────────────

/**
 * Calculates setup quality score (0–100) from condition checks.
 *
 * Scoring model:
 *   - Required conditions: each worth (weight * 10) points
 *   - Optional conditions: each worth (weight * 5) points
 *   - Score is normalized to 0–100 based on maximum achievable
 *
 * @param {ConditionCheck[]} checks
 * @returns {{ score: number, breakdown: Object, maxAchievable: number }}
 */
function calculateSetupQuality(checks) {
  let earned        = 0;
  let maxAchievable = 0;
  const breakdown   = {};

  for (const check of checks) {
    const pointValue = check.required ? check.weight * 10 : check.weight * 5;
    maxAchievable += pointValue;

    if (check.passed) {
      earned += pointValue;
    }

    breakdown[check.code] = {
      passed:     check.passed,
      required:   check.required,
      weight:     check.weight,
      points:     check.passed ? pointValue : 0,
      maxPoints:  pointValue,
    };
  }

  const score = maxAchievable > 0
    ? Math.round((earned / maxAchievable) * 100)
    : 0;

  return { score, breakdown, maxAchievable, earned };
}

/**
 * Computes the validation score (0.0–1.0) as the ratio of
 * REQUIRED conditions that passed vs total required conditions.
 * This is separate from quality score — it answers:
 * "Did this trade meet the minimum required checklist?"
 *
 * @param {ConditionCheck[]} checks
 * @returns {number} 0.0 to 1.0
 */
function _computeValidationScore(checks) {
  const required = checks.filter(c => c.required);
  if (required.length === 0) return 1.0;

  const passed = required.filter(c => c.passed).length;
  return Math.round((passed / required.length) * 100) / 100;
}

/**
 * Identifies hard invalidating conditions from a check list.
 * A check invalidates when: required === true AND passed === false
 * AND the check has a weight of 3 (critical conditions).
 *
 * @param {ConditionCheck[]} checks
 * @returns {string[]} Array of invalidating reason strings
 */
function _extractInvalidatingReasons(checks) {
  return checks
    .filter(c => c.required && !c.passed && c.weight >= 3)
    .map(c => c.reason)
    .filter(Boolean);
}


// ─────────────────────────────────────────────────────────────
// SECTION 5 — CLASSIFICATION ENGINE
// Maps quality score → SetupClassification with setup-specific
// modifiers applied.
// ─────────────────────────────────────────────────────────────

/**
 * Classifies a setup as A+, B+, or C based on:
 *   1. Quality score
 *   2. Presence of any hard invalidating conditions
 *   3. Setup-specific classification rules
 *
 * Classification rules:
 *   A+ requires:
 *     - Quality score ≥ A_PLUS_MIN_SCORE
 *     - Zero invalidating conditions
 *     - Zero required conditions failed
 *
 *   B+ requires:
 *     - Quality score ≥ B_PLUS_MIN_SCORE
 *     - Zero CRITICAL (weight-3) required conditions failed
 *     - At most 1 non-critical required condition failed
 *
 *   C (Discard):
 *     - Any hard invalidating condition present
 *     - Quality score below B_PLUS threshold
 *     - More than 1 required condition failed
 *
 * @param {ConditionCheck[]} checks
 * @param {number} qualityScore       - 0–100
 * @param {string[]} invalidatingReasons
 * @returns {SetupClassification}
 */
function classifySetup(checks, qualityScore, invalidatingReasons) {
  // Any hard invalidating reason = immediate C
  if (invalidatingReasons.length > 0) {
    return SetupClassification.C_DISCARD;
  }

  const failedRequired       = checks.filter(c => c.required && !c.passed);
  const failedCritical       = failedRequired.filter(c => c.weight >= 3);
  const failedNonCritical    = failedRequired.filter(c => c.weight < 3);

  // Any critical required condition failed = C
  if (failedCritical.length > 0) {
    return SetupClassification.C_DISCARD;
  }

  // Score below B+ threshold = C
  if (qualityScore < THRESHOLDS.B_PLUS_MIN_SCORE) {
    return SetupClassification.C_DISCARD;
  }

  // All required passed + score ≥ A+ threshold = A+
  if (failedRequired.length === 0 && qualityScore >= THRESHOLDS.A_PLUS_MIN_SCORE) {
    return SetupClassification.A_PLUS;
  }

  // At most 1 non-critical required failed + score ≥ B+ = B+
  if (failedNonCritical.length <= 1 && qualityScore >= THRESHOLDS.B_PLUS_MIN_SCORE) {
    return SetupClassification.B_PLUS;
  }

  // Everything else
  return SetupClassification.C_DISCARD;
}


// ─────────────────────────────────────────────────────────────
// SECTION 6 — ADVISORY NOTES GENERATOR
// Produces human-readable contextual notes (not errors).
// These surface in the evaluation report and post-trade review.
// ─────────────────────────────────────────────────────────────

/**
 * Generates advisory notes based on the trade and check results.
 * Notes are non-blocking — they inform, not invalidate.
 *
 * @param {Trade} trade
 * @param {ConditionCheck[]} allChecks
 * @param {SetupClassification} classification
 * @returns {string[]}
 */
function _generateAdvisoryNotes(trade, allChecks, classification) {
  const notes = [];
  const mc    = trade.context.marketCondition;
  const exec  = trade.execution;

  // Note on pre-trade analysis quality
  if (!trade.notes.preTradeAnalysis) {
    notes.push(
      'No pre-trade analysis notes recorded. Analysis quality scoring will be penalized.'
    );
  }

  // Note on R:R
  if (exec.rRatio !== null && exec.rRatio < THRESHOLDS.MIN_RR_RATIO) {
    notes.push(
      `R:R of ${exec.rRatio} is below the minimum ${THRESHOLDS.MIN_RR_RATIO}. ` +
      `This setup should not be taken below 2R.`
    );
  }

  // Note on optional confirmations not met
  const optionalFailed = allChecks.filter(c => !c.required && !c.passed);
  if (optionalFailed.length > 0) {
    const labels = optionalFailed.map(c => c.label.replace('[Optional] ', ''));
    notes.push(
      `${optionalFailed.length} optional confirmation(s) not met: ` +
      `${labels.slice(0, 3).join(', ')}${labels.length > 3 ? '...' : ''}.`
    );
  }

  // Note on H4 trend disagreement with D1
  if (
    mc.trend_D1 !== TrendBias.UNCLEAR &&
    mc.trend_H4 !== TrendBias.UNCLEAR &&
    mc.trend_D1 !== mc.trend_H4
  ) {
    notes.push(
      `D1 trend (${mc.trend_D1}) and H4 trend (${mc.trend_H4}) are not aligned. ` +
      `Confluence reduces with opposing timeframe bias.`
    );
  }

  // Grade-specific note
  if (classification === SetupClassification.A_PLUS) {
    notes.push('Setup meets A+ criteria. High-confidence execution recommended.');
  } else if (classification === SetupClassification.B_PLUS) {
    notes.push('Setup meets B+ criteria. Accept with standard risk management.');
  } else {
    notes.push('Setup is classified C — should be discarded. Log for learning only.');
  }

  return notes;
}


// ─────────────────────────────────────────────────────────────
// SECTION 7 — PUBLIC VALIDATORS
// Top-level functions consumed by evaluationEngine and tradeBuilder.
// ─────────────────────────────────────────────────────────────

/**
 * Full validation pipeline for an S1 trade.
 *
 * @param {Trade} trade
 * @returns {ValidationResult}
 */
function validateS1(trade) {
  // Context checks
  const { checks: contextChecks, invalidatingReasons: ctxInvalidating } =
    validateMarketContext(trade.context);

  // S1-specific checks
  const s1Checks = validateS1Conditions(trade);

  // Merge all checks — context first, then setup-specific
  const allChecks = [...contextChecks, ...s1Checks];

  // Extract invalidating reasons
  const setupInvalidating = _extractInvalidatingReasons(s1Checks);
  const invalidatingReasons = [...ctxInvalidating, ...setupInvalidating];

  // Partition passed/failed
  const conditionsMet      = allChecks.filter(c => c.passed);
  const conditionsViolated = allChecks.filter(c => !c.passed);

  // Score calculations
  const validationScore              = _computeValidationScore(allChecks);
  const { score: qualityScore, breakdown: scoringBreakdown } =
    calculateSetupQuality(allChecks);

  // Classification
  const classification = classifySetup(allChecks, qualityScore, invalidatingReasons);

  // isValid: no hard invalidations AND required ratio met
  const isValid =
    invalidatingReasons.length === 0 &&
    validationScore >= THRESHOLDS.MIN_REQUIRED_CONDITIONS_RATIO;

  // shouldHaveTaken: objective post-hoc assessment
  // A+ or B+ with no invalidations = yes
  const shouldHaveTaken =
    isValid &&
    (classification === SetupClassification.A_PLUS ||
     classification === SetupClassification.B_PLUS);

  // Advisory notes
  const notes = _generateAdvisoryNotes(trade, allChecks, classification);

  return {
    isValid,
    isInvalidating:      invalidatingReasons.length > 0,
    conditionsMet,
    conditionsViolated,
    validationScore,
    qualityScore,
    classification,
    shouldHaveTaken,
    invalidatingReasons,
    scoringBreakdown,
    notes,
  };
}

/**
 * Full validation pipeline for an S2 trade.
 *
 * @param {Trade} trade
 * @returns {ValidationResult}
 */
function validateS2(trade) {
  // Context checks
  const { checks: contextChecks, invalidatingReasons: ctxInvalidating } =
    validateMarketContext(trade.context);

  // S2-specific checks
  const s2Checks = validateS2Conditions(trade);

  const allChecks = [...contextChecks, ...s2Checks];

  const setupInvalidating = _extractInvalidatingReasons(s2Checks);
  const invalidatingReasons = [...ctxInvalidating, ...setupInvalidating];

  const conditionsMet      = allChecks.filter(c => c.passed);
  const conditionsViolated = allChecks.filter(c => !c.passed);

  const validationScore              = _computeValidationScore(allChecks);
  const { score: qualityScore, breakdown: scoringBreakdown } =
    calculateSetupQuality(allChecks);

  const classification = classifySetup(allChecks, qualityScore, invalidatingReasons);

  const isValid =
    invalidatingReasons.length === 0 &&
    validationScore >= THRESHOLDS.MIN_REQUIRED_CONDITIONS_RATIO;

  const shouldHaveTaken =
    isValid &&
    (classification === SetupClassification.A_PLUS ||
     classification === SetupClassification.B_PLUS);

  const notes = _generateAdvisoryNotes(trade, allChecks, classification);

  return {
    isValid,
    isInvalidating:      invalidatingReasons.length > 0,
    conditionsMet,
    conditionsViolated,
    validationScore,
    qualityScore,
    classification,
    shouldHaveTaken,
    invalidatingReasons,
    scoringBreakdown,
    notes,
  };
}

/**
 * Entry point: validates a trade by routing to the correct
 * setup-specific validator.
 *
 * Returns a ValidationResult, or an error result if setup type
 * is unknown.
 *
 * @param {Trade} trade
 * @returns {ValidationResult}
 */
function validateTrade(trade) {
  if (!trade?.setup?.type) {
    return {
      isValid:             false,
      isInvalidating:      true,
      conditionsMet:       [],
      conditionsViolated:  [],
      validationScore:     0.0,
      qualityScore:        0,
      classification:      SetupClassification.C_DISCARD,
      shouldHaveTaken:     false,
      invalidatingReasons: ['Setup type is not defined. Cannot validate.'],
      scoringBreakdown:    {},
      notes:               ['Trade has no setup type assigned.'],
    };
  }

  switch (trade.setup.type) {
    case SetupType.S1_OB_H4:
      return validateS1(trade);
    case SetupType.S2_FVG_H1:
      return validateS2(trade);
    default:
      return {
        isValid:             false,
        isInvalidating:      true,
        conditionsMet:       [],
        conditionsViolated:  [],
        validationScore:     0.0,
        qualityScore:        0,
        classification:      SetupClassification.C_DISCARD,
        shouldHaveTaken:     false,
        invalidatingReasons: [`Unknown setup type: "${trade.setup.type}"`],
        scoringBreakdown:    {},
        notes:               [],
      };
  }
}

/**
 * Applies a ValidationResult back onto a trade object.
 * Returns a new trade with the validation block populated.
 * Does not mutate the input.
 *
 * Intended usage:
 *   const result = validateTrade(trade);
 *   const validatedTrade = applyValidationResult(trade, result);
 *   Store.trades.update(validatedTrade.id, validatedTrade);
 *
 * @param {Trade} trade
 * @param {ValidationResult} result
 * @returns {Trade}
 */
function applyValidationResult(trade, result) {
  return {
    ...trade,
    setup: {
      ...trade.setup,
      // Overwrite pre-classification with validated classification
      classification_pre: result.classification,
    },
    validation: {
      conditionsMet:      result.conditionsMet,
      conditionsViolated: result.conditionsViolated,
      validationScore:    result.validationScore,
      shouldHaveTaken:    result.shouldHaveTaken,
    },
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 8 — INTERNAL UTILITIES
// ─────────────────────────────────────────────────────────────

/**
 * Checks whether a price level is within `tolerance` percentage
 * of a zone's midpoint. Used to validate 50% entry precision.
 *
 * @param {number} price      - Actual entry price
 * @param {number} zoneLow    - Zone lower boundary
 * @param {number} zoneHigh   - Zone upper boundary
 * @param {number} tolerance  - Allowed deviation as fraction of zone size (e.g. 0.15 = 15%)
 * @returns {boolean}
 */
function _isNearMidpoint(price, zoneLow, zoneHigh, tolerance = 0.15) {
  if (price == null || zoneLow == null || zoneHigh == null) return false;
  const midpoint  = (zoneHigh + zoneLow) / 2;
  const zoneSize  = zoneHigh - zoneLow;
  const deviation = Math.abs(price - midpoint);
  return deviation <= zoneSize * tolerance;
}

// ━━━ evaluationScorer.js ━━━
/**
 * evaluationScorer.js — Trading Analytics Engine
 * ─────────────────────────────────────────────────
 * Numeric scoring engine. Responsible exclusively for converting
 * observable trade data into weighted numeric scores across
 * four independent dimensions.
 *
 * Dimensions scored:
 *   1. Analysis Quality    — How well was the setup identified and contextualized?
 *   2. Execution Quality   — How faithfully was the plan executed?
 *   3. Process Quality     — Was the full operational process followed?
 *   4. Outcome Coherence   — Is the result consistent with what the setup warranted?
 *                            (not a judgment of win/loss — a judgment of expectedness)
 *
 * Design principles:
 *   - Every score is traceable to an explicit criterion
 *   - Weights are constants — not magic numbers in formulas
 *   - outcome (win/loss) does NOT feed into dimensions 1–3
 *   - Each dimension returns { score, breakdown, penalties, bonuses }
 *
 * @module evaluationScorer
 * @version 1.0.0
 */



// ─────────────────────────────────────────────────────────────
// SCORING WEIGHTS
// Each criterion has a max point value.
// The dimension score is: earned / maxAchievable * 100
// Centralizing weights here makes re-calibration explicit.
// ─────────────────────────────────────────────────────────────

const ANALYSIS_WEIGHTS = Object.freeze({
  SETUP_CONDITIONS_MET:        30,   // Core: required checklist compliance
  CONTEXT_CLARITY:             20,   // D1/H4 trend identified and clear
  SETUP_CLASSIFICATION_HONEST: 20,   // Pre-classification matches validated result
  PRE_TRADE_NOTES_PRESENT:     15,   // Documentation of reasoning before entry
  RR_RATIO_VALID:              15,   // R:R meets minimum threshold
});

const EXECUTION_WEIGHTS = Object.freeze({
  ENTRY_TYPE_CORRECT:          30,   // LIMIT used where required
  ENTRY_PRICE_PRECISION:       25,   // Entry landed within plan tolerance
  SL_PLACEMENT_CORRECT:        25,   // SL is beyond the zone, not arbitrary
  TP_NOT_REDUCED:              20,   // TP was not moved before being hit
});

const PROCESS_WEIGHTS = Object.freeze({
  PRE_TRADE_ANALYSIS_DONE:     25,   // Pre-trade notes exist before entry
  NO_INVALIDATING_CONDITIONS:  35,   // No hard stop conditions violated
  NO_CRITICAL_BEHAVIOR_ERRORS: 25,   // No CRITICAL behavioral errors detected
  POST_TRADE_REVIEW_DONE:      15,   // Post-trade notes filled after close
});

// Execution deviation severity → score deduction
const DEVIATION_PENALTIES = Object.freeze({
  MARKET_INSTEAD_OF_LIMIT:     -25,
  TP_MOVED_EARLY:              -20,
  SL_TIGHTENED_POST_ENTRY:     -20,
  REENTRY_ON_SAME_ZONE:        -25,
  CHASED_PRICE:                -25,
  EARLY_MANUAL_EXIT:           -10,
  OVERSIZED_POSITION:          -15,
});

// Bonus points for optional confirmations met (S2 optional checks)
const OPTIONAL_BONUS = Object.freeze({
  PER_OPTIONAL_CONFIRMATION: 5,    // Each optional confirmation adds 5 pts (capped)
  MAX_OPTIONAL_BONUS:        15,   // Maximum bonus from optional confirmations
});

const MIN_RR_RATIO = 2.0;


// ─────────────────────────────────────────────────────────────
// INTERNAL UTILITIES
// ─────────────────────────────────────────────────────────────

/**
 * Clamps a value between min and max.
 * @param {number} val
 * @param {number} min
 * @param {number} max
 * @returns {number}
 */
function _clamp(val, min = 0, max = 100) {
  return Math.max(min, Math.min(max, val));
}

/**
 * Normalizes earned/max into a 0–100 score.
 * @param {number} earned
 * @param {number} max
 * @returns {number}
 */
function _normalize(earned, max) {
  if (max <= 0) return 0;
  return _clamp(Math.round((earned / max) * 100));
}

/**
 * Counts optional confirmations met from a validation result.
 * Optional checks have required=false and no code prefix clash.
 *
 * @param {ConditionCheck[]} conditionsMet
 * @returns {number}
 */
function _countOptionalConfirmations(conditionsMet) {
  return conditionsMet.filter(c => !c.required).length;
}


// ─────────────────────────────────────────────────────────────
// SECTION 1 — ANALYSIS QUALITY SCORE
// Measures quality of pre-trade decision making.
// Input: the trade as it was before entry (context, setup, notes).
// Outcome is excluded entirely from this score.
// ─────────────────────────────────────────────────────────────

/**
 * Scores the quality of the trader's pre-trade analysis.
 *
 * Criteria:
 *   - Required conditions ratio (from validationScore)
 *   - Market context clearly identified (trend D1 not UNCLEAR)
 *   - Pre-trade classification honesty (did pre vs validated match?)
 *   - Pre-trade notes present
 *   - R:R ratio at or above minimum
 *
 * @param {Trade} trade
 * @param {ValidationResult} validationResult - From setupValidator
 * @returns {DimensionScore}
 */
function scoreAnalysisQuality(trade, validationResult) {
  const breakdown = {};
  let earned = 0;
  const penalties = [];
  const bonuses = [];
  const W = ANALYSIS_WEIGHTS;

  // ── Criterion 1: Required conditions compliance ───────────
  // validationScore is already 0.0–1.0 ratio.
  // Full score if all required conditions met, linear decay below.
  const conditionsPts = Math.round(validationResult.validationScore * W.SETUP_CONDITIONS_MET);
  earned += conditionsPts;
  breakdown.setupConditionsMet = {
    criterion:  'Required setup conditions met',
    earned:     conditionsPts,
    max:        W.SETUP_CONDITIONS_MET,
    detail:     `${Math.round(validationResult.validationScore * 100)}% of required conditions passed`,
  };

  // ── Criterion 2: Context clarity ─────────────────────────
  // D1 trend not UNCLEAR = trader correctly identified directional bias.
  // H4 trend also identified adds half the available points.
  const mc = trade.context.marketCondition;
  const d1Clear = mc.trend_D1 !== TrendBias.UNCLEAR;
  const h4Clear = mc.trend_H4 !== TrendBias.UNCLEAR;
  const contextPts = (d1Clear ? Math.round(W.CONTEXT_CLARITY * 0.65) : 0)
                   + (h4Clear ? Math.round(W.CONTEXT_CLARITY * 0.35) : 0);
  earned += contextPts;
  breakdown.contextClarity = {
    criterion:  'Market context (D1/H4 trend) clearly identified',
    earned:     contextPts,
    max:        W.CONTEXT_CLARITY,
    detail:     `D1: ${mc.trend_D1} | H4: ${mc.trend_H4}`,
  };

  // ── Criterion 3: Classification honesty ──────────────────
  // If the trader pre-classified as A+ but validated as C, they
  // either didn't do the checklist or ignored it.
  // Full points if pre == validated, half if off by one tier.
  const preClass       = trade.setup.classification_pre;
  const validatedClass = validationResult.classification;
  let classificationPts = 0;
  if (preClass === validatedClass) {
    classificationPts = W.SETUP_CLASSIFICATION_HONEST;
  } else {
    const tierDiff = _classificationTierDiff(preClass, validatedClass);
    if (tierDiff === 1) classificationPts = Math.round(W.SETUP_CLASSIFICATION_HONEST * 0.5);
    // tierDiff >= 2 = zero points — trader significantly misread the setup
  }
  earned += classificationPts;
  breakdown.classificationHonesty = {
    criterion:  'Pre-trade classification matches validated classification',
    earned:     classificationPts,
    max:        W.SETUP_CLASSIFICATION_HONEST,
    detail:     `Pre-trade: ${preClass} | Validated: ${validatedClass}`,
  };

  // ── Criterion 4: Pre-trade notes present ─────────────────
  const hasPreNotes = Boolean(trade.notes.preTradeAnalysis?.trim());
  const notesPts    = hasPreNotes ? W.PRE_TRADE_NOTES_PRESENT : 0;
  earned += notesPts;
  breakdown.preTradeNotes = {
    criterion:  'Pre-trade analysis notes recorded',
    earned:     notesPts,
    max:        W.PRE_TRADE_NOTES_PRESENT,
    detail:     hasPreNotes ? 'Present' : 'Missing — reasoning not documented',
  };
  if (!hasPreNotes) {
    penalties.push({ label: 'No pre-trade notes', impact: -W.PRE_TRADE_NOTES_PRESENT });
  }

  // ── Criterion 5: R:R ratio valid ─────────────────────────
  const rr       = trade.execution.rRatio;
  const rrValid  = rr !== null && rr >= MIN_RR_RATIO;
  const rrPts    = rrValid ? W.RR_RATIO_VALID : 0;
  earned += rrPts;
  breakdown.rrRatioValid = {
    criterion:  `R:R ratio ≥ ${MIN_RR_RATIO}`,
    earned:     rrPts,
    max:        W.RR_RATIO_VALID,
    detail:     rr !== null ? `Actual R:R: ${rr}` : 'R:R not set',
  };
  if (!rrValid) {
    penalties.push({
      label:  `R:R below minimum (${rr ?? 'unset'} < ${MIN_RR_RATIO})`,
      impact: -W.RR_RATIO_VALID,
    });
  }

  // ── Optional confirmation bonus ───────────────────────────
  const optionalCount = _countOptionalConfirmations(validationResult.conditionsMet);
  const bonusPts = _clamp(
    optionalCount * OPTIONAL_BONUS.PER_OPTIONAL_CONFIRMATION,
    0,
    OPTIONAL_BONUS.MAX_OPTIONAL_BONUS
  );
  if (bonusPts > 0) {
    bonuses.push({ label: `${optionalCount} optional confirmation(s) met`, impact: bonusPts });
    earned += bonusPts;
  }

  const maxAchievable = Object.values(W).reduce((a, b) => a + b, 0)
                      + OPTIONAL_BONUS.MAX_OPTIONAL_BONUS;

  return {
    score:     _normalize(earned, maxAchievable),
    earned,
    max:       maxAchievable,
    breakdown,
    penalties,
    bonuses,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 2 — EXECUTION QUALITY SCORE
// Measures how faithfully the plan was executed.
// The plan is: entry type, entry level, SL placement, TP target.
// ─────────────────────────────────────────────────────────────

/**
 * Scores the quality of trade execution.
 *
 * Criteria:
 *   - Correct entry type (LIMIT where required)
 *   - Entry price within acceptable precision of planned level
 *   - SL beyond the zone (not tightened arbitrarily)
 *   - TP not reduced before being hit
 *
 * Deductions for execution deviations detected in the trade record.
 *
 * @param {Trade} trade
 * @param {ValidationResult} validationResult
 * @returns {DimensionScore}
 */
function scoreExecutionQuality(trade, validationResult) {
  const breakdown = {};
  let earned = 0;
  const penalties = [];
  const bonuses = [];
  const W = EXECUTION_WEIGHTS;
  const exec = trade.execution;
  const s1 = trade.setup.s1_data;
  const s2 = trade.setup.s2_data;

  // ── Criterion 1: Correct entry type ──────────────────────
  // Both S1 and S2 require LIMIT entries by definition.
  // A MARKET entry on either is an execution error, not just a deviation.
  const entryTypePts = exec.entryType === EntryType.LIMIT ? W.ENTRY_TYPE_CORRECT : 0;
  earned += entryTypePts;
  breakdown.entryTypeCorrect = {
    criterion:  'Entry type is LIMIT (as required by setup)',
    earned:     entryTypePts,
    max:        W.ENTRY_TYPE_CORRECT,
    detail:     `Actual entry type: ${exec.entryType}`,
  };
  if (exec.entryType !== EntryType.LIMIT) {
    penalties.push({ label: 'MARKET entry used instead of LIMIT', impact: -W.ENTRY_TYPE_CORRECT });
  }

  // ── Criterion 2: Entry price precision ───────────────────
  // Checks whether the actual fill price landed within 15% of the
  // planned zone midpoint. Deductions scale with distance.
  const entryPrecisionResult = _scoreEntryPrecision(exec, s1, s2, W.ENTRY_PRICE_PRECISION);
  earned += entryPrecisionResult.pts;
  breakdown.entryPrecision = {
    criterion:  'Actual entry near planned 50% zone level',
    earned:     entryPrecisionResult.pts,
    max:        W.ENTRY_PRICE_PRECISION,
    detail:     entryPrecisionResult.detail,
  };
  if (entryPrecisionResult.pts < W.ENTRY_PRICE_PRECISION) {
    penalties.push({
      label:  `Entry precision: ${entryPrecisionResult.detail}`,
      impact: entryPrecisionResult.pts - W.ENTRY_PRICE_PRECISION,
    });
  }

  // ── Criterion 3: SL placement correctness ────────────────
  // SL should be beyond the zone boundary — not inside it, not
  // arbitrarily tight. We check: SL is on the correct side of entry
  // and is not inside the zone itself.
  const slPts = _scoreSLPlacement(exec, s1, s2, trade.context.direction, W.SL_PLACEMENT_CORRECT);
  earned += slPts.pts;
  breakdown.slPlacement = {
    criterion:  'SL placed correctly beyond zone boundary',
    earned:     slPts.pts,
    max:        W.SL_PLACEMENT_CORRECT,
    detail:     slPts.detail,
  };
  if (slPts.pts < W.SL_PLACEMENT_CORRECT) {
    penalties.push({ label: `SL issue: ${slPts.detail}`, impact: slPts.pts - W.SL_PLACEMENT_CORRECT });
  }

  // ── Criterion 4: TP not reduced ───────────────────────────
  // If the exit reason was MANUAL_EXIT and the outcome was not
  // full 2R, the TP was likely moved early. This is a process failure.
  const tpNotReduced = _tpWasRespected(trade);
  const tpPts        = tpNotReduced.respected ? W.TP_NOT_REDUCED : 0;
  earned += tpPts;
  breakdown.tpAdherence = {
    criterion:  'TP reached at planned level (not moved early)',
    earned:     tpPts,
    max:        W.TP_NOT_REDUCED,
    detail:     tpNotReduced.detail,
  };
  if (!tpNotReduced.respected) {
    penalties.push({ label: tpNotReduced.detail, impact: -W.TP_NOT_REDUCED });
  }

  // ── Deviations from execution record ─────────────────────
  // The trade.execution.executionDeviations array may contain
  // deviation codes populated by the UI or by behaviorDetector.
  for (const deviation of (exec.executionDeviations ?? [])) {
    const deductionKey = _normalizeDeviationKey(deviation);
    const deduction    = DEVIATION_PENALTIES[deductionKey];
    if (deduction !== undefined) {
      earned += deduction; // deduction is already negative
      penalties.push({ label: `Deviation: ${deviation}`, impact: deduction });
    }
  }

  const maxAchievable = Object.values(W).reduce((a, b) => a + b, 0);
  const finalEarned   = _clamp(earned, 0, maxAchievable);

  return {
    score:     _normalize(finalEarned, maxAchievable),
    earned:    finalEarned,
    max:       maxAchievable,
    breakdown,
    penalties,
    bonuses,
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 3 — PROCESS QUALITY SCORE
// Did the trader follow the full operational process?
// Separate from execution: process is about discipline and
// completeness of the ritual — not the prices.
// ─────────────────────────────────────────────────────────────

/**
 * Scores process adherence.
 *
 * Criteria:
 *   - Pre-trade analysis was documented
 *   - No hard invalidating conditions were present
 *   - No CRITICAL behavioral errors
 *   - Post-trade review completed
 *
 * @param {Trade} trade
 * @param {ValidationResult} validationResult
 * @param {BehaviorError[]} behavioralErrors - From behaviorDetector
 * @returns {DimensionScore}
 */
function scoreProcessQuality(trade, validationResult, behavioralErrors = []) {
  const breakdown = {};
  let earned = 0;
  const penalties = [];
  const W = PROCESS_WEIGHTS;

  // ── Criterion 1: Pre-trade analysis present ───────────────
  const hasPreAnalysis = Boolean(trade.notes.preTradeAnalysis?.trim());
  const preAnalysisPts = hasPreAnalysis ? W.PRE_TRADE_ANALYSIS_DONE : 0;
  earned += preAnalysisPts;
  breakdown.preTradeAnalysis = {
    criterion:  'Pre-trade analysis documented before entry',
    earned:     preAnalysisPts,
    max:        W.PRE_TRADE_ANALYSIS_DONE,
    detail:     hasPreAnalysis ? 'Present' : 'Missing',
  };

  // ── Criterion 2: No hard invalidating conditions ──────────
  // If the trade had hard invalidating conditions but was taken
  // anyway — that is a fundamental process failure.
  const noInvalidating = !validationResult.isInvalidating;
  const invalidatingPts = noInvalidating ? W.NO_INVALIDATING_CONDITIONS : 0;
  earned += invalidatingPts;
  breakdown.noInvalidatingConditions = {
    criterion:  'No hard invalidating conditions present',
    earned:     invalidatingPts,
    max:        W.NO_INVALIDATING_CONDITIONS,
    detail:     noInvalidating
      ? 'Clean'
      : `Invalidating: ${validationResult.invalidatingReasons.slice(0, 2).join('; ')}`,
  };
  if (!noInvalidating) {
    penalties.push({
      label:  'Trade taken despite hard invalidating conditions',
      impact: -W.NO_INVALIDATING_CONDITIONS,
    });
  }

  // ── Criterion 3: No CRITICAL behavioral errors ────────────
  const criticalErrors = behavioralErrors.filter(e => e.severity === 'CRITICAL');
  const noCriticalBehavior = criticalErrors.length === 0;
  const behaviorPts = noCriticalBehavior ? W.NO_CRITICAL_BEHAVIOR_ERRORS : 0;
  earned += behaviorPts;
  breakdown.noCriticalBehaviorErrors = {
    criterion:  'No CRITICAL behavioral errors detected',
    earned:     behaviorPts,
    max:        W.NO_CRITICAL_BEHAVIOR_ERRORS,
    detail:     noCriticalBehavior
      ? 'None'
      : `${criticalErrors.length} critical error(s): ${criticalErrors.map(e => e.code).join(', ')}`,
  };
  if (!noCriticalBehavior) {
    penalties.push({
      label:  `Critical behavioral errors: ${criticalErrors.map(e => e.code).join(', ')}`,
      impact: -W.NO_CRITICAL_BEHAVIOR_ERRORS,
    });
  }

  // ── Criterion 4: Post-trade review done ──────────────────
  // Only applicable to closed trades. Open trades get full credit.
  const isClosed = trade.result.outcome !== Outcome.OPEN &&
                   trade.result.outcome !== Outcome.CANCELLED;
  const hasPostReview  = Boolean(trade.notes.postTradeReview?.trim());
  const postReviewApplicable = isClosed;
  const postReviewPts  = !postReviewApplicable
    ? W.POST_TRADE_REVIEW_DONE           // Not yet applicable — full credit
    : hasPostReview
      ? W.POST_TRADE_REVIEW_DONE
      : 0;
  earned += postReviewPts;
  breakdown.postTradeReview = {
    criterion:  'Post-trade review completed (closed trades)',
    earned:     postReviewPts,
    max:        W.POST_TRADE_REVIEW_DONE,
    detail:     !postReviewApplicable
      ? 'Trade still open — not applicable'
      : hasPostReview ? 'Present' : 'Missing',
  };
  if (postReviewApplicable && !hasPostReview) {
    penalties.push({ label: 'Post-trade review missing on closed trade', impact: -W.POST_TRADE_REVIEW_DONE });
  }

  const maxAchievable = Object.values(W).reduce((a, b) => a + b, 0);

  return {
    score:     _normalize(earned, maxAchievable),
    earned:    _clamp(earned, 0, maxAchievable),
    max:       maxAchievable,
    breakdown,
    penalties,
    bonuses: [],
  };
}


// ─────────────────────────────────────────────────────────────
// SECTION 4 — OUTCOME COHERENCE SCORE
// Was the outcome consistent with what this setup warranted?
// This is NOT about winning or losing — it's about whether
// the result matches what a rational expectation would have been.
//
// Examples of INCOHERENT outcomes:
//   - A+ setup with all conditions met → LOSS (market failed, not process)
//   - C setup with invalidating conditions → WIN (random outcome, not edge)
//
// This dimension feeds the GOOD_PROCESS/BAD_PROCESS classification.
// ─────────────────────────────────────────────────────────────

/**
 * Scores outcome coherence — not the outcome itself, but whether
 * the outcome makes sense given the setup quality.
 *
 * @param {Trade} trade
 * @param {ValidationResult} validationResult
 * @returns {OutcomeCoherenceResult}
 */
function scoreOutcomeCoherence(trade, validationResult) {
  const outcome = trade.result.outcome;
  const cls     = validationResult.classification;
  const isValid = validationResult.isValid;

  // Outcome coherence matrix:
  //
  //                  | WIN   | LOSS  | BE
  // A+/B+ (valid)    | HIGH  | HIGH  | MED   ← Both expected — edge is probabilistic
  // C (invalid)      | LOW   | HIGH  | MED   ← Loss expected, WIN = lucky
  //
  // "HIGH coherence" means the result is consistent with what the
  // setup quality suggested — it does NOT mean "good".
  // A valid process + loss = HIGH coherence (loss is within normal distribution)
  // An invalid process + win = LOW coherence (win is outside expected distribution)

  let coherenceLevel;   // 'HIGH' | 'MEDIUM' | 'LOW'
  let coherenceScore;   // 0–100
  let interpretation;

  if (outcome === Outcome.OPEN || outcome === Outcome.CANCELLED) {
    return {
      coherenceLevel:  'N/A',
      coherenceScore:  null,
      interpretation:  'Trade is not closed — outcome coherence not yet applicable.',
      edgeContribution: null,
    };
  }

  if (isValid && cls !== SetupClassification.C_DISCARD) {
    // Valid process
    if (outcome === Outcome.WIN) {
      coherenceLevel   = 'HIGH';
      coherenceScore   = 100;
      interpretation   = 'Valid process produced a win — consistent with edge.';
    } else if (outcome === Outcome.LOSS) {
      coherenceLevel   = 'HIGH';
      coherenceScore   = 90;
      interpretation   = 'Valid process produced a loss — within statistical expectation. Not an error.';
    } else {
      coherenceLevel   = 'MEDIUM';
      coherenceScore   = 70;
      interpretation   = 'Valid process produced breakeven — acceptable outcome.';
    }
  } else {
    // Invalid process (C setup or hard violations)
    if (outcome === Outcome.WIN) {
      coherenceLevel   = 'LOW';
      coherenceScore   = 10;
      interpretation   = 'Invalid process produced a win — result is not attributable to edge. Do not repeat.';
    } else if (outcome === Outcome.LOSS) {
      coherenceLevel   = 'HIGH';
      coherenceScore   = 80;
      interpretation   = 'Invalid process produced a loss — expected outcome. The setup should not have been taken.';
    } else {
      coherenceLevel   = 'MEDIUM';
      coherenceScore   = 50;
      interpretation   = 'Invalid process produced breakeven — outcome is within noise range.';
    }
  }

  // Edge contribution: did this trade contribute to or harm edge measurement?
  // Only valid-process trades feed the edge calculator.
  const edgeContribution = isValid && cls !== SetupClassification.C_DISCARD
    ? 'POSITIVE'    // Valid process — counts toward edge statistics
    : 'EXCLUDED';   // Invalid process — excluded from edge calculation

  return { coherenceLevel, coherenceScore, interpretation, edgeContribution };
}


// ─────────────────────────────────────────────────────────────
// SECTION 5 — COMPOSITE SCORE
// Combines the four dimension scores into a single overall score.
// The composite score is NOT a simple average — dimensions are
// weighted to reflect their relative importance to process quality.
// ─────────────────────────────────────────────────────────────

const COMPOSITE_WEIGHTS = Object.freeze({
  analysis:   0.30,
  execution:  0.35,
  process:    0.35,
  // Note: outcomeCoherence is not included in the composite score —
  // it is reported separately to avoid conflating result with quality.
});

/**
 * Computes the weighted composite score from dimension scores.
 *
 * @param {number} analysisScore    - 0–100
 * @param {number} executionScore   - 0–100
 * @param {number} processScore     - 0–100
 * @returns {number} 0–100 composite
 */
function computeCompositeScore(analysisScore, executionScore, processScore) {
  const W = COMPOSITE_WEIGHTS;
  return _clamp(Math.round(
    analysisScore  * W.analysis  +
    executionScore * W.execution +
    processScore   * W.process
  ));
}


// ─────────────────────────────────────────────────────────────
// SECTION 6 — INTERNAL SCORING HELPERS
// ─────────────────────────────────────────────────────────────

/**
 * Scores entry price precision against the planned zone midpoint.
 * Returns partial credit based on deviation distance.
 *
 * @param {Trade['execution']} exec
 * @param {S1SetupData|null} s1
 * @param {S2SetupData|null} s2
 * @param {number} maxPoints
